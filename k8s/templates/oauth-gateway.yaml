{{- /*
OAuth gateway plumbing: dead-but-harmless backstop for platform.claude.com.

Live as of the api-proxy cutover: api-proxy in front of api.anthropic.com
is the only thing that reads/writes the credentials blob. claude in session
pods never refreshes (we seed it with a far-future expiresAt), so the
hostAlias mapping platform.claude.com → this Service in sessions.py is
inert under steady state. We keep the cert/Service infra so the OAuth
gateway can have logic put back without re-issuing certs to every session
pod (NODE_EXTRA_CA_CERTS trust is rooted in the same CA).

Pieces:
  - cert-manager Issuer + CA Certificate + CA Issuer + leaf Certificate
    (self-signed CA, then a leaf signed by it for platform.claude.com)
  - ConfigMap reflecting just ca.crt into the sessions namespace so session
    pods can mount it as their NODE_EXTRA_CA_CERTS bundle (the CA private
    key stays in tank-operator)
  - ClusterIP Service for platform.claude.com (returns 404 for everything
    now that the FastAPI handlers are gone — that's fine)
  - ExternalSecret syncing the credentials blob from KV into the
    orchestrator namespace, consumed by the api-proxy and the orchestrator's
    save-credentials path. KV is the source of truth; the api-proxy's
    ext_proc sidecar writes rotated blobs back to KV and ESO mirrors KV →
    Secret on a 1m interval.
  - ExternalSecret syncing AZURE_CLIENT_ID/AZURE_TENANT_ID for the shared
    UAMI (claude-credentials-refresher; legacy name, see infra/credential_refresher.tf).
    Consumed by both the orchestrator (save-credentials harvest → KV) and
    the api-proxy (ext_proc rotated-blob writes → KV).
*/}}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: claude-oauth-bootstrap
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: claude-oauth-ca
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
spec:
  isCA: true
  commonName: tank-operator-claude-oauth-ca
  secretName: claude-oauth-ca
  duration: 87600h  # 10 years; this CA is internal-only
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: claude-oauth-bootstrap
    kind: Issuer
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: claude-oauth-ca-issuer
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
spec:
  ca:
    secretName: claude-oauth-ca
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: claude-oauth-leaf
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
spec:
  secretName: claude-oauth-leaf
  duration: 2160h  # 90 days
  renewBefore: 360h
  dnsNames:
    - platform.claude.com
  issuerRef:
    name: claude-oauth-ca-issuer
    kind: Issuer
---
{{- /*
Reflect ca.crt into the sessions namespace as a ConfigMap so session pods can
mount it without ever seeing the CA private key. The private key stays in the
`claude-oauth-ca` Secret in this namespace, which only cert-manager reads.

We do this with a tiny one-off Job because cert-manager doesn't natively
support cross-namespace cert distribution — the alternatives (reflector
operator, kyverno, manual Secret copy) all add a controller. The Job runs
once at chart install and on each upgrade; it reads ca.crt out of the live
Secret and ensures the ConfigMap matches. Idempotent. Tolerates re-runs.

The reflector operator (added in infra-bootstrap) is now deployed
cluster-wide and the resulting ConfigMap carries reflector annotations
so it auto-replicates into ambience-issue-* namespaces (used by the
ambience agentic-CI flow). The CA private key still never leaves
tank-operator; only the public ca.crt propagates.
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: claude-oauth-ca-reflector
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: claude-oauth-ca-reflector
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["claude-oauth-ca"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: claude-oauth-ca-reflector
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
subjects:
  - kind: ServiceAccount
    name: claude-oauth-ca-reflector
    namespace: {{ include "tank-operator.orchestratorNamespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: claude-oauth-ca-reflector
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: claude-oauth-ca-reflector-write
  namespace: {{ include "tank-operator.sessionsNamespace" . }}
rules:
  # `kubectl apply` does a get-then-patch under the hood, so we need both
  # read and write verbs on the target ConfigMap.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: claude-oauth-ca-reflector-write
  namespace: {{ include "tank-operator.sessionsNamespace" . }}
subjects:
  - kind: ServiceAccount
    name: claude-oauth-ca-reflector
    namespace: {{ include "tank-operator.orchestratorNamespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: claude-oauth-ca-reflector-write
---
apiVersion: batch/v1
kind: Job
metadata:
  name: claude-oauth-ca-reflect
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
  annotations:
    # Re-run on every helm upgrade to pick up CA rotations.
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    # ArgoCD equivalent: re-run when the Application syncs.
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    spec:
      serviceAccountName: claude-oauth-ca-reflector
      restartPolicy: OnFailure
      containers:
        - name: reflect
          # Bitnami's kubectl image only publishes major.minor.patch tags
          # (1.31.x), so a `:1.31` short tag 404s. alpine/kubectl is a
          # community image with stable major.minor tags and small footprint.
          image: alpine/k8s:1.31.0
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              # Wait for cert-manager to issue the CA — on first install the
              # Secret doesn't exist yet when this Job fires.
              for i in $(seq 1 60); do
                if kubectl -n {{ include "tank-operator.orchestratorNamespace" . }} get secret claude-oauth-ca -o jsonpath='{.data.ca\.crt}' >/dev/null 2>&1; then
                  break
                fi
                echo "waiting for cert-manager to issue claude-oauth-ca... ($i/60)" >&2
                sleep 5
              done
              CA=$(kubectl -n {{ include "tank-operator.orchestratorNamespace" . }} get secret claude-oauth-ca -o jsonpath='{.data.ca\.crt}' | base64 -d)
              if [ -z "$CA" ]; then
                echo "claude-oauth-ca secret never appeared — failing." >&2
                exit 1
              fi
              cat <<EOF | kubectl apply -f -
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: claude-oauth-ca
                namespace: {{ include "tank-operator.sessionsNamespace" . }}
                annotations:
                  # Reflector publishes this ConfigMap into validation
                  # namespaces (ambience-issue-*, tank-operator-issue-*,
                  # glimmung-issue-*) so each app automation Job
                  # can mount ca.crt as NODE_EXTRA_CA_CERTS and trust the
                  # in-cluster claude-api-proxy's TLS leaf. The CA private
                  # key never leaves tank-operator.
                  reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
                  reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "ambience-issue-.*,tank-operator-issue-.*,glimmung-issue-.*"
                  reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
                  reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "ambience-issue-.*,tank-operator-issue-.*,glimmung-issue-.*"
              data:
                ca.crt: |
              $(printf '%s\n' "$CA" | sed 's/^/    /')
              EOF
---
apiVersion: v1
kind: Service
metadata:
  name: claude-oauth-gateway
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
spec:
  selector:
    app.kubernetes.io/name: tank-operator
  ports:
    - name: https
      port: 443
      targetPort: 8443
---
{{- /*
Credentials Secret: KV is the source of truth, ESO mirrors KV → this
Secret on a short interval (1m) so rotations performed by the api-proxy's
ext_proc sidecar (see api-proxy/src/tank_api_proxy/server.py) land on the
api-proxy pod's mounted volume promptly. The api-proxy is the only thing
that calls platform.claude.com's token endpoint; the orchestrator only
writes to KV via the break-glass save-credentials path.

To re-seed (refresh chain dies, etc.) use the in-app "+ config sub"
flow which captures a logged-in credentials.json and writes it to KV
via POST /api/sessions/{id}/save-credentials. Out-of-band: upload a
fresh blob to the KV secret named by
{{ include "tank-operator.claudeCredentialsKvKey" . }}; ESO picks it up
on the next refresh.
*/}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "tank-operator.claudeCredentialsSecret" . }}
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: {{ .Values.externalSecret.storeKind }}
  target:
    name: {{ include "tank-operator.claudeCredentialsSecret" . }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: {{ .Values.externalSecret.claudeCredentials.secretKey }}
      remoteRef:
        key: {{ include "tank-operator.claudeCredentialsKvKey" . }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
---
{{- /*
Workload-identity bootstrap Secret for the shared `claude-credentials-refresher`
UAMI (legacy name; see infra/credential_refresher.tf for why it's kept).
Both the orchestrator (save-credentials → KV write) and the api-proxy's
ext_proc sidecar (rotated-blob → KV write) authenticate as this UAMI.
ESO syncs the UAMI's client_id + tenant_id from KV into envFrom-able
fields so DefaultAzureCredential can mint a federated KV token for either
caller.
*/}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "tank-operator.credentialRefresherConfigSecret" . }}
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: {{ .Values.externalSecret.storeKind }}
  target:
    name: {{ include "tank-operator.credentialRefresherConfigSecret" . }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: AZURE_CLIENT_ID
      remoteRef:
        key: {{ .Values.credentialRefresher.kvClientIdKey }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: AZURE_TENANT_ID
      remoteRef:
        key: {{ .Values.credentialRefresher.kvTenantIdKey }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
