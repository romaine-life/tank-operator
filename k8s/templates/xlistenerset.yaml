{{- if eq (include "tank-operator.renderWarm" .) "true" }}
# Per-app HTTPS listener bound to the shared `main` Gateway. Terminates TLS for the
# tank-operator hostname using the cert-manager-managed Secret in this namespace.
apiVersion: gateway.networking.x-k8s.io/v1alpha1
kind: XListenerSet
metadata:
  name: tank-operator
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
spec:
  parentRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: {{ .Values.ingress.gatewayName }}
    namespace: {{ .Values.ingress.gatewayNamespace }}
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: {{ include "tank-operator.ingressHostname" . }}
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: {{ include "tank-operator.ingressTlsSecret" . }}
{{- end }}
