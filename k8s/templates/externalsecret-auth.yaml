# Backend auth secrets — Entra app client-id (used as the JWT audience for
# verifying Entra ID tokens), the backend's own JWT signing secret, and the
# shared romaine.life allowed-email gate.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "tank-operator.authSecret" . }}
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: {{ .Values.externalSecret.storeKind }}
  target:
    name: {{ include "tank-operator.authSecret" . }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    {{- if .Values.testEnv.enabled }}
    - secretKey: ENTRA_CLIENT_ID
      remoteRef:
        key: {{ .Values.testEnv.authClientIdKvKey }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: JWT_SECRET
      remoteRef:
        key: tank-operator-jwt-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: ALLOWED_EMAILS
      remoteRef:
        key: romaine-life-admin-emails
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    {{- else }}
    {{- range .Values.externalSecret.auth.keys }}
    - secretKey: {{ .envVar }}
      remoteRef:
        key: {{ .kvKey }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    {{- end }}
    {{- end }}
