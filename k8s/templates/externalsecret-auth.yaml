# Backend auth secret. The only env var the orchestrator needs from KV is
# the ALLOWED_EMAILS gate; Microsoft sign-in is delegated to auth.romaine.life
# and tank-operator verifies its JWTs against the upstream JWKS at runtime.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "tank-operator.authSecret" . }}
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: {{ .Values.externalSecret.storeKind }}
  target:
    name: {{ include "tank-operator.authSecret" . }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    {{- range .Values.externalSecret.auth.keys }}
    - secretKey: {{ .envVar }}
      remoteRef:
        key: {{ .kvKey }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    {{- end }}
