{{- if and (eq (include "tank-operator.renderWarm" .) "true") (not (eq (include "tank-operator.isTestEnv" .) "true")) }}
# Mirrors the Azure ACR image-readiness webhook bearer secret from KV into a
# Secret in the ORCHESTRATOR namespace. The orchestrator reads it as
# ACR_WEBHOOK_SECRET and compares the inbound `Authorization: Bearer <secret>`
# header on the public POST /webhooks/acr route with constant-time equality
# (backend-go/cmd/tank-operator/acr_webhook.go). An empty secret fails closed
# (rejects all deliveries), so the durable ci_image_available signal never lands.
#
# Production only: the ACR webhook points at the production
# https://tank.romaine.life/webhooks/acr endpoint, so test-slot orchestrators
# neither receive deliveries nor need this Secret. The deployment env reference
# is `optional: true` to match.
#
# `creationPolicy: Owner` and the verbose remoteRef defaults mirror
# externalsecret-github-webhook.yaml. Without them ArgoCD's SSA diff treats ESO
# defaults as drift and self-heals in a loop.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecret.acrWebhook.secretName }}
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: {{ .Values.externalSecret.storeKind }}
  target:
    name: {{ .Values.externalSecret.acrWebhook.secretName }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: {{ .Values.externalSecret.acrWebhook.secretKey }}
      remoteRef:
        key: {{ .Values.externalSecret.acrWebhook.kvKey }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
{{- end }}
