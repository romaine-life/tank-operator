                      - name: envoy.access_loggers.stdout
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                          log_format:
                            text_format_source:
                              inline_string: "[%START_TIME%] %REQ(:METHOD)% %REQ(:PATH)% -> %RESPONSE_CODE% %RESPONSE_FLAGS% rx=%BYTES_RECEIVED% tx=%BYTES_SENT% dur_ms=%DURATION% req_id=%REQ(x-request-id)% retry=%REQ(x-envoy-attempt-count)%\n"
                    common_http_protocol_options:
                      idle_timeout: 600s
                    http_filters:
                      - name: envoy.filters.http.ext_proc
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                          grpc_service:
                            envoy_grpc:
                              cluster_name: ext_proc_local
                            timeout: 5s
                          failure_mode_allow: false
                          processing_mode:
                            request_header_mode: SEND
                            response_header_mode: SEND
                            request_body_mode: NONE
                            response_body_mode: NONE
                            request_trailer_mode: SKIP
                            response_trailer_mode: SKIP
                          message_timeout: 5s
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                    route_config:
                      name: gemini
                      virtual_hosts:
                        - name: gemini
                          domains: ["*"]
                          routes:
                            - match: { prefix: "/" }
                              route:
                                cluster: gemini_api
                                timeout: 600s
                                retry_policy:
                                  retry_on: "retriable-status-codes"
                                  retriable_status_codes: [401]
                                  num_retries: 1
                                  per_try_timeout: 600s
                                auto_host_rewrite: true
      clusters:
        - name: gemini_api
          type: LOGICAL_DNS
          connect_timeout: 5s
          dns_lookup_family: V4_ONLY
          lb_policy: ROUND_ROBIN
          typed_extension_protocol_options:
            envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
              "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
              explicit_http_config:
                http2_protocol_options: {}
          load_assignment:
            cluster_name: gemini_api
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: us-central1-aiplatform.googleapis.com
                          port_value: 443
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
              sni: us-central1-aiplatform.googleapis.com
              common_tls_context:
                validation_context:
                  trusted_ca:
                    filename: /etc/ssl/certs/ca-certificates.crt
        - name: ext_proc_local
          type: STATIC
          connect_timeout: 1s
          lb_policy: ROUND_ROBIN
          typed_extension_protocol_options:
            envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
              "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
              explicit_http_config:
                http2_protocol_options: {}
          load_assignment:
            cluster_name: ext_proc_local
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: 127.0.0.1
                          port_value: 9000
{{- end }}
---
{{- if eq (include "tank-operator.renderWarm" .) "true" }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gemini-api-proxy-config
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: {{ .Values.externalSecret.storeKind }}
  target:
    name: gemini-api-proxy-config
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: GEMINI_CLIENT_ID
      remoteRef:
        key: gemini-client-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: GEMINI_CLIENT_SECRET
      remoteRef:
        key: gemini-client-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
{{- end }}
---
{{- if eq (include "tank-operator.renderHot" .) "true" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gemini-api-proxy
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
  labels:
    app.kubernetes.io/name: gemini-api-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gemini-api-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gemini-api-proxy
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: {{ .Values.apiProxy.serviceAccount }}
      containers:
        - name: envoy
          image: {{ .Values.apiProxy.envoyImage | quote }}
          args:
            - "-c"
            - "/etc/envoy/envoy.yaml"
            - "--service-cluster"
            - "gemini-api-proxy"
          ports:
            - name: https
              containerPort: 8443
            - name: admin
              containerPort: 9901
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy
              readOnly: true
            - name: leaf-tls
              mountPath: /etc/envoy/tls
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 3
            periodSeconds: 10
        - name: ext-proc
          image: "{{ .Values.apiProxy.image.repository }}:{{ .Values.apiProxy.image.tag }}"
          imagePullPolicy: {{ .Values.apiProxy.image.pullPolicy }}
          ports:
            - name: grpc
              containerPort: 9000
            - name: metrics
              containerPort: 9100
          env:
            - name: PROXY_PROVIDER
              value: gemini
            - name: METRICS_PORT
              value: "9100"
            - name: GEMINI_CREDENTIALS_FILE
              value: /etc/gemini-credentials/{{ .Values.externalSecret.geminiCredentials.secretKey }}
            - name: AZURE_KEYVAULT_URL
              value: {{ .Values.credentialRefresher.keyVaultUrl | quote }}
            - name: GEMINI_CREDENTIALS_KV_KEY
              value: {{ .Values.externalSecret.geminiCredentials.kvKey | quote }}
            - name: AZURE_FEDERATED_TOKEN_FILE
              value: /var/run/secrets/azure/tokens/azure-identity-token
            - name: AZURE_AUTHORITY_HOST
              value: https://login.microsoftonline.com/
          envFrom:
            - secretRef:
                name: gemini-api-proxy-config
            - secretRef:
                name: {{ include "tank-operator.apiProxyConfigSecret" . }}
          volumeMounts:
            - name: gemini-credentials
              mountPath: /etc/gemini-credentials
              readOnly: true
      volumes:
        - name: envoy-config
          configMap:
            name: gemini-api-proxy-envoy
        - name: leaf-tls
          secret:
            secretName: gemini-api-proxy-leaf
            optional: true
        - name: gemini-credentials
          secret:
            secretName: {{ include "tank-operator.geminiCredentialsSecret" . }}
            optional: true
{{- end }}
