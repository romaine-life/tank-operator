{{- if .Values.orchestrator.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: tank-operator
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
  labels:
    app.kubernetes.io/name: tank-operator
spec:
  minAvailable: {{ .Values.orchestrator.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: tank-operator
{{- end }}
