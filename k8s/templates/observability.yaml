{{- if eq (include "tank-operator.renderWarm" .) "true" }}
{{- /*
Observability surface for tank-operator: ServiceMonitor / PodMonitor /
PrometheusRule resources discovered by the kube-prometheus-stack
deployed in the `monitoring` namespace.

Conditional on observability.enabled so an environment without the
Prometheus operator CRDs renders cleanly. docs/observability.md is the
contract — the metric names referenced in PromQL below must match the
Counter/Histogram declarations in:

  - backend-go/cmd/tank-operator/observability.go
  - backend-go/cmd/tank-operator/middleware_http.go
  - backend-go/cmd/nats-auth-callout/main.go
  - backend-go/internal/pgstore/tracer.go
  - claude-runner/src/metrics.ts
  - codex-runner/src/metrics.ts
  - api-proxy/src/tank_api_proxy/metrics.py
  - claude-container/mcp-auth-proxy/src/mcp_auth_proxy/metrics.py
*/}}
{{- if .Values.observability.enabled }}
---
# ServiceMonitor: orchestrator. /metrics on the existing http port (same
# listener as /api/*). 30s scrape; metrics latency budget allows it.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: tank-operator
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
  labels:
    app.kubernetes.io/name: tank-operator
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: tank-operator
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.observability.scrapeInterval | default "30s" | quote }}
      scrapeTimeout: 10s
---
{{- if not (eq (include "tank-operator.isTestEnv" .) "true") }}
# ServiceMonitor: api-proxy deployments. All
# Services expose the metrics sidecar port; the `provider` label on each metric
# distinguishes them at query time. The provider-generic TankApiProxy* alerts
# below fire per-provider via {{`{{ $labels.provider }}`}}.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: tank-api-proxy
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
  labels:
    app.kubernetes.io/name: tank-api-proxy
spec:
  selector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values: [claude-api-proxy, claude-secondary-api-proxy, codex-api-proxy]
  endpoints:
    - port: metrics
      path: /metrics
      interval: {{ .Values.observability.scrapeInterval | default "30s" | quote }}
      scrapeTimeout: 10s
---
{{- end }}
# PodMonitor: session pods. The PodMonitor scrapes the mcp-auth-proxy
# sidecar and (for claude_gui / codex_gui sessions)
# the runner sidecar. Session pods are ephemeral — scrape interval 15s
# gives the operator a realistic chance of catching at least one sample
# from a short-lived session before the pod terminates and its series
# ages out.
#
# Scrape-identity labels are KEPT (pod, namespace) and only the
# redundant per-target labels are dropped (instance, container,
# endpoint, service, job). Dropping pod/namespace looked like
# cardinality discipline but was series CORRUPTION: with every
# identifying label stripped, all concurrently-live session pods (prod
# AND every test slot's sessions) exported the SAME series, samples
# flapped last-write-wins between pods, sum() read one arbitrary pod,
# and rate()/increase() saw phantom counter resets on every
# alternation. During the sessions-828/829 incident
# (tank-operator#1084) the runner's turn-settle counters were
# indistinguishable between the two wedged pods and diagnosis needed
# in-pod curl. pod (unique per target; metric names are disjoint
# across the two endpoints) plus namespace (separates prod from slot
# scopes) restore per-series identity; instance (pod IP:port) is
# redundant with pod and churnier, and container/endpoint/service/job
# add nothing the disjoint metric names don't already encode.
#
# Cost: bounded by CONCURRENT session pods, not cumulative sessions —
# dead pods stop producing samples and their series age out of the
# TSDB head. docs/observability.md's cost model (~1.5k series at ~50
# concurrent session pods) already budgets per-pod series; the
# cardinality rules forbid per-session labels in APPLICATION code,
# not the scrape topology's own target identity.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: tank-session-pods
  namespace: {{ include "tank-operator.sessionsNamespace" . }}
  labels:
    app.kubernetes.io/name: tank-session-pods
spec:
  selector:
    matchLabels:
      app.kubernetes.io/managed-by: tank-operator
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 15s
      scrapeTimeout: 5s
      metricRelabelings:
        - action: labeldrop
          regex: ^(instance|container|endpoint|service|job)$
    - port: runner-metrics
      path: /metrics
      interval: 15s
      scrapeTimeout: 5s
      metricRelabelings:
        - action: labeldrop
          regex: ^(instance|container|endpoint|service|job)$
{{- if and .Values.natsCallout.enabled (not (eq (include "tank-operator.isTestEnv" .) "true")) }}
---
# PodMonitor: nats-auth-callout (the per-session NATS credential issuer,
# #1128). It exposes tank_nats_auth_callout_total on :9100 but has no
# Service — it speaks NATS ($SYS.REQ.USER.AUTH), not HTTP, so there is
# nothing for a ServiceMonitor to select; scrape the pods directly.
# Without this, every new-pod auth FAILURE (result=denied_*/error — the
# #1148 "Authorization Violation" class that wedges submitted turns) is
# invisible to Prometheus. Gated to non-test envs because test slots run
# tokenless single-tenant NATS and never render the callout. Two replicas;
# the counter is per-pod, so the alerts below sum() across pods.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: tank-nats-auth-callout
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
  labels:
    app.kubernetes.io/name: nats-auth-callout
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nats-auth-callout
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: {{ .Values.observability.scrapeInterval | default "30s" | quote }}
      scrapeTimeout: 10s
{{- end }}
---
# PrometheusRule: user-trust failure alerts. Each alert names exactly the
# class of failure it surfaces; no "high-level" health alerts that fire
# for unrelated reasons.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: tank-operator
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
  labels:
    app.kubernetes.io/name: tank-operator
spec:
  groups:
    - name: tank-operator.http
      rules:
        - alert: TankOperatorHTTP5xxRate
          expr: sum(rate(tank_http_requests_total{status_class="5xx"}[5m])) by (route) > 0.01
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "tank-operator route {{`{{ $labels.route }}`}} is returning 5xx > 0.01 req/s for 5m"
            runbook: "Inspect orchestrator logs for `http server error` lines on this route; the slog includes method, route, email, and the response detail."

        - alert: TankSessionBusStreamNearCapacity
          expr: (tank_session_bus_stream_bytes / tank_session_bus_stream_max_bytes > 0.8) or (tank_session_bus_stream_messages / tank_session_bus_stream_max_messages > 0.8)
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "session bus stream is over 80% of its retention limit for 10m"
            runbook: "The stream evicts OLDEST messages — durable commands included — when MaxBytes/MaxMsgs fill, and evicted commands are undetectable after the fact (issue #1076 item 2). Find the flood producer (per-session event volume in session_events), and expect stranded-turn sweep terminals for any sessions whose commands were evicted if this fires through to 100%."

        - alert: TankSessionBusPersisterRestarting
          expr: increase(tank_session_bus_persister_restart_total[15m]) > 3
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "the session-bus persister restarted more than 3 times in 15m"
            runbook: "Single restarts are the supervision working (transient NATS/Postgres errors). A sustained rate means the bus substrate or the ledger is flapping — check NATS pod restarts and TankPg* alerts."

        - alert: TankPgQueryP99High
          expr: histogram_quantile(0.99, sum by (le, operation) (rate(tank_pg_query_duration_seconds_bucket[5m]))) > 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "tank-operator Postgres p99 latency for operation {{`{{ $labels.operation }}`}} > 1s for 10m"

        - alert: TankPgUnmappedOperation
          expr: increase(tank_pg_queries_total{operation="other"}[1h]) > 0
          for: 0m
          labels:
            severity: info
          annotations:
            summary: "tank-operator ran a Postgres query the operationFromSQL extractor did not recognize"
            runbook: "Add the new table to pgstore.knownTables and ship a follow-up; otherwise that query is invisible in latency dashboards."

        # Postgres connection-cap saturation. The 2026-05-25 incident
        # crash-looped the orchestrator on SQLSTATE 53300 ("remaining
        # connection slots are reserved for roles with the SUPERUSER
        # attribute") with no advance signal — the cap was hit and the
        # crash was the first observation. With the pgstats poller in
        # place, this alert fires at 70% utilization, leaving ~30% of
        # the cap as headroom for the operator to act before the next
        # crash. Both gauges are unlabeled aggregates of server-side
        # state — max() across pods dedupes the N orchestrator pods'
        # views of the same single shared server.
        - alert: TankPgConnectionSaturation
          expr: |
            (max(tank_pg_backend_connections) / max(tank_pg_max_connections)) > 0.7
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Postgres backend connections at {{`{{ humanizePercentage $value }}`}} of max_connections for 5m"
            runbook: |
              The Flex Server connection cap is the next thing to
              crash-loop the orchestrator (SQLSTATE 53300, the
              2026-05-25 shape). Remediations in order of effort:

              (1) Bump SKU in infra/postgres.tf. B1ms's cap is 50;
                  B2s is 100, B2ms is 100 with more RAM, D2ds_v5 is
                  859. In-place resize via tofu apply causes a
                  ~60-90s connection drop on switchover.
              (2) Add a PgBouncer sidecar to the orchestrator
                  deployment so N pods × pgstore.MaxConns frontend
                  connections funnel into ~5-10 backend connections.
                  Decouples slot fleet size from the server cap
                  entirely; doesn't help CPU/IO.
              (3) Lower pgstore.MaxConns further (currently 4); only
                  buys time against slot growth and increases
                  per-pool contention.

              Diagnose distribution: per-pod query rate is
                sum by (pod) (rate(tank_pg_queries_total{outcome="ok"}[5m]))
              from kube-state-metrics' pod labels — a single pod
              dramatically over its share is a runaway query, not
              cluster-wide pressure.

        # Poller self-test. If this fires, tank_pg_backend_connections
        # and tank_pg_max_connections are stale; the saturation alert
        # above is silently disabled. Diagnostic-only — does not page.
        - alert: TankPgConnectionPollFailing
          expr: rate(tank_pg_stats_poll_total{outcome!="ok"}[10m]) > 0
          for: 10m
          labels:
            severity: info
          annotations:
            summary: "pgstats poller is failing to read connection stats from Postgres"
            runbook: |
              The orchestrator's pgstats poller cannot query
              pg_stat_database or current_setting('max_connections').
              tank_pg_backend_connections / tank_pg_max_connections
              are stale; TankPgConnectionSaturation can't fire.
              Inspect orchestrator slog for "pgstats backend
              connections poll failed" or "pgstats max_connections
              poll failed". Likely causes:
              (1) AAD token blip — the pool's BeforeConnect is
                  rejecting the workload-identity token. Other pool
                  traffic (tank_pg_queries_total) would also show
                  outcome=failed.
              (2) Postgres rejecting reads on the system views —
                  permission regression on the orchestrator's
                  managed-identity grants.
              (3) Postgres down — the bigger problem here is every
                  other tank_pg_* metric is also broken; this is
                  collateral, not the root cause.

    - name: tank-operator.avatar-uploads
      rules:
        - alert: TankAvatarUploadContractFailures
          expr: |
            sum(rate(tank_avatar_upload_attempts_total{stage=~"parse_multipart|validate_kind|validate_name|validate_crop|read_avatar|read_backing",result!="ok"}[10m])) > 0.05
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "avatar uploads are failing validation or request-shape checks"
            runbook: |
              Failed POST /api/admin/avatars responses include an
              attempt_id. Query
              GET /api/debug/avatar-upload-attempts?attempt_id=<id>
              with an admin bot token. parse_multipart failures point
              at the browser/client FormData contract; validate_* points
              at metadata shape; read_avatar/read_backing points at
              missing fields, empty files, unsupported MIME types, or
              file-size limits. The durable table is
              avatar_upload_attempts.

        - alert: TankAvatarUploadStoreFailures
          expr: |
            sum(rate(tank_avatar_upload_attempts_total{result="store_error"}[10m])) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "avatar uploads are failing during blob or metadata storage"
            runbook: |
              Query the latest attempts with
              GET /api/debug/avatar-upload-attempts?limit=20. Stages
              store_avatar/store_backing indicate blob-storage writes;
              create_metadata indicates the avatar_assets Postgres write.
              The durable source of truth for upload diagnosis is
              avatar_upload_attempts, with the created avatar id recorded
              on attempts that reached storage.

    - name: tank-operator.session-bus
      rules:
        - alert: TankSessionEventPersistSchemaRejected
          expr: tank_session_event_persist_schema_rejected_total > 0
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "session-events persister terminated an event for schema reasons"
            runbook: "A producer is emitting non-Tank events to the bus. Steady-state expectation is zero. Inspect persister logs for `session bus event terminated: schema rejected`."

        - alert: TankControlActionAuthorizationDenied
          expr: increase(tank_control_action_events_total{result="forbidden"}[15m]) > 0
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "control-action ledger writes are being authorization-denied"
            runbook: "A session-pod service principal is being rejected by the per-session authorization gate, so governed-git evidence (publish/CI/mergeability), break-glass requests, and PR control-actions stop landing in control_action_events — silently, because the sidecar swallows the 4xx. Steady-state is zero. A nonzero rate means either a forged-identity attempt or an authorization regression like the 2026-06-16 #1207 incident (writes gated on a caller-asserted header instead of the verified svc:tank:<id> subject). Inspect handleInternalAppendControlAction / serviceSubjectMatchesSession and confirm the exchanged subject matches the target session and scope."

        - alert: TankSessionEventWakePublishFailures
          expr: rate(tank_session_event_wake_publish_failure_total[10m]) > 0
            or on() rate(tank_session_list_event_publish_failure_total[10m]) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "tank-operator wake/event publishes to NATS are failing"
            runbook: "SSE clients will lag behind durable state until the next heartbeat or cursor-resume reconnect. Check NATS health in the nats namespace."

        # A materialized turn-activity shell is still `active` even though the
        # turn has a durable terminal in session_events. This is the exact
        # class that made a finished long turn render as perpetually running:
        # the turn-activity projection used to fold only the first N events of
        # a turn (oldest-first), so a >N-event turn's terminal fell outside the
        # window and the shell never went terminal. The fix folds the complete
        # turn and paginates the body; a nonzero count here means that
        # invariant regressed — the user is staring at a session that looks
        # dead while the agent already finished. Steady-state expectation is
        # zero.
        - alert: TankTurnActiveWithDurableTerminal
          expr: increase(tank_transcript_materialization_invariant_violation_total{invariant="active_shell_after_terminal"}[15m]) > 0
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "a turn-activity shell stayed active after a durable terminal event"
            runbook: "The turn-activity projection produced an active shell for a turn that has a durable turn.completed/failed/interrupted in session_events — a finished turn rendering as perpetually running. This is the compaction/long-turn stall class. Inspect the slog `transcript materialization invariant violation` line for session_id/turn_id, then confirm readAllTurnEvents / projectTurnPages fold the whole turn (no fixed-size per-turn read reintroduced)."

        # ----- Per-session SSE live-delivery stethoscope -----
        #
        # The three alerts below correspond to the candidate-A / B / C
        # failure shapes catalogued in docs/observability.md →
        # "Per-stream debug surface" and the persister's slog.Info
        # "session event persister wake published" line.
        #
        # Candidate A — an already-open SSE stream had durable transcript
        # rows waiting, but did not emit them until the heartbeat poll
        # read Postgres. This is an observed stream-local failure, not a
        # published-vs-received aggregate: wake publishes are one per
        # durable event, wake receives are one per subscriber delivery,
        # and those totals are not a loss ratio.
        - alert: TankSessionEventHeartbeatCatchup
          expr: |
            sum(increase(tank_session_event_stream_heartbeat_catchup_total[10m])) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "an open session-event stream caught up from heartbeat polling"
            runbook: |
              At least one already-open /api/sessions/{id}/events SSE
              stream emitted durable transcript rows immediately after
              the heartbeat poll, not after a NATS wake. That proves the
              user waited until heartbeat catch-up for rows that already
              existed in session_transcript_rows.

              Inspect the matching slog.Warn line:
              "session event stream caught up from heartbeat" includes
              session_id, stream_id, storage_key, cursor_before, and
              cursor_after. Then query GET
              /api/debug/session-event-streams (admin only) on the pod
              serving that stream. If WakesReceived stayed flat while
              cursor_after advanced, inspect wake subject wiring:
              backend-go/internal/sessionmodel.SessionStorageKey,
              backend-go/internal/sessionbus.WakeSubject, and the
              runner's TANK_SESSION_STORAGE_KEY. If WakesReceived
              advanced but the heartbeat catch-up still fired, inspect
              the SSE handler notify loop and NATS subscription callback
              on that replica.

        # Candidate B — zombie SSE. The browser's silence watchdog
        # observes long idle intervals while a turn is in flight.
        # Threshold: p95 > 60s for 30m. The watchdog re-arms after
        # firing so a continuous stall produces multiple histogram
        # points; the 30m window keeps a single bad session from
        # paging.
        - alert: TankSessionEventBrowserStreamSilent
          expr: |
            histogram_quantile(
              0.95,
              sum by (le, session_mode) (rate(tank_session_event_client_stream_silent_seconds_bucket[30m]))
            ) > 60
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "p95 browser SSE silent-while-running > 60s on session_mode={{`{{ $labels.session_mode }}`}}"
            runbook: |
              The browser's silence watchdog is observing SSE streams
              that stay TCP-alive (no onerror fires) but receive no
              tank events for >30s while a turn is in flight.
              Canonical zombie-connection signature: proxy / LB has
              dropped the data path without sending FIN. Compare with
              TankSessionEventHeartbeatCatchup and the server-side
              stream debug endpoint: if the server has fresh wakes and
              emits, the failure is between the orchestrator and the
              browser, not in the wake fabric. Inspect ingress / load
              balancer idle timeout.

        - alert: TankBrowserQueuedFollowupBlockedAfterTerminal
          expr: |
            sum by (session_mode) (
              increase(tank_session_event_client_events_total{event="queued_followup_blocked_after_terminal"}[15m])
            ) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "browser queued a follow-up after durable state already reached terminal on session_mode={{`{{ $labels.session_mode }}`}}"
            runbook: |
              The SPA observed a user-visible local latch: a follow-up
              submit was placed in the browser-only queuedMessages list
              while the durable conversation projection was no longer
              active. This is not a missing terminal event and not a
              wake-delivery issue. Check recent terminal correlation
              telemetry (`terminal_matched_by_turn_id` /
              `terminal_local_run_mismatch`) and inspect the relevant
              frontend/src/App.tsx currentRunRef/finalizeSdkRun path.

        - alert: TankBrowserStaleRunningBlockedSubmit
          expr: |
            sum by (session_mode) (
              increase(tank_session_event_client_events_total{event="stale_running_blocked_submit"}[15m])
            ) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "browser recovered a stale running latch before submit on session_mode={{`{{ $labels.session_mode }}`}}"
            runbook: |
              The SPA was about to queue a follow-up because local
              running=true, but durable conversation state was no
              longer active. The submit guard cleared the stale latch
              and sent the message immediately. Inspect recent session
              activity_summary rows and terminal correlation telemetry
              to decide whether the cause was a stale server activity
              projection or a missed local-run finalization.

        - alert: TankTurnDirectoryNewTurnLoop
          expr: |
            sum by (session_mode) (
              increase(tank_chat_scroll_client_events_total{event="turn-directory-new-turn-loop",surface="session"}[15m])
            ) > 0
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "Turns directory new-turn refresh loop on session_mode={{`{{ $labels.session_mode }}`}}"
            runbook: |
              The browser repeatedly reloaded /turns/directory with
              source=new-turn because the live transcript window contained
              at least one turn_activity shell whose turn_id was still
              absent from the durable directory after repeated reads.
              This is the upstream spinner/bootstrap class: the Turns
              surface is trying to make the selector complete before the
              selected activity body can load.

              Inspect structured orchestrator logs:

                msg="browser chat scroll event"
                event="turn-directory-new-turn-loop"

              The log carries session_id, page_path, source, key (the
              first missing turn_id), event_count (number of missing live
              shells), canonical_event_count (known directory turn count),
              entries, and turn_activity_shells.

        - alert: TankTurnDirectoryRouteSessionMismatch
          expr: |
            sum by (session_mode) (
              increase(tank_chat_scroll_client_events_total{event="turn-directory-route-session-mismatch",surface="session"}[15m])
            ) > 0
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "Turns directory loaded from a pane whose session does not match the URL on session_mode={{`{{ $labels.session_mode }}`}}"
            runbook: |
              The browser was about to load /turns/directory for one
              mounted Run pane while window.location pointed at a different
              /sessions/{id} route. That is the route/session desync seen
              when switching sessions leaves an old pane doing work under
              the new URL.

              Inspect structured orchestrator logs:

                msg="browser chat scroll event"
                event="turn-directory-route-session-mismatch"

              The log carries session_id (the pane), key (the route
              session id), page_path, source, and event_count (directory
              turn count known before the request).

        - alert: TankTurnActivitySelectedLoadingStranded
          expr: |
            sum by (session_mode) (
              increase(tank_chat_scroll_client_events_total{event="turn-activity-selected-loading-stranded",surface="session"}[15m])
            ) > 0
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "selected Turns pane stayed on Loading activity with no active load state on session_mode={{`{{ $labels.session_mode }}`}}"
            runbook: |
              The browser rendered the selected turn's "Loading
              activity..." body for longer than the stuck threshold
              while its selected-turn load state was absent or
              unloaded. That is the hidden strand class: the UI is
              visibly waiting, but the load lifecycle telemetry has no
              corresponding in-flight request to observe.

              This alert is intentionally render-side. It fires from
              the actual condition that puts the spinner on screen, not
              from an inferred request lifecycle. Inspect structured
              orchestrator logs:

                msg="browser chat scroll event"
                event="turn-activity-selected-loading-stranded"

              The log carries session_id, previous_session_id, source
              (session-switch vs turns-selected), key (selected
              turn_id), reason (absent/unloaded), status code,
              turn_activity_shells, durable_active_turn_activity_shells,
              and activity_entries (the projected shell child count).
              If source=session-switch, start with the in-place
              session-change path: tail-bootstrap-reset, turn-directory
              reload, selected latest turn, then activity detail load.
              If activity_entries is nonzero, durable projection exists
              but the selected detail body is disconnected from it. If
              turn_activity_shells is zero, inspect the turn
              directory/timeline bootstrap path before the activity
              endpoint.

        - alert: TankTurnActivitySelectedLoadingSlow
          expr: |
            sum by (session_mode) (
              increase(tank_chat_scroll_client_events_total{event="turn-activity-selected-loading-slow",surface="session"}[15m])
            ) > 0
          for: 5m
          labels:
            severity: info
          annotations:
            summary: "selected Turns pane stayed on Loading activity with an in-flight load on session_mode={{`{{ $labels.session_mode }}`}}"
            runbook: |
              The browser rendered the selected turn's "Loading
              activity..." body for longer than the stuck threshold
              while a selected-turn activity request was still marked
              loading. This is not the no-load strand; compare with
              turn_activity_load_timed_out / turn_activity_load_failed
              session-event telemetry and the /activity handler logs.
              Structured chat-scroll logs for
              event="turn-activity-selected-loading-slow" carry the
              session_id and selected turn_id.

        - alert: TankBrowserTerminalLocalRunMismatch
          expr: |
            sum by (session_mode) (
              increase(tank_session_event_client_events_total{event="terminal_local_run_mismatch"}[15m])
            ) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "browser received a terminal event that matched no open local run on session_mode={{`{{ $labels.session_mode }}`}}"
            runbook: |
              The browser saw a durable turn terminal while currentRunRef
              was open, but the event matched neither client_nonce nor
              turn_id. This is a frontend correlation bug or a producer
              identity bug. Start with the terminal producer's event_id /
              turn_id construction and the App.tsx terminal matching path.

        - alert: TankTranscriptMaterializationInvariantViolation
          expr: |
            sum by (invariant, terminal_status) (
              increase(tank_transcript_materialization_invariant_violation_total[15m])
            ) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "transcript materialization violated {{`{{ $labels.invariant }}`}} for terminal_status={{`{{ $labels.terminal_status }}`}}"
            runbook: |
              The backend projected a durable transcript row state that
              contradicts the canonical session_events ledger. For the
              current known invariant, a turn_activity shell was still
              active even though the same turn had a terminal event in
              the locked projection input. This is a backend
              materializer regression, not a browser queueing bug.

        - alert: TankTurnNumberMissing
          expr: |
            sum by (phase) (
              increase(tank_turn_number_missing_total[15m])
            ) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "turn-activity shells materialized without a durable session_turns number (phase={{`{{ $labels.phase }}`}})"
            runbook: |
              A turn_activity shell was projected for a USER-VISIBLE turn
              that has no row in session_turns while durable numbering is
              active. The public route /sessions/{id}/turns/{n} cannot
              resolve such a turn and the UI cannot label it. Expectation
              is zero: the tank_session_events_allocate_turn_number
              trigger numbers every user-visible turn on its first
              session_events insert, and the 0086-0093 backfill numbered
              all pre-existing turns.

              Background-wake continuation turns (turn_bgtask-<task>) do
              NOT count here: migration 0139 excludes them from the
              allocator by design (they fold into their originating turn
              and must never be separately navigable), and the
              materializer's counter call site excludes them to match.
              If this fires naming a turn_bgtask-* id, the call-site
              exclusion regressed — see
              TestMaterializerDoesNotCountUnnumberedWakeTurnShells.

              Otherwise a nonzero rate means the allocation trigger
              regressed or an event carrying a turn_id reached
              session_events without firing it. Confirm the trigger is
              attached (SELECT tgname FROM pg_trigger WHERE tgrelid =
              'session_events'::regclass) and check session_turns for the
              turn_id named in the matching slog.Warn line
              "durable turn number missing for materialized shell".

        - alert: TankTranscriptRowMaterializationFailing
          expr: |
            sum by (result) (
              increase(tank_transcript_row_materialization_total{result=~"failed|timeout"}[15m])
            ) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "transcript row materialization {{`{{ $labels.result }}`}} before serving timeline/SSE"
            runbook: |
              The backend could not refresh session_transcript_rows from
              the canonical session_events ledger before a user-facing
              /timeline or transcript SSE read. This is a per-session
              on-demand path; it should not scale with pod count or slot
              count. Inspect orchestrator slog for
              "transcript materialization failed" and query
              tank_pg_backend_connections to distinguish a single huge
              historical session from database saturation.

        # Candidate C — reducer drop. Server emits a Tank event the
        # browser never confirms receiving. Threshold: 5% sustained
        # divergence on the same event_type for 10m. Sum across
        # session_mode on both sides so a mode-specific reducer bug
        # doesn't get hidden by a healthy mode.
        - alert: TankSessionEventClientEmitDivergence
          expr: |
            (
              sum by (event_type) (rate(tank_session_event_stream_emitted_by_type_total[10m]))
                - sum by (event_type) (rate(tank_session_event_client_received_total[10m]))
            )
              / clamp_min(sum by (event_type) (rate(tank_session_event_stream_emitted_by_type_total[10m])), 0.001)
              > 0.05
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "server emits of event_type={{`{{ $labels.event_type }}`}} exceed browser receipts by >5%"
            runbook: |
              The SSE handler is emitting Tank events the SPA reducer
              is filtering out before rendering. Inspect
              frontend/src/App.tsx → applySdkDurableEvent +
              isTankConversationEvent for the failing event_type; the
              counters increment from the SSE onmessage listener
              before the reducer filter, so any drop here is purely
              a frontend rendering concern.

        # Persist→wake latency tail. Catches "the publish is slow but
        # not failing" — the existing wake_publish_failure_total only
        # increments on outright errors. p99 > 100ms for 10m is the
        # signal that NATS is degraded enough to be user-visible on
        # the live-render path even though SSE clients still get the
        # events eventually.
        - alert: TankSessionEventPersistToWakeSlow
          expr: |
            histogram_quantile(
              0.99,
              sum by (le) (rate(tank_session_event_persist_to_wake_seconds_bucket[10m]))
            ) > 0.1
          for: 10m
          labels:
            severity: info
          annotations:
            summary: "session-event persist→wake p99 > 100ms for 10m"
            runbook: |
              NATS publish from the persister is taking longer than
              expected. SSE clients will see the events but with
              user-perceptible lag. Compare with tank_nats_disconnect_total
              and tank_nats_async_error_total — sustained publish
              latency tail with no connection flaps points at NATS
              server load (memory pressure on the JetStream stream,
              slow consumer warnings). Diagnostic only — does not
              page.

        # Transcript navigation latch. Fires when BOTH the browser-side
        # NavigationMode state machine reports rising "entered
        # historical-anchor" transitions AND the orchestrator-side
        # cursor-stagnation sampler observes idle sessions whose
        # conversation_read_state cursor lags the durable tail. The
        # AND is the load-bearing structure: the client signal alone
        # could be a real user gesture; the server signal alone could
        # be a user legitimately reading history. Both elevated at
        # once is the durable evidence the navigation-mode refactor's
        # retired bug class (or a regression in its shape) is
        # recurring.
        #
        # Reason granularity rides in the structured-log payload
        # (`reason="user-scroll-up"|"up-button"|…`); the durable
        # per-session lag computation lives at
        # GET /api/debug/conversation-read-state. The runbook walks
        # both surfaces.
        - alert: TankChatScrollUserAtBottomLatched
          expr: |
            (
              sum (
                rate(tank_chat_scroll_client_events_total{event="navigation-mode-entered-historical-anchor",surface="session"}[15m])
              ) > 0.05
            )
            and on()
            (
              sum (
                rate(tank_conversation_read_cursor_stagnant_total[15m])
              ) > 0.05
            )
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "transcript navigation latch: client mode-transition rate AND server cursor-stagnation rate both elevated"
            runbook: |
              The browser-side NavigationMode state machine reports
              ongoing transitions from live-tail to historical-anchor
              at >0.05/sec sustained for 15m, AND the orchestrator's
              cursor-stagnation sampler is observing idle sessions
              whose conversation_read_state cursor lags the durable
              tail at the same rate. Both elevated at once is the
              load-bearing evidence; either alone is ambiguous.

              Diagnostic surfaces (in escalation order):

              1. Aggregate trends —
                 tank_chat_scroll_client_events_total{event="navigation-mode-entered-historical-anchor"}
                 (client signal) and
                 tank_conversation_read_cursor_stagnant_total{session_mode, scope}
                 (server signal). The dashboard's "Transcript
                 navigation mode transitions" + "Conversation read
                 cursor stagnant sessions" panels carry both. If the
                 client rate moves but the server rate is flat, the
                 latch is producing transitions but cursors are still
                 catching up — the navigation-mode refactor is
                 absorbing the damage. If both move together, the
                 durable footprint is back.
              2. Durable per-session view —
                 GET /api/debug/conversation-read-state?session_id=<id>
                 returns sessions.activity_summary + the
                 conversation_read_state cursor + a computed
                 cursor_lags flag. The retired bug-class case
                 (session 269, 2026-05-27) had session_status="ready",
                 active_turn_id=null, cursor_lags=true. Pick an
                 affected user from the sampler's slog line
                 (msg="conversation read state sampler: pass complete")
                 and query this endpoint for each.
              3. SPA structured logs —
                 `slog grep '"browser chat scroll event".*"event":"navigation-mode-entered-historical-anchor"'`
                 carries the bounded `reason` field
                 (user-scroll-up, up-button, jump-oldest,
                 keyboard-home, session-open-anchored). A surge
                 dominated by reason=user-scroll-up while sessions
                 are durably idle (per #2) means an automatic
                 mechanism is misfiring as a gesture.
              4. Per-stream live state —
                 GET /api/debug/session-event-streams?session_id=<id>
                 shows last_emit_at, cursor_after_order_key,
                 emits_total. If emits_total kept climbing while
                 cursor_lags is true on the read-state surface,
                 the SSE wire was healthy and the latch is purely a
                 client-side regression.

              Source of truth: Postgres conversation_read_state and
              sessions tables. The retired bug class lived in the
              frontend at scripts/check-removed-chat-runtime.mjs's
              navigation-mode entry — the migration guard blocks
              reintroduction of the symbols by name.

        - alert: TankTurnTerminalMissingClientNonce
          expr: |
            sum by (source, event_type) (
              increase(tank_turn_terminal_missing_client_nonce_total[15m])
            ) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "durable terminal {{`{{ $labels.event_type }}`}} from {{`{{ $labels.source }}`}} is missing client_nonce"
            runbook: |
              A producer wrote a durable terminal turn event without
              client_nonce. The server-side lifecycle is closed, so
              TankTurnSilentStranding will not fire, but an already-open
              browser tab may fail to correlate the terminal to its local
              currentRunRef and keep follow-up input queued until refresh.
              Fix the producer to carry the submitted client_nonce on
              turn.completed / turn.failed / turn.command_failed /
              turn.interrupted. Pair with
              TankBrowserQueuedFollowupBlockedAfterTerminal for the
              user-visible browser symptom.

        - alert: TankStreamAuthTicketStoreFailures
          expr: rate(tank_stream_auth_ticket_total{result=~"store_unavailable|store_error"}[10m]) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "browser SSE stream auth ticket storage is failing"
            runbook: |
              Native EventSource cannot send Authorization headers. The
              browser must mint a short-lived stream ticket via
              POST /api/auth/stream-ticket before opening the transcript or
              sidebar SSE stream. Store failures here mean REST timeline
              reads can still work while live delivery never opens. Check
              Postgres connectivity and the stream_auth_tickets migration.

        # Silent-stranding alert. Agent Runners contract names this as a
        # counted bug class: "Silent strandings, where a requested action
        # has no terminal event, are a counted bug class." The signal is
        # divergence between turn.submitted (the open boundary, written by
        # the backend's persistBackendEvent) and the four terminal types
        # (turn.completed / turn.failed / turn.command_failed /
        # turn.interrupted, written either by the runner-side persister or
        # the backend-direct path). Both paths increment
        # tank_turn_lifecycle_total at the same durable Upsert boundary, so
        # the counter is path-independent.
        #
        # ea70777 (romaine-life/tank-operator#652) is the prototypical
        # incident: the orchestrator deploy bumped the JetStream subject
        # shape, every pre-existing runner kept subscribing on the OLD
        # filter, every submit_turn published to the new subject was
        # dropped, no terminal event ever fired. With this alert in place,
        # silent strandings of that shape page within ~30 minutes of the
        # deploy instead of waiting for a user bug report.
        #
        # Threshold tuning: window [15m], `> 2` divergence, `for: 20m`.
        # A single legit Codex turn that runs 15 minutes contributes +1
        # divergence inside the window; the `> 2` threshold and `for: 20m`
        # together require the divergence to exceed two open turns
        # sustained for 20+ minutes before firing. ea70777 would have
        # produced +6 divergence within 30 minutes (six pre-deploy
        # sessions, each emitting submit_turn with no terminal). False-
        # positive shape would require 3+ simultaneous long turns lasting
        # longer than the window, which is uncommon for this app's
        # workload.
        - alert: TankTurnSilentStranding
          expr: |
            sum(increase(tank_turn_lifecycle_total{event_type="turn.submitted"}[15m]))
              - sum(increase(tank_turn_lifecycle_total{event_type=~"turn\\.(completed|failed|command_failed|interrupted)"}[15m]))
              > 2
          for: 20m
          labels:
            severity: warning
          annotations:
            summary: "turn.submitted is outrunning terminal events — silent stranding"
            runbook: |
              The backend is persisting turn.submitted events faster than
              the runner is emitting turn.completed / turn.failed /
              turn.command_failed / turn.interrupted. Agent Runners
              contract names silent strandings (a submitted turn with no
              terminal event) as a counted bug class — this counter is
              the surface, this alert is the page.

              Likely causes, in priority order:
              (1) Runner JetStream consumer filter mismatch with the
                  orchestrator's publish subject — the ea70777 (PR #652)
                  failure shape. Verify via:
                    nats consumer info TANK_SESSION_BUS <provider>_*
                  against the wire shape in
                  backend-go/internal/sessionbus/subjects.go and
                  runner-shared/sessionBus.js. The CLAUDE.md migration
                  audit checklist names this exact gate.
              (2) Persister consumer dropping terminal events (compare
                  tank_session_event_persist_schema_rejected_total and
                  tank_session_event_persist_transient_failure_total).
              (3) Provider hanging on a long turn (check
                  tank_runner_provider_error_total per mode and runner
                  pod logs).

              Diagnose in Grafana with:
                sum by (event_type) (rate(tank_turn_lifecycle_total[5m]))
              The submitted line outpacing the terminal lines is the
              direct signature.

        # Per-session, durable-state stuck-turn detector. A fully-wedged
        # or crashed runner emits nothing and cannot fail its own turn,
        # so the turn sits in sessions.activity_summary.status =
        # "claimed"/"submitted" forever with no terminal — and a wedged
        # turn BOUNDARY leaves a session "streaming" forever the same
        # way (sessions 828/829, tank-operator#1085). The
        # orchestrator-side sampler (internal/stuckturns) flags both
        # classes on tank_sessions_stuck_in_progress{phase}:
        # phase=accepted (submitted/claimed unprogressed past 10m, above
        # the runner's 240s PROVIDER_RETRY_STALL_MS terminal) and
        # phase=streaming (ledger fully silent past 20m with the turn
        # still open). This is per-session and durable-state-based,
        # complementing the aggregate, rate-based
        # TankTurnSilentStranding above; the alert fires per phase
        # series.
        - alert: TankSessionStuckInProgress
          expr: tank_sessions_stuck_in_progress > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "a session is stalled with no durable terminal (phase {{`{{ $labels.phase }}`}}) past its stall threshold"
            runbook: |
              The durable source of truth is Postgres; the phase label
              says which stall class fired.

              phase=accepted: a turn was durably claimed/submitted but
              produced no turn.started/terminal for >10m. The
              orchestrator-side complement to the runner's api_retry
              rate-limit terminal (PROVIDER_RETRY_STALL_MS, 240s): the
              runner did NOT fail it (fully-wedged/crashed runner, or a
              stall class the runner can't see).

              phase=streaming: a turn made provider progress, then the
              session's ledger went fully silent for >20m with no
              terminal — the wedged-boundary class. A streaming hit is suspicion, not a verdict — a
              single long quiet tool call can legitimately exceed the
              threshold; one that persists well past it is almost
              certainly real. The stranded-turn sweep still owns the
              durable turn.command_failed terminal at its own 2h floor;
              this alert exists to beat the user to noticing.

              Localize with GET /api/debug/stuck-turns (lists session_ids
              + phase + stuck_seconds + last_event_at +
              provider_rate_limit_status), then read that session's
              runner logs and session_events tail.

              Distinguishes from TankTurnSilentStranding (aggregate
              submitted-vs-terminal rate) by being per-session and
              durable-state-based.

        # Persister backlog. The session-bus persister owns every durable
        # transcript write: when it falls behind, every session's UI
        # freezes at once while runners keep working invisibly — the
        # 2026-06-11 incident (tank-operator#1051). Both gauges read
        # JetStream consumer state, not Postgres rows, so this signal
        # survives the persister itself failing — the persist-fed alerts
        # (TankTurnSilentStranding, stop-chain) are blinded by exactly
        # the failure this one detects.
        - alert: TankSessionEventPersisterBacklog
          expr: |
            tank_session_event_persister_pending > 100
              or tank_session_event_persister_processed_event_age_seconds > 60
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "session-event persister is falling behind — transcripts are stale for every session"
            runbook: |
              The persister durable has a sustained undelivered backlog or
              is processing events whose producer timestamps are over a
              minute old. Users see every session frozen mid-turn while
              runners continue working.

              Localize with GET /api/debug/persister (per-session queue
              depths and ages) and the phase split in
              tank_session_event_persist_phase_seconds: a slow "refresh"
              phase means the transcript-row projection is the cost (the
              #1051 shape — check for a session with a giant turn); a slow
              "upsert" phase means Postgres itself (check
              TankPgQueryP99High). Sustained
              tank_session_event_redelivered_total growth alongside means
              messages are outliving AckWait and both replicas are
              duplicating work.

        # MaxDeliver exhaustion. A message that exhausts its deliveries is
        # never redelivered to the durable — without the advisory repair
        # path this is a silent, permanent transcript hole (the counted
        # bug class in docs/diagnostic-discipline.md §8). outcome="failed"
        # means the out-of-band repair ALSO failed and the hole is real
        # until the next startup reconciler pass.
        - alert: TankSessionEventPersistExhausted
          expr: sum(increase(tank_session_event_persist_exhausted_total[15m])) > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "session events exhausted MaxDeliver — ledger holes are being repaired or lost"
            runbook: |
              JetStream gave up redelivering one or more session events to
              the persister (MaxDeliver exhausted). outcome="repaired"
              rows were persisted out of band by the advisory handler;
              outcome="failed" rows are durable ledger holes until an
              orchestrator restart runs the reconciler
              (tank_session_event_reconciler_repaired_total counts its
              repairs). Root-cause the exhaustion itself via the persister
              backlog runbook above — exhaustion only happens when
              processing latency exceeded AckWait for 20 consecutive
              deliveries.

        # Stream truncation past the persister ack floor: retention
        # (discard=old, max_msgs/max_age) deleted events the persister
        # never persisted. Unrepairable — the events exist nowhere.
        # Steady-state expectation is zero forever; any increase means a
        # backlog was left unaddressed long enough for retention to eat
        # unpersisted history.
        - alert: TankSessionEventStreamTruncated
          expr: increase(tank_session_event_stream_truncated_past_ack_floor_total[1h]) > 0
          labels:
            severity: critical
          annotations:
            summary: "stream retention discarded events before the persister stored them — permanent ledger loss"
            runbook: |
              The TANK_SESSION_BUS stream's first sequence moved past the
              persister consumer's ack floor: retention deleted messages
              that were never written to session_events. The transcript
              ledger is permanently missing those events. This only
              happens after a long-unaddressed persister backlog
              (TankSessionEventPersisterBacklog fires first, hours
              earlier). Quantify the gap from the counter value and the
              reconciler's startup log line ("stream truncated past
              persister ack floor"), then assess which sessions lost
              events via the per-session order_key continuity.

        # Checkpointed-fold shadow divergence. Sampled folded batches
        # re-derive their written shells from the reference projection;
        # a divergence means the fold wrote rows the reference disagrees
        # with. It is auto-healed in the same transaction (the reference
        # re-projection overwrites and reseeds), so users never keep the
        # wrong rows — but the defect class must page, because every
        # unsampled fold batch with the same shape went uncorrected
        # until its next resync.
        - alert: TankTranscriptFoldShadowDivergence
          expr: sum(increase(tank_transcript_fold_shadow_total{result="divergence"}[1h])) > 0
          labels:
            severity: critical
          annotations:
            summary: "checkpointed-fold shadow compare diverged from the reference projection"
            runbook: |
              The slog.Error "transcript fold shadow divergence" names the
              session, row ids, and the per-field diff (fold= vs ref=).
              First rule out the #1130 lookahead shape: if the diff is
              ONLY activity.completedAt/endOrderKey lagging by events
              newer than the fold's batch, the shadow compared against
              ledger events the refresh queue hadn't dequeued yet — fixed
              by bounding the reference at the memo horizon; a recurrence
              of that shape means the horizon bound regressed, not the
              fold. For real defects, reproduce by replaying that
              session's ledger through
              TestFoldCheckpointEquivalenceOverFixtures-style prefix
              replay (capture the ledger via
              GET /api/debug/session-event-ledger, add it as a fixture;
              stage commit-ahead-of-dequeue lookahead like
              TestFoldShadowCompareIgnoresEventsPastFoldHorizon if the
              live shape involves an actively-flooding turn).
              Mitigate immediately by disabling the fold for the affected
              session (UPDATE session_transcript_fold_state SET memo=NULL,
              disabled=true WHERE tank_session_id='<id>') or fleet-wide by
              deleting all fold state — the reference pipeline is the
              always-correct fallback-free path and serves every read
              shape on its own.

        # Stranded-turn sweep activity. The sweep is the command-plane
        # four-outcome backstop: it terminals turns whose submit_turn
        # command or runner died silently. Each swept turn is a real
        # delivery loss the user experienced as a frozen chip, so any
        # sweep activity warrants a look at WHY commands are dying.
        - alert: TankStrandedTurnsSwept
          expr: sum(increase(tank_stranded_turn_swept_total{result="failed"}[30m])) > 0
          labels:
            severity: warning
          annotations:
            summary: "the stranded-turn sweep is terminaling turns — submit commands or runners are dying"
            runbook: |
              The sweep wrote durable turn.command_failed terminals for
              turns that were durably submitted but never finished, in
              sessions silent past the stranding floors. The terminal
              itself is correct recovery; this alert is about the cause.
              The slog line "stranded turn swept to durable terminal"
              carries session_id, turn_id, progressed, and source per
              sweep. progressed=false means no runner ever claimed the
              command (runner-consumer MaxDeliver exhaustion, dead runner
              process, or a publish that never landed — check the
              command-publish failure counter and the runner pod's
              restart count); progressed=true means a runner died
              mid-turn (check that pod's previous-container logs). A
              burst right after deploying the sweep is expected drain of
              historical strands; a steady rate afterward is live command
              loss.

        # Background-task wake fire failures. A Claude run_in_background task
        # that finishes while the session is idle registers a durable wake in
        # session_background_task_wakes; the orchestrator fire loop turns it
        # into a system turn. If that fire errors (enqueue/store), the agent
        # that backgrounded the task and ended its turn never resumes — a
        # silent stranding the Agent Runners contract counts. result=
        # "session_not_active" is excluded: a pod that died before its wake
        # fired is expected best-effort, not a bug.
        - alert: TankBackgroundTaskWakeFireFailing
          expr: sum(rate(tank_background_task_wake_fire_total{result=~"enqueue_failed|store_error"}[15m])) > 0
          for: 20m
          labels:
            severity: warning
          annotations:
            summary: "background-task wakes are registered but failing to fire"
            runbook: |
              A Claude background task finished and registered a durable wake
              row in session_background_task_wakes, but the orchestrator fire
              loop is erroring on enqueue/store, so the agent that backgrounded
              the task and ended its turn will not resume.

              Inspect "background task wake fire failed" slog lines and the
              tank_background_task_wakes_due gauge — a persistent backlog
              confirms the loop is stuck rather than hitting a transient error.
              The registration half (runner → backend) shows as
              tank_runner_background_task_wake_total{result="failed"}; a
              task-lifecycle terminal logged as sdk_task_lifecycle_unbound while
              registrations stay flat is the detection-regressed signature.

    - name: tank-operator.session-list
      rules:
        # K8s-watch producer is leader-elected. The lease should be
        # held by exactly one orchestrator replica at all times; sum
        # across replicas should be 1. Zero for an extended window
        # means the lease never got re-acquired after a roll, and pod
        # transitions are no longer driving sessions row updates — the
        # sidebar will go silent on pod_failed / pod_ready events.
        # Critical.
        - alert: TankSessionControllerLeaderMissing
          expr: sum(tank_session_pod_informer_leader_held) < 1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "no replica is holding the session-controller lease — sidebar SSE will stop reflecting pod transitions"
            runbook: |
              The leader-elected K8s watch that writes pod-state column
              updates to the sessions row is not running on any
              orchestrator replica. Pod evictions, readiness flips, and
              pod deletions will not propagate to the sidebar until the
              lease is re-acquired. Inspect orchestrator logs for
              `sessioncontroller k8s-watch: started leading` /
              `sessioncontroller k8s-watch: leader run failed`; verify
              the `tank-operator-session-controller` Lease in the
              orchestrator namespace and the
              `coordination.k8s.io/leases` RoleBinding.

        # Activity-delta emitter is the chat→sidebar bridge. A non-zero
        # failure rate means something between the chat-event persister
        # and the sessions row activity_summary update is broken — chat
        # sessions will still work end-to-end (the per-session SSE
        # remains durable) but the sidebar's status / unread indicators
        # will go stale.
        - alert: TankSessionActivityEmitterFailing
          expr: rate(tank_session_activity_delta_failure_total[10m]) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "chat→sidebar activity-delta emitter is failing"
            runbook: |
              The persister hook that turns chat events into
              session.activity_changed row updates is hitting store or
              publish errors. The sidebar's run-status / needs-input /
              unread-count indicators will lag actual chat state.
              Inspect orchestrator logs for `chat-activity emitter:`
              lines.

        - alert: TankSessionActivityLateInterruptIgnored
          expr: |
            sum by (status) (
              increase(tank_session_activity_late_interrupt_ignored_total[15m])
            ) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "activity fold ignored a late interrupt after status={{`{{ $labels.status }}`}}"
            runbook: |
              The chat→sidebar activity fold saw
              turn.interrupt_requested after the durable state was no
              longer active, so it preserved the terminal/ready/error
              projection instead of downgrading the session row to
              stopping. Check the originating stop request path and
              correlate with browser stale-running submit telemetry.

        # Row-update producer outcome. RowWriter is the single seam
        # the K8s watch and activity emitter write through; a non-zero
        # failure rate means the sessions row column update SQL is
        # erroring out and the sidebar will render stale state.
        - alert: TankSessionRowUpdatesFailing
          expr: rate(tank_session_row_updates_total{outcome="failed"}[10m]) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "sessions row UPDATE is failing — sidebar columns will drift"
            runbook: |
              RowWriter is failing to apply per-transition column
              updates (status / ready_at / terminating_at /
              activity_summary). The pre-write transition was already
              durable in the producer (K8s watch or persister), but
              the row's column values will lag observed state.
              Inspect logs for `sessioncontroller: row column update
              failed`.

        - alert: TankSessionContainerOOMKilled
          expr: |
            sum by (container) (
              increase(tank_session_container_terminations_total{reason="oom_killed"}[15m])
            ) > 0
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "session container {{`{{ $labels.container }}`}} was OOMKilled"
            runbook: |
              The leader-elected session K8s watch observed an OOMKilled
              container in a session pod. This is a runner/runtime failure
              signal, even when Kubernetes restarts the container and the pod
              later becomes Ready again. Correlate with the affected session's
              activity row, durable turn lifecycle, and scheduled wakeup rows;
              inspect orchestrator logs for `session container terminated`.

        # Crash-loop guard. tank_session_container_terminations_total already
        # counts every container exit by reason; only oom_killed had an alert.
        # An exit-1 "error" crash loop (the session 979 class: a runner resuming
        # a gone provider-session transcript) was counted but un-alerted, so it
        # looped silently. This pairs with the runner's provider-fatal terminal
        # and the orchestrator restart-budget backstop.
        - alert: TankSessionContainerCrashLooping
          expr: |
            sum by (container) (
              increase(tank_session_container_terminations_total{reason="error"}[15m])
            ) > 3
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "session container {{`{{ $labels.container }}`}} is crash-looping (reason=error)"
            runbook: |
              A session-pod container is exiting non-zero and being restarted by
              the kubelet (reason="error", distinct from oom_killed which has its
              own alert). The common cause is an agent-runner that cannot make
              progress on restart — e.g. a provider-session resume whose on-disk
              transcript was wiped by the restart ("No conversation found with
              session ID", the session 979 failure). The runner now reports
              session.provider_fatal{reason:provider_session_lost} and the K8s
              watch's restart-budget backstop reaps a pod still looping past the
              budget (tank_session_pod_reaped_total{reason="runner_crashloop"}).
              A sustained nonzero rate here WITHOUT a matching
              tank_session_pod_reaped_total increment means the backstop or the
              runner terminal path regressed — the loop is no longer being
              converted to a terminal Failed. Inspect runner logs
              (`claude_sdk_stderr`, "SDK query exited with error") and
              tank_runner_unrecoverable_exit_total.

        # Provider-fatal terminal. The loud, durable session-level failure that
        # replaced the silent crash-loop: a runner declared a session
        # unrecoverable, or the backstop reaped a crash-looping pod.
        - alert: TankSessionProviderFatal
          expr: increase(tank_session_provider_fatal_total{result="ok"}[15m]) > 0
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "a session was marked Failed by a runner provider-fatal report"
            runbook: |
              A pod-side runner reported an unrecoverable, session-terminal
              condition (POST /api/internal/sessions/{id}/provider-fatal); the
              session moved to Failed and its pod was reaped so the crash-loop
              stops. reason="provider_session_lost" is the
              conversation-transcript-gone-after-restart case (session 979). This
              is the terminal signal that replaced the silent loop — an expected,
              low rate. A spike means runners are dying unrecoverably; correlate
              with tank_runner_unrecoverable_exit_total and
              tank_session_pod_reaped_total{reason}.

        # Cross-scope event leak guard. The per-(owner, scope) NATS
        # subject prevents cross-scope delivery in steady state; if a
        # publisher ever lands a wrong-scope payload (regression of the
        # tank-operator#83 follow-up that scoped the wire shape), this
        # counter increments and the SSE handler drops the payload before
        # mutating client state. Any non-zero rate means cross-environment
        # leakage came back — page on first sighting, not over a long
        # window.
        - alert: TankSessionListCrossScopeLeak
          expr: rate(tank_session_list_cross_scope_events_dropped_total[10m]) > 0
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "session-list NATS payload arrived with the wrong session_scope"
            runbook: |
              A publisher emitted a session row-update payload whose
              embedded session_scope does not match the receiving
              orchestrator's scope. The (email, scope) subject shape
              makes this physically unreachable in steady state, so
              this is a producer-side regression — most likely
              `sessioncontroller.RowWriter.RecordTransition` or one
              of its callers passing a stale scope to the row-update
              publisher. Inspect orchestrator logs for `session row
              payload dropped: scope mismatch`.

    - name: tank-operator.nats
      rules:
        - alert: TankNATSReconnectStorm
          expr: rate(tank_nats_disconnect_total[5m]) > 0.1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "tank-operator's NATS client is reconnecting faster than 6/min"
            runbook: "JetStream session bus is unstable. Check the nats namespace's pod health and ServerCertificate."

        # Per-command publish-failure observability. The wake/event-list
        # publish counters above cover the raw nc.Publish path; this
        # alert covers the js.Publish command path the orchestrator uses
        # for submit_turn / interrupt_turn /
        # stop_background_task. The 2026-05-25 NATS quorum incident
        # produced sustained reason="no_response_from_stream" on
        # kind="submit_turn" — every chat submission failed silently,
        # the user only learned via the durable turn.command_failed
        # event the SPA rendered. Pages on any non-zero rate because
        # each failure is a user-visible "Submit failed" banner.
        - alert: TankSessionBusPublishFailing
          expr: sum(rate(tank_session_bus_command_publish_failure_total[5m])) by (kind, reason) > 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "session-bus js.Publish failing kind={{`{{ $labels.kind }}`}} reason={{`{{ $labels.reason }}`}}"
            runbook: |
              Every failed publish here is a stranded user submission:
              the backend persisted user_message.created + turn.submitted
              to the durable ledger, then could not publish the runner
              command. kind=submit_turn failures surface as
              turn.command_failed in the transcript and "Submit failed" /
              "Turn failed" banners to the user. kind=interrupt_turn
              failures surface as Stop not landing.

              reason="no_response_from_stream" — JetStream cluster has
              lost quorum or the stream is overloaded. Pair with
              TankJetStreamRaftAtRisk below and the NATS server-side
              "NO quorum, stalled" warnings in the `nats` namespace.

              reason="connection" — tank-operator's NATS client is
              unable to reach tank-nats. Pair with TankNATSReconnectStorm.

              reason="timeout" / "canceled" — the publish context
              expired before the stream ack arrived. Usually a
              symptom of upstream pressure, not a transport bug.

        # JetStream consumer stalled: pending messages with no delivery
        # progress. Catches the per-session consumer regression shape
        # where a runner consumer exists but is not draining work — the
        # orchestrator keeps publishing submit_turn commands that the
        # runner never receives. Compare with the prior 2026-05-25
        # incident: the cluster-level "NO quorum" warnings appear at
        # the producer side (TankSessionBusPublishFailing above), but a
        # post-quorum-recovery world can still have individual
        # consumers stuck due to redelivery storms, orphaned
        # consumers, etc.
        - alert: TankJetStreamConsumerStalled
          expr: |
            sum by (stream_name, consumer_name) (nats_consumer_num_pending{stream_name="TANK_SESSION_BUS"})
              > 0
              unless on(stream_name, consumer_name)
                (changes(nats_consumer_delivered_consumer_seq{stream_name="TANK_SESSION_BUS"}[5m]) > 0)
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "JetStream consumer {{`{{ $labels.consumer_name }}`}} on {{`{{ $labels.stream_name }}`}} has pending messages with no delivery progress for 5m"
            runbook: |
              Either the consuming runner pod is gone (a session was
              deleted but the durable consumer was orphaned), or the
              cluster lost write quorum and acks cannot land. Check NATS
              server logs in the nats namespace for "has NO quorum,
              stalled" warnings. If quorum is healthy, enumerate active
              session pods and remove orphan consumers via the nats CLI
              in nats-box. The consumer naming convention is
              "{provider}_{storage_key}" for data-plane and
              "{provider}_control_{storage_key}" for control-plane —
              see backend-go/internal/sessionbus/subjects.go.

        # JetStream Raft at risk: cluster-level signals that quorum is
        # in danger BEFORE consumers actually stall. The 2026-05-25
        # incident's early warning was that one NATS pod's readloop
        # processing time climbed to 2-3s under host CPU pressure;
        # the per-server prom exporter does not expose readloop
        # processing time directly, but two adjacent signals do:
        # meta_pending climbs when Raft replication falls behind, and
        # slow_consumers > 0 indicates the server is struggling to
        # drain subscribers (which under enough pressure produces the
        # same Raft-stall outcome).
        - alert: TankJetStreamRaftAtRisk
          expr: |
            max(nats_varz_jetstream_meta_pending) > 50
              or max(nats_varz_slow_consumers) > 0
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "NATS JetStream Raft is backlogged (meta_pending > 50 or slow_consumers > 0)"
            runbook: |
              The 2026-05-25 chat-submission outage started here: a
              single NATS replica got starved of CPU on a saturated
              node, its Raft readloop fell behind, the R=2 cluster
              lost quorum, every TANK_SESSION_BUS command publish
              failed for ~10 minutes. The infra-bootstrap chart now
              runs cluster.replicas: 3 with required-hostname
              podAntiAffinity and Burstable QoS to prevent the
              co-tenancy + CPU-starvation shape, but this alert is
              the early warning: by the time
              TankJetStreamConsumerStalled or TankSessionBusPublishFailing
              fires, users are already seeing "Submit failed".
              Check `kubectl top nodes` for the node hosting the
              affected tank-nats pod and verify each NATS replica is
              on its own node (anti-affinity guarantees this but a
              drain/upgrade window can temporarily violate it).

        # Orphan-consumer sweep failing. The sweep is the durable
        # remediation for stranded JetStream consumers (per-session
        # data/control consumers that nothing deletes when a session
        # goes away). If the sweep itself is broken, consumers
        # accumulate without bound and eventually saturate the
        # JetStream memory budget — observed at 725 consumers / 6
        # live sessions on 2026-05-25. Sibling to
        # TankSessionBusOrphanConsumersHigh below: this alert is
        # "the cleanup tool is broken"; that one is "the cleanup
        # tool is running but the backlog is growing anyway."
        - alert: TankSessionBusOrphanSweepFailing
          expr: rate(tank_session_bus_orphan_sweep_passes_total{result="error"}[1h]) > 0
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "orphan-consumer sweep has failed every pass in the last hour"
            runbook: |
              Per-pass slog line is "orphan consumer sweep failed"
              (NATS list-consumers error) or "orphan consumer sweep:
              list live sessions failed" (Postgres error). Inspect
              tank-operator pod logs for the surrounding error.
              Pair with TankNATSReconnectStorm (NATS-side) and
              TankPgConnectionSaturation (Postgres-side) — the
              sweep depends on both being healthy.

        # Orphan consumers stayed high across multiple sweep cycles.
        # The sweep runs hourly with a 15-minute MinAge floor; if
        # this alert fires, deletes are either failing or new orphans
        # are being created faster than the sweep can keep up. The
        # 50-orphan threshold is roughly "an order of magnitude
        # higher than legitimate active-consumer headroom" — 6
        # active sessions × 2 consumers/provider × 2 providers = ~25
        # legitimate; a sustained 50+ orphans means the cleanup is
        # not keeping pace.
        - alert: TankSessionBusOrphanConsumersHigh
          expr: tank_session_bus_orphan_consumers > 50
          for: 4h
          labels:
            severity: warning
          annotations:
            summary: "tank_session_bus_orphan_consumers stayed > 50 for 4h despite sweep running"
            runbook: |
              The sweep observed > 50 orphan-eligible consumers for
              four consecutive hourly passes. Two failure modes:
              (a) deletes are failing — check
              tank_session_bus_orphan_consumer_delete_errors_total
              rate; non-zero means NATS is refusing to remove
              consumers (server-side ACL? consumer in a bad state?).
              (b) deletes are succeeding but new orphans are being
              created faster than cleanup — check
              rate(tank_session_bus_orphan_consumers_deleted_total[1h])
              against rate(tank_session_bus_consumers_scanned[1h]).
              The consumer naming convention is
              `{provider}_{scopeToken}_{sessionIdToken}` (data plane)
              and `{provider}_control_{scopeToken}_{sessionIdToken}`
              (control plane); see
              backend-go/internal/sessionbus/sweep.go for the parser.

    - name: tank-operator.nats-auth-callout
      rules:
        # Per-session NATS credential issuer (#1128). Session pods present
        # their projected SA token to the auth-callout and receive a NATS
        # user JWT scoped to their own session; a rejection here means the
        # pod's runner cannot connect to the session bus and its submitted
        # turns stay stuck with no terminal — the #1148 "Authorization
        # Violation" failure class. denied_no_credentials is excluded: a
        # correctly-provisioned session pod always presents its token as the
        # password, so a no-credentials connect is a stray probe, not a
        # stranded session.
        - alert: TankNatsAuthCalloutDenials
          expr: sum by (result) (rate(tank_nats_auth_callout_total{result=~"denied_token_invalid|denied_auth_exchange|denied_auth_jwt_invalid|denied_subject_untrusted|denied_identity_mismatch|error"}[10m])) > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "nats-auth-callout is rejecting session-pod NATS auth (result={{`{{ $labels.result }}`}})"
            runbook: |
              A session pod presented its auth.romaine.life-audience pod
              token to the NATS auth-callout and was rejected, or the callout
              errored issuing the user JWT. The pod's runner cannot connect to
              the session bus, so its submitted turns stay stuck with no
              terminal — the #1148 failure class.

              Inspect the callout logs (deployment nats-auth-callout,
              container `callout`, namespace tank-operator) for the matching
              slog.Warn line and value of {{`{{ $labels.result }}`}}:
                denied_token_invalid      — the auth exchange response could
                    not be decoded or did not include a token.
                denied_auth_exchange      — auth.romaine.life rejected the
                    projected token or could not resolve pod lineage.
                denied_auth_jwt_invalid   — auth.romaine.life returned a token
                    the local JWKS verifier rejected.
                denied_subject_untrusted  — the ServiceAccount is not the
                    tank per-session service principal shape
                    (svc:tank:<id> or svc:tank:slot-N-session-<id>).
                denied_identity_mismatch  — the client's claimed NATS_USER
                    does not match the auth.romaine.life service identity.
                error                     — JWT issuance failed inside the
                    callout (issuer seed / nkey problem).
              Confirm tank_nats_auth_callout_total{result="session"} is
              still incrementing (healthy pods) and grep the affected
              session pod's runner logs for NATS "Authorization Violation".

    - name: tank-operator.api-proxy
      rules:
        - alert: TankApiProxyRefreshStorm
          expr: rate(tank_api_proxy_upstream_401_total[5m]) > 0.5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "api-proxy ({{`{{ $labels.provider }}`}}) is seeing upstream 401s > 0.5/s for 5m"
            runbook: "Refresh-storm signature. Check the refresh-token chain in KV; the single-flight gate may be failing to dedupe."

        - alert: TankApiProxyRefreshFailures
          expr: rate(tank_api_proxy_token_refresh_total{result!="success"}[10m]) > 0
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "api-proxy ({{`{{ $labels.provider }}`}}) cannot rotate its OAuth refresh chain"
            runbook: "All inbound requests will eventually 401. Inspect ext-proc logs for `refresh failed` / `refresh request crashed`."

        # Sustained upstream 429s = the shared provider account's usage cap is
        # exhausted. This is the upstream-cause view of the rate-limit-stall
        # class: pod-side runners convert a stuck rate-limit retry into a
        # durable turn.failed{reason:provider_rate_limit} (PROVIDER_RETRY_STALL_MS)
        # and the orchestrator's TankSessionStuckInProgress catches any that
        # still wedge — this alert says WHY (the account is being throttled),
        # not just that a turn stalled. Threshold tolerates transient single
        # 429s the SDK retries through (a real cap-exhaustion sustains a high
        # 429 count over 15m). Per-session attribution of which session is
        # consuming the cap is not yet wired (needs an SDK request-header hook;
        # see docs/api-proxy-auth.md "Per-session attribution").
        - alert: TankApiProxyRateLimited
          expr: increase(tank_api_proxy_upstream_429_total[15m]) > 20
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "api-proxy ({{`{{ $labels.provider }}`}}) upstream 429s sustained — provider usage cap likely exhausted"
            runbook: "The shared provider account is being rate-limited (429s from api.anthropic.com / chatgpt.com). Confirm with the provider usage endpoint and the runner-side tank_runner_provider_api_retry_total{error=\"rate_limit\"} rate. Affected turns resolve to turn.failed{reason:provider_rate_limit} (runner) and any wedged ones surface on TankSessionStuckInProgress + GET /api/debug/stuck-turns. Mitigate by spreading load or raising the account cap; there is currently no per-session attribution of cap consumption (dependency-gated — see docs/api-proxy-auth.md)."

        # KV write-back is best-effort by design (a rotation updates memory
        # first and serves immediately), but a SUSTAINED failure is the
        # "restart-bomb precursor" (docs/api-proxy-auth.md → Failure modes):
        # the proxy is rotating fine in memory, but the next restart re-reads a
        # stale Secret and replays an already-used refresh token → refresh_token_reused
        # → chain death → wizard recovery. The keeper (run_refresh_keeper) writes
        # back on boot + before expiry, so steady-state is zero; a non-zero rate
        # over 15m means the write path itself is broken (UAMI/KV RBAC, KV
        # outage). Provider-generic — covers managed provider proxies.
        - alert: TankApiProxyKvPersistFailing
          expr: increase(tank_api_proxy_kv_persist_total{result="failure"}[15m]) > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "api-proxy ({{`{{ $labels.provider }}`}}) cannot persist rotated tokens to KV"
            runbook: "Rotations are succeeding in memory but not writing back to KV — the restart-bomb precursor. Grep ext-proc logs for `KV write failed`; check the api-proxy UAMI's Key Vault Secrets Officer role and KV reachability (az keyvault secret show --vault-name romaine-kv --name <provider>-credentials --query attributes.updated). Until fixed, do NOT restart the proxy pod: the next boot will re-read a stale Secret. Run the credential wizard to recover if the provider reports refresh_token_reused after restart."

        - alert: TankApiProxyEnvoySdsKeyRotationFailed
          expr: max_over_time(tank_api_proxy_envoy_sds_key_rotation_failed[15m]) > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "api-proxy ({{`{{ $labels.provider }}`}}) Envoy SDS key rotation failed for {{`{{ $labels.secret }}`}}"
            runbook: "Envoy reported a filesystem SDS key-rotation failure. Check the proxy pod's /etc/envoy/tls mounted Secret, cert-manager Certificate readiness, and Envoy logs. A healthy cert-manager Certificate is not enough; Envoy must load the new leaf through SDS."

        - alert: TankApiProxyEnvoySdsStatsScrapeFailing
          expr: rate(tank_api_proxy_envoy_sds_stats_scrape_total{result="failure"}[10m]) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "api-proxy ({{`{{ $labels.provider }}`}}) cannot scrape pod-local Envoy SDS stats"
            runbook: "The ext_proc metrics sidecar cannot read http://127.0.0.1:9901/stats from the Envoy sidecar. Check that Envoy admin is still bound to localhost:9901 and that the Envoy container is healthy. Prometheus cannot see SDS rotation health until this recovers."

    - name: tank-operator.provider-credential-health
      rules:
        # Layer 1 has been "failed" for >5m. The transcript banner is
        # already surfacing the failure to every active session in the
        # affected mode; this alert is for the on-call to act on the
        # operational side (re-sign-in flow, KV rotation, etc.). Steady-
        # state expectation is zero. Sibling to
        # TankApiProxyRefreshFailures: the proxy alert fires on raw
        # refresh-rate; this alert fires on the orchestrator's debounced
        # Layer 1 status (which is what the user actually sees).
        - alert: TankProviderCredentialFailed
          expr: tank_provider_credential_health_status{status="failed"} == 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "provider credential {{`{{ $labels.provider }}`}} ({{`{{ $labels.scope }}`}}) in failed state for 5m"
            runbook: "Every active session whose mode requires this provider is currently rendering a session.status:failed banner in its transcript. Inspect tank_api_proxy_token_refresh_total{result!=\"success\"} to confirm the proxy-side cause, then run the re-sign-in flow / rotate the KV refresh blob."

        # The poller itself is broken — we're not getting fresh data
        # from the proxy. The transcript banner state is therefore
        # frozen at whatever it last observed. Sub-alerts on
        # TankApiProxyRefreshFailures cover proxy-internal issues; this
        # alert covers the orchestrator-side wire (DNS, TCP, JSON
        # decode, etc.).
        - alert: TankProviderHealthPollerStuck
          expr: rate(tank_provider_credential_poll_total{outcome="ok"}[10m]) == 0
            and rate(tank_provider_credential_poll_total{outcome="error"}[10m]) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "providerhealth poller ({{`{{ $labels.provider }}`}}) is erroring on every poll for 10m"
            runbook: "Layer 1 row is stale and the transcript banner state cannot update. Inspect orchestrator slog for `providerhealth poll failed` and the proxy's /health/<provider> response."

    - name: tank-operator.mcp-auth-proxy
      rules:
        - alert: TankMCPAuthProxySATokenReadFailures
          expr: rate(tank_mcp_auth_proxy_sa_token_read_total{result="failure"}[10m]) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "mcp-auth-proxy cannot read the projected ServiceAccount token"
            runbook: "kubelet's projected token volume is broken on this session pod. MCP calls will 503. Restart the pod or investigate kubelet."

        - alert: TankMCPAuthProxyUpstream5xx
          expr: sum(rate(tank_mcp_auth_proxy_requests_total{status_class="5xx"}[5m])) by (mcp_server) > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "MCP server {{`{{ $labels.mcp_server }}`}} is returning 5xx > 0.05 req/s for 5m"

    - name: tank-operator.runners
      rules:
        - alert: TankRunnerProviderErrorRate
          expr: rate(tank_runner_provider_error_total[5m]) > 0.1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "pod-side runner ({{`{{ $labels.mode }}`}}) provider errors > 0.1/s for 5m"
            runbook: "Inspect the affected session pod's claude-runner / codex-runner logs."

        - alert: TankScheduledWakeupsOverdue
          expr: max_over_time(tank_scheduled_wakeups_due[15m]) > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Durable ScheduleWakeup rows are due but not terminal"
            runbook: "Inspect session_scheduled_wakeups rows and tank_scheduled_wakeup_fire_total for failed backend submission attempts."

        # ----- "Stop is not stopping" self-telling alerts -----
        #
        # These exist because the prior failure mode was invisible: PR #481
        # made the stop request durable (chip renders, runStatus=stopping)
        # but a JetStream max_ack_pending=1 on the runner's command consumer
        # held the interrupt_turn command behind the in-flight submit_turn,
        # so the runner never delivered the interrupt, the SDK never
        # interrupted, and the user only learned via "the agent kept going
        # for 5 more minutes." See docs/tank-conversation-protocol.md →
        # "Durable turn interruption" for the control-plane split that
        # fixes it. The two alerts below tell on a regression of either
        # stage of the chain so a future change can't silently re-break it.
        #
        # Stage 0 — backend accepted a Stop POST but could not resolve the
        # targeted turn against durable state, persist turn.interrupt_requested,
        # or publish the interrupt command. Symptoms: the button click reaches
        # the backend but the product never gets a durable stopping or terminal
        # state. Root cause universe: session-events database read/write
        # failure, terminal lookup regression, or session-bus publish failure.
        - alert: TankStopBackendFailed
          expr: increase(tank_turn_interrupt_request_total{outcome=~"terminal_lookup_failed|persist_failed|publish_failed"}[10m]) > 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Backend failed to durably resolve a Stop request"
            runbook: |
              The orchestrator received a Stop request but could not complete
              the durable boundary: it either failed the terminal-state lookup,
              failed to persist turn.interrupt_requested, or failed to publish
              the interrupt_turn command. The UI must not be left to infer
              progress from a click alone. Check the tank-operator logs for
              the matching interrupt request outcome, then inspect the
              session-events store and session-bus health for the affected
              session.

        # Stage 1 — backend persisted a request, runner control consumer
        # never claimed an interrupt_turn command. Symptoms: the user
        # presses Stop, the chip renders, nothing else happens. Root cause
        # universe: control-plane consumer is unhealthy / JetStream subject
        # routing regressed / backend published to the wrong subject.
        - alert: TankStopNotDelivered
          expr: |
            sum(rate(tank_turn_interrupt_request_total{outcome="persisted"}[5m]))
              - sum(rate(tank_runner_commands_consumed_total{kind="interrupt_turn"}[5m]))
              > 0
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "Stop requests are being persisted faster than runners are receiving them"
            runbook: |
              Stop is silently broken. The backend keeps recording
              turn.interrupt_requested rows (and the SPA shows the chip) but
              the runner's control-plane JetStream consumer is not claiming
              the interrupt_turn commands. This is the exact failure mode
              the data/control plane split was designed to prevent — if
              this alert fires, the split has regressed or one side of the
              wire shape drifted. Check:
              (1) backend-go/internal/sessionbus.SubjectForCommand still
              routes CommandInterrupt to ControlSubject;
              (2) runner-shared/sessionBus.js controlSubject() matches the
              Go ControlSubject wire shape;
              (3) the per-session control consumer (named "{provider}_control_{storage}")
              exists and is consuming on JetStream.

        # Stage 2 — runner claimed an interrupt but the SDK / codex
        # AbortController never produced a terminal event for the active
        # turn. Symptoms: turn keeps emitting tool events past the
        # interrupt; chip is durable; sidebar stays in "stopping" until
        # the provider naturally finishes. Root cause universe:
        # sdkQuery.interrupt() is failing silently inside the Claude SDK,
        # codex Thread.runStreamed isn't honoring the abort signal, or the
        # runner is failing to publish turn.interrupted.
        - alert: TankStopNotTerminated
          expr: |
            sum(rate(tank_runner_commands_consumed_total{kind="interrupt_turn",result="accepted"}[5m]))
              - sum(rate(tank_runner_turn_duration_seconds_count{outcome="interrupted"}[5m]))
              > 0
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "Runners are accepting interrupts but not producing terminal turn.interrupted events"
            runbook: |
              The control-plane consumer is delivering interrupts to the
              runner, but the runner isn't emitting durable turn.interrupted
              events at the same rate. The SDK / codex Thread is likely
              ignoring the interrupt, OR the runner is failing to publish
              the terminal event. Check the affected session pod's
              claude-runner / codex-runner logs for the "session bus publish
              failed" line and for "providerErrorTotal{operation=interrupt}".

        # Stage 3 (post-#532) — runner accepted an interrupt but didn't
        # drain it to any terminal-outcome bucket on
        # tank_runner_interrupt_outcome_total. The four-outcome contract
        # (see docs/tank-conversation-protocol.md → "Four-outcome contract
        # on the runner side") guarantees that every accepted interrupt
        # produces exactly one increment in a terminal-outcome bucket
        # (terminated_via_sdk, terminated_pre_sdk, orphaned, publish_failed,
        # turn_already_terminal, or invalid_target). "buffered" is a
        # transient arrival counter that must drain; if buffered arrivals
        # outrun terminal-outcome resolutions, an interrupt is stuck.
        #
        # This is stricter than TankStopNotTerminated above — that alert
        # counts only the happy-path turn.interrupted terminal via the
        # duration histogram. This alert catches every silent stranding
        # the pre-#532 shape produced, including the buffer-and-apply
        # race resolution and publish-failed fallback paths.
        - alert: TankStopOutcomeStranded
          expr: |
            sum(rate(tank_runner_interrupt_outcome_total{outcome="buffered"}[5m]))
              - sum(rate(tank_runner_interrupt_outcome_total{outcome=~"terminated_via_sdk|terminated_pre_sdk|orphaned|publish_failed|turn_already_terminal|invalid_target"}[5m]))
              > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Runner-buffered interrupts are not draining to a terminal outcome"
            runbook: |
              An interrupt_turn was accepted on the runner's control plane
              and held in the pendingInterrupts buffer waiting for a
              matching submit_turn, but did not drain within the buffer
              window AND did not produce an orphan terminal. This is a
              regression of the #532 buffer-and-apply contract — the
              runner's `acceptInterrupt` / `applyInterruptToTurn` /
              `expireBufferedInterrupt` paths are no longer covering every
              accepted interrupt. Check the affected runner pod's logs
              for `expireBufferedInterrupt failed`; check that
              `tank_runner_interrupt_outcome_total` exposes all the
              outcome labels listed in the alert expression.

        # Stage 4 (post-#532) — every retry to publish a turn.interrupted
        # event failed and the fallback turn.failed{publish_interrupt_failed}
        # also exhausted its retries. The user pressed Stop, the runner did
        # call sdkQuery.interrupt() (load-bearing side of #532), but every
        # attempt to land a durable terminal hit a publish error. JetStream
        # redelivery on the original interrupt_turn command will retry; if
        # this alert persists, redelivery isn't helping either.
        #
        # Most likely causes: oversized event payload (max_payload exceeded,
        # deterministic — see #532 Stage 3 follow-up for the truncation
        # plan), JetStream connectivity blackout, persister deadlock.
        - alert: TankStopPublishFailed
          expr: increase(tank_runner_interrupt_outcome_total{outcome="publish_failed"}[10m]) > 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Runner exhausted retries publishing a turn.interrupted terminal"
            runbook: |
              The runner's publishTerminalWithRetry exhausted attempts for
              both turn.interrupted and the turn.failed{publish_interrupt_failed}
              fallback. The SDK was (best-effort) interrupted; the durable
              ledger has no terminal for this stop yet, so the UI is in
              "stopping". Check the affected runner pod's logs for
              `'payload' max_payload size exceeded` (oversized event,
              #532 Stage 3) or sustained NATS disconnect. JetStream
              redelivery will retry on ack_wait expiry; this alert clears
              once one delivery succeeds.

        # Stage 5 (post-#532 PR 3) — sustained payload-dropped truncations.
        # An event was so large that even aggressive string truncation
        # couldn't fit it under the transport budget; the entire payload
        # was replaced with a __payload_dropped marker. The durable
        # ledger still records the event envelope, but the body is
        # unrecoverable from the wire path. One-off events from
        # legitimate giant outputs (Read of a 10 MB file) are expected;
        # a sustained rate means a producer is emitting bodies that need
        # to chunk or stream rather than land as one Tank event.
        #
        # Severity is `warning` (not critical) because the durable ledger
        # is intact and the user-visible transcript degrades gracefully;
        # the alert is the signal that a producer needs work, not that
        # the system is broken.
        - alert: TankEventPayloadDropped
          expr: sum by (event_type) (rate(tank_runner_event_truncated_total{severity="payload-dropped"}[15m])) > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Sustained tank_runner_event_truncated_total{severity=payload-dropped} for {{`{{ $labels.event_type }}`}}"
            runbook: |
              An event_type producer is emitting payloads so large that
              even string-by-string truncation can't fit them under
              SESSION_EVENT_MAX_BYTES (default 900 KiB). The durable
              ledger contains the envelope plus a __payload_dropped
              marker; the body is gone. Look at the adapter or
              tool-result path for {{`{{ $labels.event_type }}`}} and either
              chunk the source (tool_result.output streaming, Read with
              an offset/limit window) or raise SESSION_EVENT_MAX_BYTES
              if the upstream transport can accept it (NATS
              max_payload would need to rise in lockstep — currently
              1 MiB default).

    # Session spawn observability. The user-visible latency budget for
    # `POST /sessions` -> ContainersReady is "fast unless the chosen node
    # has to pull a ~700MB session image." Recording rules below collapse
    # the per-pod kube_pod_status_*_time series from kube-state-metrics
    # into single aggregate scalars to stay within docs/observability.md's
    # forbidden-labels list (pod, instance, etc are not allowed in stored
    # tank_* series). The dashboard's per-pod panels render the same
    # primitives on-demand, where cardinality is bounded by browser session.
    #
    # Namespace selector matches both the production sessions namespace
    # (`tank-operator-sessions`) and every test-slot sessions namespace
    # (`tank-operator-slot-<N>-sessions`). Without the slot coverage,
    # FailedScheduling pressure in the slots — where the orchestrator
    # is exercised end-to-end during change validation — would never
    # surface to TankSessionSpawnSlow* even though kube-state-metrics
    # has the data. Cardinality stays at three recording series total
    # because the aggregations collapse across pods AND namespaces.
    #
    # Thresholds are calibrated against the 7-day baseline observed at
    # introduction: warm-cache spawns cluster at 2-3s, cold pulls at
    # 27-33s, with a few partial-cache spawns in between. The 5s/60s
    # numbers target two distinct failure modes (see runbook annotations);
    # a single threshold percentile would either over-fire on the
    # bimodal distribution or never catch the regression mode.
    - name: tank-operator.session-spawn
      rules:
        - record: tank:session_pod_spawn_seconds:p50_24h
          expr: |
            quantile(0.5,
              (kube_pod_status_container_ready_time{namespace=~"tank-operator(-slot-[0-9]+)?-sessions"}
                - on(pod, namespace) kube_pod_created{namespace=~"tank-operator(-slot-[0-9]+)?-sessions"})
              and on(pod, namespace) (time() - kube_pod_created{namespace=~"tank-operator(-slot-[0-9]+)?-sessions"} < 86400)
            )

        - record: tank:session_pod_spawn_seconds:p95_24h
          expr: |
            quantile(0.95,
              (kube_pod_status_container_ready_time{namespace=~"tank-operator(-slot-[0-9]+)?-sessions"}
                - on(pod, namespace) kube_pod_created{namespace=~"tank-operator(-slot-[0-9]+)?-sessions"})
              and on(pod, namespace) (time() - kube_pod_created{namespace=~"tank-operator(-slot-[0-9]+)?-sessions"} < 86400)
            )

        - record: tank:session_pod_spawn_seconds:max_1h
          expr: |
            max(
              (kube_pod_status_container_ready_time{namespace=~"tank-operator(-slot-[0-9]+)?-sessions"}
                - on(pod, namespace) kube_pod_created{namespace=~"tank-operator(-slot-[0-9]+)?-sessions"})
              and on(pod, namespace) (time() - kube_pod_created{namespace=~"tank-operator(-slot-[0-9]+)?-sessions"} < 3600)
            )

        - alert: TankSessionSpawnSlowOutlier
          expr: tank:session_pod_spawn_seconds:max_1h > 60
          for: 0m
          labels:
            severity: info
          annotations:
            summary: "A session-pod spawn in the last hour took over 60s"
            runbook: |
              A single user waited more than 60s for their session, which is roughly
              double the worst observed cold-pull baseline. Diagnostic only — does
              not page. Use the "Per-pod spawn duration (recent)" panel to identify
              the pod and its namespace (prod is `tank-operator-sessions`; test
              slots are `tank-operator-slot-<N>-sessions`), then
              `kubectl describe pod <name> -n <namespace>` for the event timeline
              (FailedScheduling, Pulling/Pulled events with their durations).
              Common causes: FailedScheduling from cluster CPU/memory pressure
              (`kubectl top nodes` to confirm — typically pinned by aggregate
              request packing, not actual usage), registry throttling, network
              egress congestion from the AKS node to ACR, or an oversized image
              bump.
{{- end }}
{{- end }}
