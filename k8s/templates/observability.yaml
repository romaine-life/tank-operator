{{- /*
Observability surface for tank-operator: ServiceMonitor / PodMonitor /
PrometheusRule resources discovered by the kube-prometheus-stack
deployed in the `monitoring` namespace.

Conditional on observability.enabled so an environment without the
Prometheus operator CRDs renders cleanly. docs/observability.md is the
contract — the metric names referenced in PromQL below must match the
Counter/Histogram declarations in:

  - backend-go/cmd/tank-operator/observability.go
  - backend-go/cmd/tank-operator/middleware_http.go
  - backend-go/internal/pgstore/tracer.go
  - agent-runner/src/metrics.ts
  - codex-runner/src/metrics.ts
  - api-proxy/src/tank_api_proxy/metrics.py
  - claude-container/mcp-auth-proxy/src/mcp_auth_proxy/metrics.py
*/}}
{{- if .Values.observability.enabled }}
---
# ServiceMonitor: orchestrator. /metrics on the existing http port (same
# listener as /api/*). 30s scrape; metrics latency budget allows it.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: tank-operator
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
  labels:
    app.kubernetes.io/name: tank-operator
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: tank-operator
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.observability.scrapeInterval | default "30s" | quote }}
      scrapeTimeout: 10s
---
# ServiceMonitor: api-proxy deployments (Claude + Codex). Both Services
# expose the metrics sidecar port; the `provider` label on each metric
# distinguishes the two at query time.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: tank-api-proxy
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
  labels:
    app.kubernetes.io/name: tank-api-proxy
spec:
  selector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values: [claude-api-proxy, codex-api-proxy]
  endpoints:
    - port: metrics
      path: /metrics
      interval: {{ .Values.observability.scrapeInterval | default "30s" | quote }}
      scrapeTimeout: 10s
---
# PodMonitor: session pods. The PodMonitor scrapes the mcp-auth-proxy
# sidecar and (for claude_gui / codex_gui sessions) the runner sidecar.
# Session pods are ephemeral — scrape interval 15s gives the operator a
# realistic chance of catching at least one sample from a short-lived
# session before the pod terminates and its series ages out.
#
# Cardinality discipline: we drop the pod / instance labels on the
# scrape side via metricRelabelings so the per-pod prefix the prom
# operator auto-injects doesn't grow active series with each new
# session pod. The metric payload's own labels (mode, mcp_server,
# outcome, etc.) remain — those are bounded by code.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: tank-session-pods
  namespace: {{ include "tank-operator.sessionsNamespace" . }}
  labels:
    app.kubernetes.io/name: tank-session-pods
spec:
  selector:
    matchLabels:
      app.kubernetes.io/managed-by: tank-operator
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 15s
      scrapeTimeout: 5s
      metricRelabelings:
        - action: labeldrop
          regex: ^(pod|instance|namespace|container|endpoint|service|job)$
    - port: runner-metrics
      path: /metrics
      interval: 15s
      scrapeTimeout: 5s
      metricRelabelings:
        - action: labeldrop
          regex: ^(pod|instance|namespace|container|endpoint|service|job)$
---
# PrometheusRule: user-trust failure alerts. Each alert names exactly the
# class of failure it surfaces; no "high-level" health alerts that fire
# for unrelated reasons.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: tank-operator
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
  labels:
    app.kubernetes.io/name: tank-operator
spec:
  groups:
    - name: tank-operator.http
      rules:
        - alert: TankOperatorHTTP5xxRate
          expr: sum(rate(tank_http_requests_total{status_class="5xx"}[5m])) by (route) > 0.01
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "tank-operator route {{`{{ $labels.route }}`}} is returning 5xx > 0.01 req/s for 5m"
            runbook: "Inspect orchestrator logs for `http server error` lines on this route; the slog includes method, route, email, and the response detail."

        - alert: TankPgQueryP99High
          expr: histogram_quantile(0.99, sum by (le, operation) (rate(tank_pg_query_duration_seconds_bucket[5m]))) > 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "tank-operator Postgres p99 latency for operation {{`{{ $labels.operation }}`}} > 1s for 10m"

        - alert: TankPgUnmappedOperation
          expr: increase(tank_pg_queries_total{operation="other"}[1h]) > 0
          for: 0m
          labels:
            severity: info
          annotations:
            summary: "tank-operator ran a Postgres query the operationFromSQL extractor did not recognize"
            runbook: "Add the new table to pgstore.knownTables and ship a follow-up; otherwise that query is invisible in latency dashboards."

    - name: tank-operator.session-bus
      rules:
        - alert: TankSessionEventPersistSchemaRejected
          expr: tank_session_event_persist_schema_rejected_total > 0
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "session-events persister terminated an event for schema reasons"
            runbook: "A producer is emitting non-Tank events to the bus. Steady-state expectation is zero. Inspect persister logs for `session bus event terminated: schema rejected`."

        - alert: TankSessionEventWakePublishFailures
          expr: rate(tank_session_event_wake_publish_failure_total[10m]) > 0
            or on() rate(tank_session_list_event_publish_failure_total[10m]) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "tank-operator wake/event publishes to NATS are failing"
            runbook: "SSE clients will lag behind durable state until the next heartbeat or cursor-resume reconnect. Check NATS health in the nats namespace."

    - name: tank-operator.session-list
      rules:
        # K8s-watch producer is leader-elected. The lease should be
        # held by exactly one orchestrator replica at all times; sum
        # across replicas should be 1. Zero for an extended window
        # means the lease never got re-acquired after a roll, and pod
        # transitions are no longer driving sessions row updates — the
        # sidebar will go silent on pod_failed / pod_ready events.
        # Critical.
        - alert: TankSessionControllerLeaderMissing
          expr: sum(tank_session_pod_informer_leader_held) < 1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "no replica is holding the session-controller lease — sidebar SSE will stop reflecting pod transitions"
            runbook: |
              The leader-elected K8s watch that writes pod-state column
              updates to the sessions row is not running on any
              orchestrator replica. Pod evictions, readiness flips, and
              pod deletions will not propagate to the sidebar until the
              lease is re-acquired. Inspect orchestrator logs for
              `sessioncontroller k8s-watch: started leading` /
              `sessioncontroller k8s-watch: leader run failed`; verify
              the `tank-operator-session-controller` Lease in the
              orchestrator namespace and the
              `coordination.k8s.io/leases` RoleBinding.

        # Activity-delta emitter is the chat→sidebar bridge. A non-zero
        # failure rate means something between the chat-event persister
        # and the sessions row activity_summary update is broken — chat
        # sessions will still work end-to-end (the per-session SSE
        # remains durable) but the sidebar's status / unread indicators
        # will go stale.
        - alert: TankSessionActivityEmitterFailing
          expr: rate(tank_session_activity_delta_failure_total[10m]) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "chat→sidebar activity-delta emitter is failing"
            runbook: |
              The persister hook that turns chat events into
              session.activity_changed row updates is hitting store or
              publish errors. The sidebar's run-status / needs-input /
              unread-count indicators will lag actual chat state.
              Inspect orchestrator logs for `chat-activity emitter:`
              lines.

        # Row-update producer outcome. RowWriter is the single seam
        # the K8s watch and activity emitter write through; a non-zero
        # failure rate means the sessions row column update SQL is
        # erroring out and the sidebar will render stale state.
        - alert: TankSessionRowUpdatesFailing
          expr: rate(tank_session_row_updates_total{outcome="failed"}[10m]) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "sessions row UPDATE is failing — sidebar columns will drift"
            runbook: |
              RowWriter is failing to apply per-transition column
              updates (status / ready_at / terminating_at /
              activity_summary). The pre-write transition was already
              durable in the producer (K8s watch or persister), but
              the row's column values will lag observed state.
              Inspect logs for `sessioncontroller: row column update
              failed`.

        # Cross-scope event leak guard. The per-(owner, scope) NATS
        # subject prevents cross-scope delivery in steady state; if a
        # publisher ever lands a wrong-scope payload (regression of the
        # tank-operator#83 follow-up that scoped the wire shape), this
        # counter increments and the SSE handler drops the payload before
        # mutating client state. Any non-zero rate means cross-environment
        # leakage came back — page on first sighting, not over a long
        # window.
        - alert: TankSessionListCrossScopeLeak
          expr: rate(tank_session_list_cross_scope_events_dropped_total[10m]) > 0
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "session-list NATS payload arrived with the wrong session_scope"
            runbook: |
              A publisher emitted a session row-update payload whose
              embedded session_scope does not match the receiving
              orchestrator's scope. The (email, scope) subject shape
              makes this physically unreachable in steady state, so
              this is a producer-side regression — most likely
              `sessioncontroller.RowWriter.RecordTransition` or one
              of its callers passing a stale scope to the row-update
              publisher. Inspect orchestrator logs for `session row
              payload dropped: scope mismatch`.

    - name: tank-operator.nats
      rules:
        - alert: TankNATSReconnectStorm
          expr: rate(tank_nats_disconnect_total[5m]) > 0.1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "tank-operator's NATS client is reconnecting faster than 6/min"
            runbook: "JetStream session bus is unstable. Check the nats namespace's pod health and ServerCertificate."

    - name: tank-operator.api-proxy
      rules:
        - alert: TankApiProxyRefreshStorm
          expr: rate(tank_api_proxy_upstream_401_total[5m]) > 0.5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "api-proxy ({{`{{ $labels.provider }}`}}) is seeing upstream 401s > 0.5/s for 5m"
            runbook: "Refresh-storm signature. Check the refresh-token chain in KV; the single-flight gate may be failing to dedupe."

        - alert: TankApiProxyRefreshFailures
          expr: rate(tank_api_proxy_token_refresh_total{result!="success"}[10m]) > 0
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "api-proxy ({{`{{ $labels.provider }}`}}) cannot rotate its OAuth refresh chain"
            runbook: "All inbound requests will eventually 401. Inspect ext-proc logs for `refresh failed` / `refresh request crashed`."

    - name: tank-operator.mcp-auth-proxy
      rules:
        - alert: TankMCPAuthProxySATokenReadFailures
          expr: rate(tank_mcp_auth_proxy_sa_token_read_total{result="failure"}[10m]) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "mcp-auth-proxy cannot read the projected ServiceAccount token"
            runbook: "kubelet's projected token volume is broken on this session pod. MCP calls will 503. Restart the pod or investigate kubelet."

        - alert: TankMCPAuthProxyUpstream5xx
          expr: sum(rate(tank_mcp_auth_proxy_requests_total{status_class="5xx"}[5m])) by (mcp_server) > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "MCP server {{`{{ $labels.mcp_server }}`}} is returning 5xx > 0.05 req/s for 5m"

    - name: tank-operator.runners
      rules:
        - alert: TankRunnerProviderErrorRate
          expr: rate(tank_runner_provider_error_total[5m]) > 0.1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "pod-side runner ({{`{{ $labels.mode }}`}}) provider errors > 0.1/s for 5m"
            runbook: "Inspect the affected session pod's agent-runner / codex-runner logs."

        - alert: TankRunnerPendingWakeupsGrowth
          expr: max_over_time(tank_runner_pending_wakeups[1h]) > 50
          for: 1h
          labels:
            severity: info
          annotations:
            summary: "ScheduleWakeup queue depth exceeded 50 in the last hour"
            runbook: "Pod-local setTimeout scheduler is accumulating timers. May indicate a runaway agent loop or a stuck turn."

        # ----- "Stop is not stopping" self-telling alerts -----
        #
        # These exist because the prior failure mode was invisible: PR #481
        # made the stop request durable (chip renders, runStatus=stopping)
        # but a JetStream max_ack_pending=1 on the runner's command consumer
        # held the interrupt_turn command behind the in-flight submit_turn,
        # so the runner never delivered the interrupt, the SDK never
        # interrupted, and the user only learned via "the agent kept going
        # for 5 more minutes." See docs/tank-conversation-protocol.md →
        # "Durable turn interruption" for the control-plane split that
        # fixes it. The two alerts below tell on a regression of either
        # stage of the chain so a future change can't silently re-break it.
        #
        # Stage 1 — backend persisted a request, runner control consumer
        # never claimed an interrupt_turn command. Symptoms: the user
        # presses Stop, the chip renders, nothing else happens. Root cause
        # universe: control-plane consumer is unhealthy / JetStream subject
        # routing regressed / backend published to the wrong subject.
        - alert: TankStopNotDelivered
          expr: |
            sum(rate(tank_turn_interrupt_request_total{outcome="persisted"}[5m]))
              - sum(rate(tank_runner_commands_consumed_total{kind="interrupt_turn"}[5m]))
              > 0
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "Stop requests are being persisted faster than runners are receiving them"
            runbook: |
              Stop is silently broken. The backend keeps recording
              turn.interrupt_requested rows (and the SPA shows the chip) but
              the runner's control-plane JetStream consumer is not claiming
              the interrupt_turn commands. This is the exact failure mode
              the data/control plane split was designed to prevent — if
              this alert fires, the split has regressed or one side of the
              wire shape drifted. Check:
              (1) backend-go/internal/sessionbus.SubjectForCommand still
              routes CommandInterrupt to ControlSubject;
              (2) runner-shared/sessionBus.js controlSubject() matches the
              Go ControlSubject wire shape;
              (3) the per-session control consumer (named "{provider}_control_{storage}")
              exists and is consuming on JetStream.

        # Stage 2 — runner claimed an interrupt but the SDK / codex
        # AbortController never produced a terminal event for the active
        # turn. Symptoms: turn keeps emitting tool events past the
        # interrupt; chip is durable; sidebar stays in "stopping" until
        # the provider naturally finishes. Root cause universe:
        # sdkQuery.interrupt() is failing silently inside the Claude SDK,
        # codex Thread.runStreamed isn't honoring the abort signal, or the
        # runner is failing to publish turn.interrupted.
        - alert: TankStopNotTerminated
          expr: |
            sum(rate(tank_runner_commands_consumed_total{kind="interrupt_turn",result="accepted"}[5m]))
              - sum(rate(tank_runner_turn_duration_seconds_count{outcome="interrupted"}[5m]))
              > 0
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "Runners are accepting interrupts but not producing terminal turn.interrupted events"
            runbook: |
              The control-plane consumer is delivering interrupts to the
              runner, but the runner isn't emitting durable turn.interrupted
              events at the same rate. The SDK / codex Thread is likely
              ignoring the interrupt, OR the runner is failing to publish
              the terminal event. Check the affected session pod's
              agent-runner / codex-runner logs for the "session bus publish
              failed" line and for "providerErrorTotal{operation=interrupt}".

        # Stage 3 (post-#532) — runner accepted an interrupt but didn't
        # drain it to any terminal-outcome bucket on
        # tank_runner_interrupt_outcome_total. The four-outcome contract
        # (see docs/tank-conversation-protocol.md → "Four-outcome contract
        # on the runner side") guarantees that every accepted interrupt
        # produces exactly one increment in a terminal-outcome bucket
        # (terminated_via_sdk, terminated_pre_sdk, orphaned, publish_failed,
        # turn_already_terminal, or invalid_target). "buffered" is a
        # transient arrival counter that must drain; if buffered arrivals
        # outrun terminal-outcome resolutions, an interrupt is stuck.
        #
        # This is stricter than TankStopNotTerminated above — that alert
        # counts only the happy-path turn.interrupted terminal via the
        # duration histogram. This alert catches every silent stranding
        # the pre-#532 shape produced, including the buffer-and-apply
        # race resolution and publish-failed fallback paths.
        - alert: TankStopOutcomeStranded
          expr: |
            sum(rate(tank_runner_interrupt_outcome_total{outcome="buffered"}[5m]))
              - sum(rate(tank_runner_interrupt_outcome_total{outcome=~"terminated_via_sdk|terminated_pre_sdk|orphaned|publish_failed|turn_already_terminal|invalid_target"}[5m]))
              > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Runner-buffered interrupts are not draining to a terminal outcome"
            runbook: |
              An interrupt_turn was accepted on the runner's control plane
              and held in the pendingInterrupts buffer waiting for a
              matching submit_turn, but did not drain within the buffer
              window AND did not produce an orphan terminal. This is a
              regression of the #532 buffer-and-apply contract — the
              runner's `acceptInterrupt` / `applyInterruptToTurn` /
              `expireBufferedInterrupt` paths are no longer covering every
              accepted interrupt. Check the affected runner pod's logs
              for `expireBufferedInterrupt failed`; check that
              `tank_runner_interrupt_outcome_total` exposes all the
              outcome labels listed in the alert expression.

        # Stage 4 (post-#532) — every retry to publish a turn.interrupted
        # event failed and the fallback turn.failed{publish_interrupt_failed}
        # also exhausted its retries. The user pressed Stop, the runner did
        # call sdkQuery.interrupt() (load-bearing side of #532), but every
        # attempt to land a durable terminal hit a publish error. JetStream
        # redelivery on the original interrupt_turn command will retry; if
        # this alert persists, redelivery isn't helping either.
        #
        # Most likely causes: oversized event payload (max_payload exceeded,
        # deterministic — see #532 Stage 3 follow-up for the truncation
        # plan), JetStream connectivity blackout, persister deadlock.
        - alert: TankStopPublishFailed
          expr: increase(tank_runner_interrupt_outcome_total{outcome="publish_failed"}[10m]) > 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Runner exhausted retries publishing a turn.interrupted terminal"
            runbook: |
              The runner's publishTerminalWithRetry exhausted attempts for
              both turn.interrupted and the turn.failed{publish_interrupt_failed}
              fallback. The SDK was (best-effort) interrupted; the durable
              ledger has no terminal for this stop yet, so the UI is in
              "stopping". Check the affected runner pod's logs for
              `'payload' max_payload size exceeded` (oversized event,
              #532 Stage 3) or sustained NATS disconnect. JetStream
              redelivery will retry on ack_wait expiry; this alert clears
              once one delivery succeeds.

        # Stage 5 (post-#532 PR 3) — sustained payload-dropped truncations.
        # An event was so large that even aggressive string truncation
        # couldn't fit it under the transport budget; the entire payload
        # was replaced with a __payload_dropped marker. The durable
        # ledger still records the event envelope, but the body is
        # unrecoverable from the wire path. One-off events from
        # legitimate giant outputs (Read of a 10 MB file) are expected;
        # a sustained rate means a producer is emitting bodies that need
        # to chunk or stream rather than land as one Tank event.
        #
        # Severity is `warning` (not critical) because the durable ledger
        # is intact and the user-visible transcript degrades gracefully;
        # the alert is the signal that a producer needs work, not that
        # the system is broken.
        - alert: TankEventPayloadDropped
          expr: sum by (event_type) (rate(tank_runner_event_truncated_total{severity="payload-dropped"}[15m])) > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Sustained tank_runner_event_truncated_total{severity=payload-dropped} for {{ $labels.event_type }}"
            runbook: |
              An event_type producer is emitting payloads so large that
              even string-by-string truncation can't fit them under
              SESSION_EVENT_MAX_BYTES (default 900 KiB). The durable
              ledger contains the envelope plus a __payload_dropped
              marker; the body is gone. Look at the adapter or
              tool-result path for {{ $labels.event_type }} and either
              chunk the source (tool_result.output streaming, Read with
              an offset/limit window) or raise SESSION_EVENT_MAX_BYTES
              if the upstream transport can accept it (NATS
              max_payload would need to rise in lockstep — currently
              1 MiB default).

    # Session spawn observability. The user-visible latency budget for
    # `POST /sessions` -> ContainersReady is "fast unless the chosen node
    # has to pull a ~700MB session image." Recording rules below collapse
    # the per-pod kube_pod_status_*_time series from kube-state-metrics
    # into single aggregate scalars to stay within docs/observability.md's
    # forbidden-labels list (pod, instance, etc are not allowed in stored
    # tank_* series). The dashboard's per-pod panels render the same
    # primitives on-demand, where cardinality is bounded by browser session.
    #
    # Namespace selector matches both the production sessions namespace
    # (`tank-operator-sessions`) and every test-slot sessions namespace
    # (`tank-operator-slot-<N>-sessions`). Without the slot coverage,
    # FailedScheduling pressure in the slots — where the orchestrator
    # is exercised end-to-end during change validation — would never
    # surface to TankSessionSpawnSlow* even though kube-state-metrics
    # has the data. Cardinality stays at three recording series total
    # because the aggregations collapse across pods AND namespaces.
    #
    # Thresholds are calibrated against the 7-day baseline observed at
    # introduction: warm-cache spawns cluster at 2-3s, cold pulls at
    # 27-33s, with a few partial-cache spawns in between. The 5s/60s
    # numbers target two distinct failure modes (see runbook annotations);
    # a single threshold percentile would either over-fire on the
    # bimodal distribution or never catch the regression mode.
    - name: tank-operator.session-spawn
      rules:
        - record: tank:session_pod_spawn_seconds:p50_24h
          expr: |
            quantile(0.5,
              (kube_pod_status_container_ready_time{namespace=~"tank-operator(-slot-[0-9]+)?-sessions"}
                - on(pod, namespace) kube_pod_created{namespace=~"tank-operator(-slot-[0-9]+)?-sessions"})
              and on(pod, namespace) (time() - kube_pod_created{namespace=~"tank-operator(-slot-[0-9]+)?-sessions"} < 86400)
            )

        - record: tank:session_pod_spawn_seconds:p95_24h
          expr: |
            quantile(0.95,
              (kube_pod_status_container_ready_time{namespace=~"tank-operator(-slot-[0-9]+)?-sessions"}
                - on(pod, namespace) kube_pod_created{namespace=~"tank-operator(-slot-[0-9]+)?-sessions"})
              and on(pod, namespace) (time() - kube_pod_created{namespace=~"tank-operator(-slot-[0-9]+)?-sessions"} < 86400)
            )

        - record: tank:session_pod_spawn_seconds:max_1h
          expr: |
            max(
              (kube_pod_status_container_ready_time{namespace=~"tank-operator(-slot-[0-9]+)?-sessions"}
                - on(pod, namespace) kube_pod_created{namespace=~"tank-operator(-slot-[0-9]+)?-sessions"})
              and on(pod, namespace) (time() - kube_pod_created{namespace=~"tank-operator(-slot-[0-9]+)?-sessions"} < 3600)
            )

        - alert: TankSessionSpawnSlowMedian
          expr: tank:session_pod_spawn_seconds:p50_24h > 5
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "Median session-pod spawn time over the last 24h exceeded 5s"
            runbook: |
              Every spawn appears to be paying the full image-pull cost, which means
              session-image distribution is failing at the cluster level. Likely
              causes in order of probability: (1) the session pool has just
              autoscaled up and new nodes are pulling cold, (2) kubelet image GC
              has evicted the cached image cluster-wide (check disk pressure on the
              session pool), (3) a new image SHA was pushed and no pre-pull
              mechanism is keeping the cache warm. Confirm via the "Big-image pull
              rate by node" panel — if every node is pulling, distribution is the
              problem; if only one node is, that node is the problem. Baseline at
              introduction (2026-05): warm spawns 2-3s, cold pulls 27-33s, median 3s.

        - alert: TankSessionSpawnSlowOutlier
          expr: tank:session_pod_spawn_seconds:max_1h > 60
          for: 0m
          labels:
            severity: info
          annotations:
            summary: "A session-pod spawn in the last hour took over 60s"
            runbook: |
              A single user waited more than 60s for their session, which is roughly
              double the worst observed cold-pull baseline. Diagnostic only — does
              not page. Use the "Per-pod spawn duration (recent)" panel to identify
              the pod and its namespace (prod is `tank-operator-sessions`; test
              slots are `tank-operator-slot-<N>-sessions`), then
              `kubectl describe pod <name> -n <namespace>` for the event timeline
              (FailedScheduling, Pulling/Pulled events with their durations).
              Common causes: FailedScheduling from cluster CPU/memory pressure
              (`kubectl top nodes` to confirm — typically pinned by aggregate
              request packing, not actual usage), registry throttling, network
              egress congestion from the AKS node to ACR, or an oversized image
              bump.
{{- end }}
