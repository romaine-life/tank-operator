{{- if and (eq (include "tank-operator.renderWarm" .) "true") (not (eq (include "tank-operator.isTestEnv" .) "true")) }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "tank-operator.ingressTlsSecret" . }}
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
spec:
  secretName: {{ include "tank-operator.ingressTlsSecret" . }}
  dnsNames:
    - {{ include "tank-operator.ingressHostname" . }}
  issuerRef:
    name: {{ .Values.ingress.certIssuer }}
    kind: ClusterIssuer
{{- end }}
