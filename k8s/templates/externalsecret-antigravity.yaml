{{/*
Antigravity (Gemini-Ultra) OAuth credential, synced from KV into the sessions
namespace where antigravity_gui runner pods mount it. The KV secret is minted
by the antigravity_config save-credentials harvest; until a user has logged in
once this ExternalSecret has nothing to sync (the same property as the
claude/codex credential secrets). Lives only in the sessions namespace — the
orchestrator never reads the token, it only names the secret for the pod spec.
Validation slots use the shared production KV key here because agy has no
provider-proxy equivalent yet; the slot orchestrator still omits the
ANTIGRAVITY_CREDENTIALS_KV_KEY write surface.
*/}}
{{- if eq (include "tank-operator.renderWarm" .) "true" }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.session.antigravityCredentialsSecret | default "antigravity-credentials" }}
  namespace: {{ include "tank-operator.sessionsNamespace" . }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: {{ .Values.externalSecret.storeKind }}
  target:
    name: {{ .Values.session.antigravityCredentialsSecret | default "antigravity-credentials" }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: antigravity-oauth-token
      remoteRef:
        key: {{ include "tank-operator.antigravityCredentialsKvKey" . }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
{{- end }}
