{{/*
Antigravity (Gemini-Ultra) OAuth credential, synced from KV into the
orchestrator / provider-authority namespace where the antigravity-api-proxy
ext_proc sidecar mounts it. The KV secret is minted by the antigravity_config
save-credentials harvest; until a user has logged in once this ExternalSecret
has nothing to sync (same property as the claude/codex credential secrets).

This lives ONLY in the orchestrator namespace now — the agy session pod never
mounts it. The proxy owns the refresh chain and writes rotated blobs back to
KV, so the mirror cadence matches claude/codex (1m), not the slow
session-config default. Validation slots deliberately do not render this
secret; their agy pods route Google traffic through the production
antigravity-api-proxy (see scripts/check-test-slot-provider-credentials.sh).
*/}}
{{- if and (eq (include "tank-operator.renderWarm" .) "true") (not (eq (include "tank-operator.isTestEnv" .) "true")) }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.session.antigravityCredentialsSecret | default "antigravity-credentials" }}
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: {{ .Values.externalSecret.storeKind }}
  target:
    name: {{ .Values.session.antigravityCredentialsSecret | default "antigravity-credentials" }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: {{ .Values.session.antigravityCredentialsSecretKey | default "antigravity-oauth-token" }}
      remoteRef:
        key: {{ include "tank-operator.antigravityCredentialsKvKey" . }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
{{- end }}
