{{- if eq (include "tank-operator.renderWarm" .) "true" }}
{{- /*
Grafana dashboard ConfigMap. The kube-prometheus-stack Grafana sidecar
discovers dashboards by label selector across all namespaces, so this
ConfigMap lives in tank-operator's namespace but the dashboard renders
in the central Grafana instance running in the `monitoring` namespace.

Dashboard JSON is hand-built rather than generated. If panels start to
drift we should migrate to grafonnet — out of scope for v1.

Only renders when observability.dashboards.enabled is true.
*/}}
{{- if and .Values.observability.enabled .Values.observability.dashboards.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: tank-operator-grafana
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
  labels:
    app.kubernetes.io/name: tank-operator
    {{ .Values.observability.dashboards.labelKey }}: {{ .Values.observability.dashboards.labelValue | quote }}
data:
  tank-operator.json: |
    {
      "title": "Tank Operator",
      "uid": "tank-operator",
      "schemaVersion": 39,
      "version": 1,
      "tags": ["tank"],
      "timezone": "browser",
      "time": { "from": "now-6h", "to": "now" },
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "title": "HTTP request rate by route+status_class",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(tank_http_requests_total[5m])) by (route, status_class)",
              "legendFormat": "{{`{{ route }}`}} {{`{{ status_class }}`}}"
            }
          ]
        },
        {
          "id": 2,
          "title": "HTTP 5xx by route (alert source)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(tank_http_requests_total{status_class=\"5xx\"}[5m])) by (route)",
              "legendFormat": "{{`{{ route }}`}}"
            }
          ]
        },
        {
          "id": 3,
          "title": "HTTP latency p50 / p95 / p99 by route",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum by (le, route) (rate(tank_http_request_duration_seconds_bucket[5m])))",
              "legendFormat": "p50 {{`{{ route }}`}}"
            },
            {
              "expr": "histogram_quantile(0.95, sum by (le, route) (rate(tank_http_request_duration_seconds_bucket[5m])))",
              "legendFormat": "p95 {{`{{ route }}`}}"
            },
            {
              "expr": "histogram_quantile(0.99, sum by (le, route) (rate(tank_http_request_duration_seconds_bucket[5m])))",
              "legendFormat": "p99 {{`{{ route }}`}}"
            }
          ]
        },
        {
          "id": 4,
          "title": "Postgres query rate + outcome",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(tank_pg_queries_total[5m])) by (operation, outcome)",
              "legendFormat": "{{`{{ operation }}`}} {{`{{ outcome }}`}}"
            }
          ]
        },
        {
          "id": 5,
          "title": "Postgres p99 latency by operation",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum by (le, operation) (rate(tank_pg_query_duration_seconds_bucket[5m])))",
              "legendFormat": "{{`{{ operation }}`}}"
            }
          ]
        },
        {
          "id": 6,
          "title": "Session-event persister failures (steady-state = 0)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "rate(tank_session_event_persist_schema_rejected_total[5m])",
              "legendFormat": "schema rejected"
            },
            {
              "expr": "rate(tank_session_event_persist_transient_failure_total[5m])",
              "legendFormat": "transient failure"
            }
          ]
        },
        {
          "id": 7,
          "title": "NATS connection events",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "rate(tank_nats_disconnect_total[5m])",
              "legendFormat": "disconnect"
            },
            {
              "expr": "rate(tank_nats_reconnect_total[5m])",
              "legendFormat": "reconnect"
            },
            {
              "expr": "rate(tank_nats_async_error_total[5m])",
              "legendFormat": "async error"
            }
          ]
        },
        {
          "id": 8,
          "title": "api-proxy refresh outcomes by provider",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 32 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(tank_api_proxy_token_refresh_total[10m])) by (provider, result)",
              "legendFormat": "{{`{{ provider }}`}} {{`{{ result }}`}}"
            }
          ]
        },
        {
          "id": 9,
          "title": "api-proxy upstream 401 rate (refresh storm signal)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 32 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(tank_api_proxy_upstream_401_total[5m])) by (provider)",
              "legendFormat": "{{`{{ provider }}`}}"
            }
          ]
        },
        {
          "id": 10,
          "title": "mcp-auth-proxy request rate by mcp_server+status_class",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 40 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(tank_mcp_auth_proxy_requests_total[5m])) by (mcp_server, status_class)",
              "legendFormat": "{{`{{ mcp_server }}`}} {{`{{ status_class }}`}}"
            }
          ]
        },
        {
          "id": 11,
          "title": "mcp-auth-proxy SA token read failures + GitHub attestation",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 40 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "rate(tank_mcp_auth_proxy_sa_token_read_total{result=\"failure\"}[5m])",
              "legendFormat": "SA token read failure"
            },
            {
              "expr": "sum(rate(tank_mcp_auth_proxy_github_attestation_total[5m])) by (result)",
              "legendFormat": "GH attestation {{`{{ result }}`}}"
            }
          ]
        },
        {
          "id": 12,
          "title": "Runner turn duration p50/p95/p99",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 48 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum by (le, mode, outcome) (rate(tank_runner_turn_duration_seconds_bucket[10m])))",
              "legendFormat": "p50 {{`{{ mode }}`}} {{`{{ outcome }}`}}"
            },
            {
              "expr": "histogram_quantile(0.95, sum by (le, mode, outcome) (rate(tank_runner_turn_duration_seconds_bucket[10m])))",
              "legendFormat": "p95 {{`{{ mode }}`}} {{`{{ outcome }}`}}"
            },
            {
              "expr": "histogram_quantile(0.99, sum by (le, mode, outcome) (rate(tank_runner_turn_duration_seconds_bucket[10m])))",
              "legendFormat": "p99 {{`{{ mode }}`}} {{`{{ outcome }}`}}"
            }
          ]
        },
        {
          "id": 13,
          "title": "Runner commands consumed by kind+result",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 48 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(tank_runner_commands_consumed_total[5m])) by (mode, kind, result)",
              "legendFormat": "{{`{{ mode }}`}} {{`{{ kind }}`}} {{`{{ result }}`}}"
            }
          ]
        },
        {
          "id": 14,
          "title": "Session pod spawn p50 / p95 (24h trailing)",
          "description": "Time from pod creation to ContainersReady across session pods (production + every test slot) created in the trailing 24h. Backed by recording rules tank:session_pod_spawn_seconds:p50_24h and :p95_24h. Use this as dashboard context; the alertable spawn signal is the recent outlier rule.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 56 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "s" } },
          "targets": [
            {
              "expr": "tank:session_pod_spawn_seconds:p50_24h",
              "legendFormat": "p50"
            },
            {
              "expr": "tank:session_pod_spawn_seconds:p95_24h",
              "legendFormat": "p95"
            }
          ]
        },
        {
          "id": 15,
          "title": "Per-pod spawn duration (recent)",
          "description": "Per-session-pod time from creation to ContainersReady, across the production sessions namespace and every test-slot sessions namespace. One series per session pod observed by kube-state-metrics; series age out when the pod is deleted. Bimodal distribution is expected — fast spawns (~3s) hit the node's image cache, slow spawns (~30s) are cold pulls of the ~712MB claude-container image. Anything materially above the cold-pull baseline is the diagnostic signal to chase. Spawn times in the minutes-range typically indicate FailedScheduling (cluster CPU/memory request packing) rather than image pull cost.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 56 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "s" } },
          "targets": [
            {
              "expr": "kube_pod_status_container_ready_time{namespace=~\"tank-operator(-slot-[0-9]+)?-sessions\"} - on(pod, namespace) kube_pod_created{namespace=~\"tank-operator(-slot-[0-9]+)?-sessions\"}",
              "legendFormat": "{{`{{ namespace }}/{{ pod }}`}}"
            }
          ]
        },
        {
          "id": 16,
          "title": "Big-image pull rate by node (1h)",
          "description": "Per-node count of image pulls in the 500MB-1GB size bucket from kubelet_image_pull_duration_seconds_count. The three session images (claude-container, codex-container, pi-container) all land in this bucket, so a non-zero rate on a node almost always means kubelet pulled a session image. After an image tag rotation a spike across nodes is expected; sustained activity on a single node indicates that node is repeatedly missing the cache (autoscale churn, image GC eviction, or node being the only one hosting session pods).",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 64 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum by (node) (increase(kubelet_image_pull_duration_seconds_count{image_size_in_bytes=\"500MB-1GB\"}[1h]))",
              "legendFormat": "{{`{{ node }}`}}"
            }
          ]
        },
        {
          "id": 18,
          "title": "SSE live delivery: heartbeat catchups and wake throughput",
          "description": "Heartbeat catchups are the correctness signal: an open /api/sessions/{id}/events stream emitted durable transcript rows after heartbeat polling instead of after a NATS wake. Wake published and received are throughput context only: published is one per durable event wake, received is one per subscriber delivery, so their delta is not a loss ratio. Per-stream resolution lives at GET /api/debug/session-event-streams (admin only) and the \"session event stream caught up from heartbeat\" slog line.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 72 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(tank_session_event_stream_heartbeat_catchup_total[5m]))",
              "legendFormat": "heartbeat_catchup"
            },
            {
              "expr": "sum(rate(tank_session_event_wake_published_total[5m]))",
              "legendFormat": "published"
            },
            {
              "expr": "sum(rate(tank_session_event_wake_received_total[5m]))",
              "legendFormat": "received"
            },
            {
              "expr": "sum(rate(tank_session_event_wake_publish_failure_total[5m]))",
              "legendFormat": "publish_failed"
            }
          ]
        },
        {
          "id": 19,
          "title": "Persist→wake latency p50 / p95 / p99",
          "description": "Histogram tail of the time between session_events Upsert returning and the NATS wake publish completing. Steady-state should be single-digit milliseconds. A growing p95 is the early indicator of NATS slowness that the wake-publish failure counter only catches once the publish actually errors out.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 72 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "s" } },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum by (le) (rate(tank_session_event_persist_to_wake_seconds_bucket[5m])))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, sum by (le) (rate(tank_session_event_persist_to_wake_seconds_bucket[5m])))",
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.99, sum by (le) (rate(tank_session_event_persist_to_wake_seconds_bucket[5m])))",
              "legendFormat": "p99"
            }
          ]
        },
        {
          "id": 20,
          "title": "Server emit vs browser receive by event type (5m rate)",
          "description": "Candidate-C reducer-drop stethoscope. Server-side emit-by-type from the SSE handler, plotted alongside the browser-side receive-by-type from POST /api/client-metrics/session-events-stream. A persistent gap on a specific event_type means the SPA reducer is dropping that type silently — the server sent it, the browser didn't render it. Network batching introduces a small lag; sustained >5% divergence is the signal.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 80 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum by (event_type) (rate(tank_session_event_stream_emitted_by_type_total[5m]))",
              "legendFormat": "server emit {{`{{ event_type }}`}}"
            },
            {
              "expr": "sum by (event_type) (rate(tank_session_event_client_received_total[5m]))",
              "legendFormat": "client receive {{`{{ event_type }}`}}"
            }
          ]
        },
        {
          "id": 21,
          "title": "Browser SSE silent-while-running (p95 over 30m)",
          "description": "Candidate-B zombie-SSE stethoscope. The browser's silence watchdog observes the idle interval whenever a connected stream has gone >30s without a tank-event while a turn is in flight. p95 climbing into the minute-range is the canonical signature: TCP socket is alive (browser thinks connected), no events flowing, no error fires. Pair with id 18 and /api/debug/session-event-streams: if the server has fresh wakes and emits but the browser reports silence, inspect the path between orchestrator and browser (proxy / LB idle timeout).",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 80 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "s" } },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le, session_mode) (rate(tank_session_event_client_stream_silent_seconds_bucket[30m])))",
              "legendFormat": "p95 {{`{{ session_mode }}`}}"
            },
            {
              "expr": "histogram_quantile(0.99, sum by (le, session_mode) (rate(tank_session_event_client_stream_silent_seconds_bucket[30m])))",
              "legendFormat": "p99 {{`{{ session_mode }}`}}"
            }
          ]
        },
        {
          "id": 22,
          "title": "Browser SSE lifecycle events (5m rate)",
          "description": "Browser-reported SSE lifecycle, labeled by event. Climbing closed_error / reconnect_scheduled rates correlate with a proxy / LB / network instability layer the server-side wake counters cannot see. opened, ready, tank_event_received are the healthy-volume baseline.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 88 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum by (event) (rate(tank_session_event_client_events_total[5m]))",
              "legendFormat": "{{`{{ event }}`}}"
            }
          ]
        },
        {
          "id": 17,
          "title": "Inferred warm-spawn ratio (24h)",
          "description": "Fraction of session pods spawned in the last 24h (across the production sessions namespace and every test-slot sessions namespace) that completed in under 10s. Bimodal-distribution proxy for cache hits: warm pulls cluster at 2-3s, cold pulls at 27-33s, the 10s threshold sits in the empty middle. Drift downward suggests nodes are losing the image cache more often OR FailedScheduling is delaying spawns beyond 10s. Drift upward suggests cache distribution is improving (e.g. after a pre-pull DaemonSet ships).",
          "type": "stat",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 64 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "orange", "value": 0.5 },
                  { "color": "green", "value": 0.8 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "sum(((kube_pod_status_container_ready_time{namespace=~\"tank-operator(-slot-[0-9]+)?-sessions\"} - on(pod, namespace) kube_pod_created{namespace=~\"tank-operator(-slot-[0-9]+)?-sessions\"}) < bool 10) and on(pod, namespace) (time() - kube_pod_created{namespace=~\"tank-operator(-slot-[0-9]+)?-sessions\"} < 86400)) / count((kube_pod_status_container_ready_time{namespace=~\"tank-operator(-slot-[0-9]+)?-sessions\"} - on(pod, namespace) kube_pod_created{namespace=~\"tank-operator(-slot-[0-9]+)?-sessions\"}) and on(pod, namespace) (time() - kube_pod_created{namespace=~\"tank-operator(-slot-[0-9]+)?-sessions\"} < 86400))",
              "legendFormat": "warm-spawn ratio"
            }
          ]
        },
        {
          "id": 23,
          "title": "Avatar upload attempts by stage/result",
          "description": "No-devtools avatar upload diagnostic surface. Failed UI saves include an attempt_id; query GET /api/debug/avatar-upload-attempts?attempt_id=<id> for the durable row, then use this panel to see whether the same stage/result is systemic.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 96 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(tank_avatar_upload_attempts_total[5m])) by (stage, result)",
              "legendFormat": "{{`{{ stage }}`}} {{`{{ result }}`}}"
            }
          ]
        },
        {
          "id": 24,
          "title": "Transcript navigation mode transitions",
          "description": "Browser-side NavigationMode (live-tail / historical-anchor) transition rate by target. Pairs with the TankChatScrollUserAtBottomLatched alert — a sustained rate of entered-historical-anchor while users are not gesturing is the durable signature of the retired DOM-distance latch bug class. See docs/features/transcript-navigation/contract.md.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 112 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum by (event) (rate(tank_chat_scroll_client_events_total{event=~\"navigation-mode-entered-.*\",surface=\"session\"}[5m]))",
              "legendFormat": "{{`{{ event }}`}}"
            }
          ]
        },
        {
          "id": 28,
          "title": "Conversation read cursor stagnant sessions",
          "description": "Server-side cross-check for the transcript navigation latch. Per-pass count of open SSE streams whose user's conversation_read_state cursor lags the session's durable tail while the session is idle (status=ready, active_turn_id=null). Pairs with the navigation-mode client telemetry — TankChatScrollUserAtBottomLatched ANDs both signals to distinguish 'browser bug producing transitions' from 'durable consequence is actually happening at scale'. The 'skipped' series (active_turn / caught_up / missing) confirm the sampler is running and partitioning correctly when stagnant_total is flat.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 120 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum by (session_mode, scope) (rate(tank_conversation_read_cursor_stagnant_total[5m]))",
              "legendFormat": "stagnant {{`{{ session_mode }}`}} {{`{{ scope }}`}}"
            },
            {
              "expr": "sum (rate(tank_conversation_read_cursor_skipped_active_turn_total[5m]))",
              "legendFormat": "skipped active-turn"
            },
            {
              "expr": "sum (rate(tank_conversation_read_cursor_skipped_caught_up_total[5m]))",
              "legendFormat": "skipped caught-up"
            },
            {
              "expr": "sum (rate(tank_conversation_read_cursor_skipped_missing_total[5m]))",
              "legendFormat": "skipped missing-row"
            },
            {
              "expr": "sum by (reason) (rate(tank_conversation_read_cursor_sample_errors_total[5m]))",
              "legendFormat": "sampler error {{`{{ reason }}`}}"
            }
          ]
        },
        {
          "id": 27,
          "title": "Bottom-distance at chat-scroll events (p50 / p95)",
          "description": "Distance from the transcript viewport bottom at the moment client-side chat-scroll events fire. Useful to confirm the retired latch's smoking-gun signature (p95 of bottom_distance in the 100–500 px range during followOutput smooth-scroll catch-up) is not recurring after the navigation-mode refactor.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 112 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short" } },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum by (le, event) (rate(tank_chat_scroll_client_bottom_distance_pixels_bucket{surface=\"session\"}[10m])))",
              "legendFormat": "p50 {{`{{ event }}`}}"
            },
            {
              "expr": "histogram_quantile(0.95, sum by (le, event) (rate(tank_chat_scroll_client_bottom_distance_pixels_bucket{surface=\"session\"}[10m])))",
              "legendFormat": "p95 {{`{{ event }}`}}"
            }
          ]
        }
      ]
    }
{{- end }}
{{- end }}
