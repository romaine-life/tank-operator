{{- if and .Values.wildcardCertificate.enabled (not (eq (include "tank-operator.isTestEnv" .) "true")) }}
apiVersion: gateway.networking.x-k8s.io/v1alpha1
kind: XListenerSet
metadata:
  name: {{ .Values.wildcardCertificate.name }}
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
spec:
  parentRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: {{ .Values.ingress.gatewayName }}
    namespace: {{ .Values.ingress.gatewayNamespace }}
  listeners:
    {{- range $i, $host := .Values.wildcardCertificate.hosts }}
    - name: {{ printf "https-%d" $i }}
      protocol: HTTPS
      port: 443
      hostname: {{ $host | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: {{ $.Values.wildcardCertificate.tlsSecret }}
      allowedRoutes:
        namespaces:
          from: {{ $.Values.wildcardCertificate.allowedFromNamespaces }}
    {{- end }}
{{- end }}
