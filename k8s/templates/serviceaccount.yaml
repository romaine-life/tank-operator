# Orchestrator SA — only used for in-cluster K8s API auth (projected token via the
# RoleBinding in rbac.yaml). No Azure workload identity: the orchestrator has no
# Azure surface, and sessions reach Azure through the in-cluster azure-personal MCP server
# using the user's Entra JWT minted by the backend's MSAL.js login flow.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "tank-operator.orchestratorServiceAccount" . }}
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
---
# Session SA — same story. Sessions authenticate to MCP servers using the bearer
# token forwarded from the orchestrator's session, not via a service identity
# attached to this SA.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "tank-operator.sessionServiceAccount" . }}
  namespace: {{ include "tank-operator.sessionsNamespace" . }}
