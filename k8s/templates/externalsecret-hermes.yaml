# Pulls the Hermes API bearer out of romaine-kv into the orchestrator
# namespace so the tank-operator Deployment can valueFrom it. Same KV
# secret nelsong6/hermes' chart reads on its side (see
# k8s/templates/externalsecret.yaml in that repo) — rotating the KV
# secret updates both consumers on the next ExternalSecret refresh.
#
# `optional: true` on the env var means the orchestrator starts even
# before KV is populated (degraded mode: hermes_gui sessions 503 until
# the secret exists). Same posture as the Hermes-side handling.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.hermes.bearerSecret.name }}
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: {{ .Values.externalSecret.storeKind }}
  target:
    name: {{ .Values.hermes.bearerSecret.name }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: {{ .Values.hermes.bearerSecret.key }}
      remoteRef:
        key: hermes-api-bearer
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
