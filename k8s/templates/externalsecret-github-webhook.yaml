{{- if and (eq (include "tank-operator.renderWarm" .) "true") (not (eq (include "tank-operator.isTestEnv" .) "true")) }}
# Mirrors the GitHub CI-watch webhook HMAC secret from KV into a Secret in the
# ORCHESTRATOR namespace. The orchestrator reads it as GITHUB_WEBHOOK_SECRET and
# verifies X-Hub-Signature-256 on the public POST /webhooks/github route
# (backend-go/cmd/tank-operator/github_webhook.go). An empty secret fails closed
# (rejects all deliveries), so a watched PR's CI never wakes its session.
#
# Production only: the tank-operator-host GitHub App webhook points at the
# production https://tank.romaine.life/webhooks/github endpoint, so test-slot
# orchestrators neither receive deliveries nor need this Secret. The deployment
# env reference is `optional: true` to match.
#
# `creationPolicy: Owner` and the verbose remoteRef defaults mirror
# externalsecret-nats.yaml. Without them ArgoCD's SSA diff treats ESO defaults as
# drift and self-heals in a loop.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecret.githubWebhook.secretName }}
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: {{ .Values.externalSecret.storeKind }}
  target:
    name: {{ .Values.externalSecret.githubWebhook.secretName }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: {{ .Values.externalSecret.githubWebhook.secretKey }}
      remoteRef:
        key: {{ .Values.externalSecret.githubWebhook.kvKey }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
{{- end }}
