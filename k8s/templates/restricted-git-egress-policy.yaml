{{- if and .Values.agentEgressProxy.enabled .Values.agentEgressProxy.lockdown.enabled }}
# GitHub egress lockdown — see values.yaml agentEgressProxy.lockdown. Confines pods
# labeled `tank-operator/git-egress=proxy` (set by sessionmodel.go for EVERY session
# whose wall IP resolves — restricted AND unrestricted alike, because observation is
# universal) to the wall for GitHub: egress is allowed EVERYWHERE EXCEPT GitHub's
# published CIDRs. Because a wall-routed session's github.com / api.github.com are
# hostAlias-pinned to the wall's ClusterIP (a non-GitHub IP), the wall path is
# unaffected, while a direct-to-GitHub-IP bypass (curl 140.82.x, a hardcoded resolver,
# etc.) is denied at the network layer. The wall mints least-privilege for restricted
# sessions and FULL for unrestricted ones — the lockdown is about ROUTING (observe-all),
# not scope. (The resource name keeps the historical "restricted-" prefix to avoid a
# rename that would delete+recreate a deny policy and open a momentary direct-egress
# window; read it as "git egress restricted to wall-only", which now holds for all.)
#
# Properties this relies on:
#   * The label lands on every wall-routed session (restricted or not), so the lockdown
#     forces ALL of them through the wall — that is what makes observation airtight: an
#     unrestricted session can no longer egress direct and skip the projection/CI loop.
#   * The label lands only on NEW sessions, so existing sessions drain before they are
#     ever selected (no mid-session breakage).
#   * codeload + raw/objects.githubusercontent.com are fronted by the wall (Stage 2)
#     and denied here too, so every GitHub host the wall serves is reachable only
#     through it. The Fastly /22 also serves GitHub Pages (*.github.io), which the
#     wall does not front, so direct Pages fetches are blocked (rare for dev work).
#
# The `except` CIDRs are GENERATED from api.github.com/meta — DO NOT hand-edit the
# marker blocks. Refresh with `scripts/gen-github-egress-cidrs.py` (scheduled by
# .github/workflows/refresh-github-egress-cidrs.yml). A stale list fails OPEN (a newly
# announced GitHub range would be reachable directly), so keeping it current is part
# of the control, not a nicety.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: restricted-git-egress-wall-only
  namespace: {{ include "tank-operator.sessionsNamespace" . }}
  labels:
    app.kubernetes.io/managed-by: tank-operator
    app.kubernetes.io/part-of: agent-egress-proxy
spec:
  podSelector:
    matchLabels:
      tank-operator/git-egress: proxy
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              # BEGIN github-egress-cidrs-v4 (generated; do not edit by hand)
              - 4.208.26.197/32
              - 4.208.26.198/32
              - 4.208.26.200/32
              - 4.225.11.194/32
              - 4.225.11.200/32
              - 4.225.11.201/32
              - 4.228.31.145/32
              - 4.228.31.149/32
              - 4.228.31.150/32
              - 4.237.22.34/32
              - 4.237.22.38/32
              - 4.237.22.40/32
              - 20.26.156.210/32
              - 20.26.156.214/32
              - 20.26.156.215/32
              - 20.27.177.113/32
              - 20.27.177.116/32
              - 20.27.177.118/32
              - 20.29.134.17/32
              - 20.29.134.19/32
              - 20.29.134.23/32
              - 20.87.245.0/32
              - 20.87.245.4/32
              - 20.87.245.6/32
              - 20.175.192.146/32
              - 20.175.192.147/32
              - 20.175.192.149/32
              - 20.199.39.227/32
              - 20.199.39.228/32
              - 20.199.39.232/32
              - 20.200.245.245/32
              - 20.200.245.247/32
              - 20.200.245.248/32
              - 20.201.28.148/32
              - 20.201.28.151/32
              - 20.201.28.152/32
              - 20.205.243.160/32
              - 20.205.243.166/32
              - 20.205.243.168/32
              - 20.207.73.82/32
              - 20.207.73.83/32
              - 20.207.73.85/32
              - 20.217.135.0/32
              - 20.217.135.4/32
              - 20.217.135.5/32
              - 20.233.83.145/32
              - 20.233.83.146/32
              - 20.233.83.149/32
              - 140.82.112.0/20
              - 143.55.64.0/20
              - 185.199.108.0/22
              - 192.30.252.0/22
              # END github-egress-cidrs-v4
        - ipBlock:
            cidr: "::/0"
            except:
              # BEGIN github-egress-cidrs-v6 (generated; do not edit by hand)
              - 2606:50c0::/32
              - 2a0a:a440::/29
              # END github-egress-cidrs-v6
{{- end }}
