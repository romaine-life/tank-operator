# Orchestrator (running as the `tank-operator` SA in the tank-operator ns)
# owns ephemeral session Pods in the sessions namespace. A Pod is the session
# runtime; if it dies, the session is failed rather than transparently
# recreated as an empty replacement.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tank-operator-sessions-mgr
  namespace: {{ include "tank-operator.sessionsNamespace" . }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tank-operator-sessions-mgr
  namespace: {{ include "tank-operator.sessionsNamespace" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "tank-operator.orchestratorServiceAccount" . }}
    namespace: {{ include "tank-operator.orchestratorNamespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tank-operator-sessions-mgr
---
# Orchestrator SA needs auth-delegator so the /api/internal/resolve-caller
# endpoint can call TokenReview to validate inbound mcp-github SA tokens
# (#57 stage 3).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "tank-operator.orchestratorServiceAccount" . }}-auth-delegator
subjects:
  - kind: ServiceAccount
    name: {{ include "tank-operator.orchestratorServiceAccount" . }}
    namespace: {{ include "tank-operator.orchestratorNamespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
---
# Session SA gets cluster-admin so an in-cluster Claude session can act on
# the cluster directly (patch finalizers, delete wedged releases, edit
# shared infra) instead of asking the user to run every kubectl by hand.
# This is a single-user personal AKS cluster; no multi-tenant safety
# concern. If this cluster ever turns multi-tenant, scope this down.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "tank-operator.sessionServiceAccount" . }}-cluster-admin
subjects:
  - kind: ServiceAccount
    name: {{ include "tank-operator.sessionServiceAccount" . }}
    namespace: {{ include "tank-operator.sessionsNamespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
