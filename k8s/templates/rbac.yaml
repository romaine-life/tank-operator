# Orchestrator (running as the `tank-operator` SA in the tank-operator ns) needs to manage
# Deployments and pods/exec in the sessions namespace. (Was Jobs; switched so ArgoCD's
# resource tree shows session pods richly and the workload semantics are correct —
# long-running until killed, not batch.)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tank-operator-sessions-mgr
  namespace: {{ .Values.namespaces.sessions }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tank-operator-sessions-mgr
  namespace: {{ .Values.namespaces.sessions }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.orchestrator.serviceAccount }}
    namespace: {{ .Values.namespaces.orchestrator }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tank-operator-sessions-mgr
---
# Session SA gets cluster-admin so an in-cluster Claude session can act on
# the cluster directly (patch finalizers, delete wedged releases, edit
# shared infra) instead of asking the user to run every kubectl by hand.
# This is a single-user personal AKS cluster; no multi-tenant safety
# concern. If this cluster ever turns multi-tenant, scope this down.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.session.serviceAccount }}-cluster-admin
subjects:
  - kind: ServiceAccount
    name: {{ .Values.session.serviceAccount }}
    namespace: {{ .Values.namespaces.sessions }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
