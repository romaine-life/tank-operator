{{- if eq (include "tank-operator.renderWarm" .) "true" }}
# Orchestrator (running as the `tank-operator` SA in the tank-operator ns)
# owns ephemeral session Pods in the sessions namespace. A Pod is the session
# runtime; if it dies, the session is failed rather than transparently
# recreated as an empty replacement.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tank-operator-sessions-mgr
  namespace: {{ include "tank-operator.sessionsNamespace" . }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
{{- if not (eq (include "tank-operator.isTestEnv" .) "true") }}
  # Mint short-lived tokens for the trusted (cluster-admin) session SA used as
  # the kubectl credential for NON-RESTRICTED sessions. The orchestrator's
  # cluster-credential endpoint mints on demand after binding the caller pod to
  # a non-restricted session. resourceNames-scoped so the orchestrator can mint
  # ONLY for this one SA, never arbitrary accounts. Prod only — test slots have
  # no trusted SA and stay free of cluster-scoped RBAC.
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    resourceNames: ["{{ include "tank-operator.sessionServiceAccount" . }}-trusted"]
    verbs: ["create"]
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tank-operator-sessions-mgr
  namespace: {{ include "tank-operator.sessionsNamespace" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "tank-operator.orchestratorServiceAccount" . }}
    namespace: {{ include "tank-operator.orchestratorNamespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tank-operator-sessions-mgr
---
# Orchestrator-local scratch state. Keep this narrow: the server uses it for
# the styleguide element-selection handoff between browser and agent.
# Also holds the coordination.k8s.io Lease that single-writes the
# session-controller K8s watch (replicas=2 → need a lease to dedupe
# pod-transition row UPDATEs across replicas). See
# backend-go/internal/sessioncontroller and docs/observability.md.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tank-operator-design-selection
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "update"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tank-operator-design-selection
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "tank-operator.orchestratorServiceAccount" . }}
    namespace: {{ include "tank-operator.orchestratorNamespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tank-operator-design-selection
---
# Read-only cluster health for the authenticated home/sidebar surface. The
# endpoint only needs node readiness/pressure; session pod health is covered by
# the namespace-scoped sessions manager Role above.
{{- if not (eq (include "tank-operator.isTestEnv" .) "true") }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "tank-operator.orchestratorServiceAccount" . }}-cluster-health
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "tank-operator.orchestratorServiceAccount" . }}-cluster-health
subjects:
  - kind: ServiceAccount
    name: {{ include "tank-operator.orchestratorServiceAccount" . }}
    namespace: {{ include "tank-operator.orchestratorNamespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "tank-operator.orchestratorServiceAccount" . }}-cluster-health
---
{{- end }}
{{- if not (eq (include "tank-operator.isTestEnv" .) "true") }}
# Orchestrator SA needs auth-delegator so internal endpoints can call
# TokenReview for audience-scoped service-account tokens.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "tank-operator.orchestratorServiceAccount" . }}-auth-delegator
subjects:
  - kind: ServiceAccount
    name: {{ include "tank-operator.orchestratorServiceAccount" . }}
    namespace: {{ include "tank-operator.orchestratorNamespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
---
# Session SA is READ-ONLY on the cluster. An in-cluster agent can `kubectl get`
# anything transparently, but cannot write or exec — in particular it cannot
# `kubectl cp`/exec into a test slot to bypass the CI-gated hot-swap path. Slot
# mutation goes through the gated `apply_test_slot_hot_swap` MCP tool; serious
# ad-hoc cluster writes go through a gated MCP path / break-glass, never the
# session's own credential. (Was cluster-admin — removing it is the enforcement
# half of routing every slot hot-swap through CI. RBAC is allow-only, so
# read-only is expressed as a grant, not a carve-out from cluster-admin.)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tank-session-readonly
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["*"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "tank-operator.sessionServiceAccount" . }}-readonly
subjects:
  - kind: ServiceAccount
    name: {{ include "tank-operator.sessionServiceAccount" . }}
    namespace: {{ include "tank-operator.sessionsNamespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tank-session-readonly
---
# Trusted session SA (PROD ONLY): a cluster-admin identity used ONLY as the
# on-demand kubectl credential for NON-RESTRICTED sessions. The orchestrator
# mints a short-lived token for it (cluster-credential endpoint) after
# TokenReview-binding the caller pod to a non-restricted session. It is never the
# pod's own serviceAccountName, so MCP auth (bound to the base session SA) is
# unaffected and restricted sessions stay read-only. Test slots never render it,
# so they stay free of cluster-scoped RBAC (check-test-slot-provider-
# credentials.sh) and the CI-gated hot-swap path stays closed.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "tank-operator.sessionServiceAccount" . }}-trusted
  namespace: {{ include "tank-operator.sessionsNamespace" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "tank-operator.sessionServiceAccount" . }}-trusted-cluster-admin
subjects:
  - kind: ServiceAccount
    name: {{ include "tank-operator.sessionServiceAccount" . }}-trusted
    namespace: {{ include "tank-operator.sessionsNamespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
{{- end }}
{{- if eq (include "tank-operator.isTestEnv" .) "true" }}
---
# The shared NATS auth-callout runs in the production orchestrator namespace,
# but test-slot session pods live in per-slot namespaces. It must read the
# bound pod's labels after TokenReview to issue the per-session NATS user.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tank-nats-auth-callout-pods
  namespace: {{ include "tank-operator.sessionsNamespace" . }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tank-nats-auth-callout-pods
  namespace: {{ include "tank-operator.sessionsNamespace" . }}
subjects:
  - kind: ServiceAccount
    name: nats-auth-callout
    namespace: {{ .Values.namespaces.orchestrator }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tank-nats-auth-callout-pods
{{- end }}
{{- end }}
