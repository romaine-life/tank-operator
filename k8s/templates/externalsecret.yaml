# Pulls the github-app-* secrets out of romaine-kv and bundles them into a single
# `github-app-creds` Secret in the sessions namespace. Each session pod envFroms it.
#
# The verbose remoteRef blocks (conversionStrategy/decodingStrategy/metadataPolicy/
# nullBytePolicy) match the ESO defaults; without spelling them out, ArgoCD's SSA
# diff treats the defaulted live state as drift and self-heals in a loop. See
# infra-bootstrap memory `reference_eso_argocd_ssa_drift.md`.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "tank-operator.githubAppSecret" . }}
  namespace: {{ include "tank-operator.sessionsNamespace" . }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: {{ .Values.externalSecret.storeKind }}
  target:
    name: {{ include "tank-operator.githubAppSecret" . }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    {{- range .Values.externalSecret.githubApp.keys }}
    - secretKey: {{ .envVar }}
      remoteRef:
        key: {{ .kvKey }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    {{- end }}
