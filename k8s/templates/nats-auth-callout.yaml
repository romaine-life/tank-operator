{{- /*
Per-session NATS credential issuer (tank-operator#1128).

Session pods authenticate to NATS with their projected SA token (audience
https://auth.romaine.life) instead of the shared fleet token; this service answers
the NATS server's $SYS.REQ.USER.AUTH callout with a user JWT scoped to the
pod's own session subjects. Identity comes from auth.romaine.life's existing
k8s service-principal exchange and platform JWT — never the client's claimed
username, and never a direct pod read by this callout.

The NATS server routes non-static clients through authorization.auth_callout
pointing at this issuer's account key. The orchestrator and this callout are
static auth_users, so a callout outage cannot take down the command plane:
existing connections keep their authorization, and a NEW pod's connect just
retries (maxReconnectAttempts -1; JetStream redelivers).

Test slots never render the Deployment (isTestEnv excluded): they share the
production NATS broker and production auth-callout. Warm slot renders no NATS
callout RBAC; auth.romaine.life owns pod-lineage reads for the exchange path.
*/}}
{{- if and .Values.natsCallout.enabled (not (eq (include "tank-operator.isTestEnv" .) "true")) }}
{{- /*
Issuer seed (account nkey that signs user JWTs; its PUBLIC key goes in the
NATS server's auth_callout.issuer) and the callout's own static NATS user
password. Seeded to KV out-of-band like the fleet token; see
docs/session-bus-auth.md for the one-time `nk -gen account` step.
*/}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tank-nats-callout
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: {{ .Values.externalSecret.storeKind }}
  target:
    name: tank-nats-callout
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: issuer-seed
      remoteRef:
        key: {{ .Values.natsCallout.issuerSeedKvKey }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: password
      remoteRef:
        key: {{ .Values.natsCallout.passwordKvKey }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats-auth-callout
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
  labels:
    app.kubernetes.io/name: nats-auth-callout
spec:
  replicas: {{ .Values.natsCallout.replicas }}
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: nats-auth-callout
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nats-auth-callout
    spec:
      automountServiceAccountToken: false
      containers:
        - name: callout
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/app/nats-auth-callout"]
          env:
            - name: NATS_URL
              value: {{ .Values.sessionBus.url | quote }}
            - name: NATS_CALLOUT_USER
              value: {{ .Values.natsCallout.user | quote }}
            - name: NATS_CALLOUT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tank-nats-callout
                  key: password
            - name: NATS_CALLOUT_ISSUER_SEED
              valueFrom:
                secretKeyRef:
                  name: tank-nats-callout
                  key: issuer-seed
            - name: NATS_CALLOUT_AUTH_EXCHANGE_URL
              value: "https://auth.romaine.life/api/auth/exchange/k8s"
            - name: NATS_CALLOUT_COMMAND_STREAM
              value: {{ .Values.sessionBus.commandStream | quote }}
            - name: METRICS_PORT
              value: "9100"
          ports:
            - name: metrics
              containerPort: 9100
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 2
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
{{- end }}
