{{- if eq (include "tank-operator.renderHot" .) "true" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tank-operator
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
  labels:
    app.kubernetes.io/name: tank-operator
spec:
  replicas: {{ .Values.orchestrator.replicas }}
  revisionHistoryLimit: 0
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tank-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tank-operator
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: {{ include "tank-operator.orchestratorServiceAccount" . }}
      terminationGracePeriodSeconds: {{ .Values.orchestrator.terminationGracePeriodSeconds }}
      {{- if and (eq (include "tank-operator.isTestEnv" .) "true") .Values.hotSwapBackend.enabled }}
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      {{- end }}
      containers:
        - name: tank-operator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if and (eq (include "tank-operator.isTestEnv" .) "true") .Values.hotSwapBackend.enabled }}
          command: ["/app/tank-supervisor"]
          {{- else }}
          command: ["/app/tank-operator-go"]
          {{- end }}
          terminationMessagePolicy: FallbackToLogsOnError
          ports:
            - name: http
              containerPort: 8000
            - name: oauth-tls
              containerPort: 8443
          env:
            - name: SESSIONS_NAMESPACE
              value: {{ include "tank-operator.sessionsNamespace" . | quote }}
            - name: DESIGN_SELECTION_NAMESPACE
              value: {{ include "tank-operator.orchestratorNamespace" . | quote }}
            - name: TANK_OPERATOR_IMAGE
              value: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
            - name: TANK_OPERATOR_IMAGE_METADATA
              value: {{ .Values.image.metadata | default dict | toJson | quote }}
            - name: SESSION_IMAGE
              value: {{ .Values.session.image | quote }}
            - name: SESSION_IMAGE_METADATA
              value: {{ .Values.session.imageMetadata.claude | default dict | toJson | quote }}
            - name: CODEX_SESSION_IMAGE
              value: {{ .Values.session.codexImage | quote }}
            - name: CODEX_SESSION_IMAGE_METADATA
              value: {{ .Values.session.imageMetadata.codex | default dict | toJson | quote }}
            - name: SESSION_SERVICE_ACCOUNT
              value: {{ include "tank-operator.sessionServiceAccount" . | quote }}
            - name: SESSION_CONFIGMAP
              value: {{ include "tank-operator.sessionConfigMap" . | quote }}
            - name: SESSION_REGISTRY_SCOPE
              value: {{ include "tank-operator.sessionRegistryScope" . | quote }}
            - name: TANK_OPERATOR_INTERNAL_URL
              value: {{ include "tank-operator.internalURL" . | quote }}

            - name: IDLE_TIMEOUT_SECONDS
              value: {{ .Values.session.idleTimeoutSeconds | quote }}
            - name: REAPER_INTERVAL_SECONDS
              value: {{ .Values.session.reaperIntervalSeconds | quote }}
            - name: SESSION_SPIRELENS_TAILSCALE_OIDC_CLIENT_ID
              value: {{ .Values.session.spirelens.oidcClientId | quote }}
            - name: SESSION_SPIRELENS_TAILSCALE_TAILNET
              value: {{ .Values.session.spirelens.tailnet | quote }}
            - name: SESSION_SPIRELENS_TAILSCALE_AUTH_TAG
              value: {{ .Values.session.spirelens.authTag | quote }}
            - name: SESSION_SPIRELENS_HOST
              value: {{ .Values.session.spirelens.host | quote }}
            - name: SESSION_SPIRELENS_MCP_PORT
              value: {{ .Values.session.spirelens.port | quote }}
            - name: TANK_OPERATOR_STATIC_DIR
              value: /app/static
            - name: TANK_FORK_SESSION_PROMPT_FILE
              value: /etc/tank-operator/app-config/fork-session.md
            - name: TANK_INITIAL_MODE_DIAGNOSE_FILE
              value: /etc/tank-operator/app-config/initial-mode-diagnose.md
            - name: TANK_INITIAL_MODE_BUG_REPORT_FILE
              value: /etc/tank-operator/app-config/initial-mode-bug-report.md
            - name: TANK_INITIAL_MODE_QUALITY_GAPS_FILE
              value: /etc/tank-operator/app-config/initial-mode-quality-gaps.md
            - name: TANK_INITIAL_MODE_GO_LONG_FILE
              value: /etc/tank-operator/app-config/initial-mode-go-long.md
            - name: TANK_INITIAL_MODE_TEST_FILE
              value: /etc/tank-operator/app-config/initial-mode-test.md
            {{- if and (eq (include "tank-operator.isTestEnv" .) "true") .Values.staticOverride.enabled }}
            - name: TANK_OPERATOR_STATIC_OVERRIDE_DIR
              value: {{ .Values.staticOverride.mountPath | quote }}
            {{- end }}
            {{- if and (eq (include "tank-operator.isTestEnv" .) "true") .Values.hotSwapBackend.enabled }}
            - name: GLIMMUNG_SUPERVISOR_CHILD
              value: {{ .Values.hotSwapBackend.childCommand | quote }}
            - name: GLIMMUNG_SUPERVISOR_HOT_ARTIFACT
              value: {{ .Values.hotSwapBackend.target | quote }}
            - name: GLIMMUNG_SUPERVISOR_RESTART_ENABLED
              value: "true"
            {{- end }}
            {{- if (eq (include "tank-operator.isTestEnv" .) "true") }}
            # Tells the orchestrator runtime to attach test-slot hot-swap
            # surface (writable volume + supervisor env vars) onto the
            # SDK runner containers in session pods it spawns. Off in
            # production. See sessionmodel.ManifestOptions.HotSwapAgentRunner
            # and scripts/check-session-pod-hot-swap-migration.mjs.
            - name: SESSION_AGENT_RUNNER_HOT_SWAP_ENABLED
              value: "true"
            {{- end }}
            {{- if not (eq (include "tank-operator.isTestEnv" .) "true") }}
            - name: CLAUDE_CREDENTIALS_FILE
              value: /etc/claude-credentials/{{ .Values.externalSecret.claudeCredentials.secretKey }}
            {{- end }}
            - name: CLAUDE_OAUTH_GATEWAY_HOST
              value: {{ include "tank-operator.oauthGatewayHost" . | quote }}
            - name: CLAUDE_API_PROXY_HOST
              value: {{ include "tank-operator.apiProxyHost" . | quote }}
            - name: CLAUDE_SECONDARY_API_PROXY_HOST
              value: {{ include "tank-operator.claudeSecondaryApiProxyHost" . | quote }}
            - name: CODEX_API_PROXY_HOST
              value: {{ include "tank-operator.codexApiProxyHost" . | quote }}
            # Workload-identity wiring for the orchestrator's KV writes.
            # Used only by the break-glass save-credentials endpoint that
            # captures a logged-in blob from a config-mode pod. Steady-state
            # credential rotation lives in the api-proxy's ext_proc sidecar
            # (k8s/templates/api-proxy.yaml) - same UAMI, same env.
            #
            # Token file is mounted by the WI webhook because the pod
            # carries the `azure.workload.identity/use=true` label;
            # AZURE_CLIENT_ID + AZURE_TENANT_ID arrive via envFrom from
            # the ESO Secret that syncs the UAMI's client_id from KV.
            - name: AZURE_KEYVAULT_URL
              value: {{ .Values.credentialRefresher.keyVaultUrl | quote }}
            {{- if not (eq (include "tank-operator.isTestEnv" .) "true") }}
            - name: CLAUDE_CREDENTIALS_KV_KEY
              value: {{ include "tank-operator.claudeCredentialsKvKey" . | quote }}
            - name: CLAUDE_SECONDARY_CREDENTIALS_KV_KEY
              value: {{ include "tank-operator.claudeSecondaryCredentialsKvKey" . | quote }}
            - name: CODEX_CREDENTIALS_KV_KEY
              value: {{ include "tank-operator.codexCredentialsKvKey" . | quote }}
            {{- end }}
            - name: AZURE_FEDERATED_TOKEN_FILE
              value: /var/run/secrets/azure/tokens/azure-identity-token
            - name: AZURE_AUTHORITY_HOST
              value: https://login.microsoftonline.com/
            # Postgres Flexible Server - durable history layer. Auth is via
            # the same workload identity as the KV writer above; pgx mints a
            # fresh AAD token for `ossrdbms-aad.database.windows.net` on every
            # dial via BeforeConnect, and pool MaxConnLifetime is bounded
            # below the token's ~60-min expiry so a connection never holds an
            # expired credential. Empty POSTGRES_HOST puts every durable
            # store in degraded "stub" mode (logged warning at startup,
            # in-memory implementations returned), which keeps first-install
            # boot working before tofu has provisioned the server.
            - name: POSTGRES_HOST
              value: {{ .Values.postgres.host | quote }}
            - name: POSTGRES_DATABASE
              value: {{ .Values.postgres.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            # Production owns the shared schema. Test slots still read the
            # shared database for realistic validation data, but must not apply
            # unmerged schema migrations to it. This is derived from isTestEnv
            # so new slots inherit the invariant automatically.
            - name: RUN_MIGRATIONS
              value: {{ ternary "false" "true" (eq (include "tank-operator.isTestEnv" .) "true") | quote }}
            # Private avatar image object storage. Postgres stores only
            # metadata/blob keys; the orchestrator reads and writes blobs
            # through workload identity and serves them via authenticated
            # API routes.
            - name: AVATAR_BLOB_ACCOUNT_URL
              value: {{ .Values.avatarAssets.blobAccountURL | quote }}
            - name: AVATAR_BLOB_CONTAINER
              value: {{ .Values.avatarAssets.blobContainer | quote }}
            - name: NATS_URL
              value: {{ .Values.sessionBus.url | quote }}
            - name: NATS_STREAM
              value: {{ .Values.sessionBus.stream | quote }}
            - name: NATS_COMMAND_STREAM
              value: {{ .Values.sessionBus.commandStream | quote }}
            - name: NATS_STREAM_REPLICAS
              value: {{ .Values.sessionBus.streamReplicas | quote }}
            - name: NATS_AUTH_SECRET
              value: {{ .Values.sessionBus.authSecret | quote }}
            - name: NATS_MONITOR_URLS
              value: {{ join "," .Values.sessionBus.monitorURLs | quote }}
            - name: NATS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.sessionBus.authSecret | quote }}
                  key: token
{{- if .Values.sessionBus.user }}
            # 1128 stage 2: named static user, exempt from auth_callout;
            # the password is the same fleet token above.
            - name: NATS_USER
              value: {{ .Values.sessionBus.user | quote }}
{{- end }}
            - name: AKS_AUTO_UPGRADE_CHANNEL
              value: {{ .Values.clusterMaintenance.autoUpgradeChannel | quote }}
            - name: AKS_NODE_OS_UPGRADE_CHANNEL
              value: {{ .Values.clusterMaintenance.nodeOSUpgradeChannel | quote }}
            - name: AKS_MAINTENANCE_WINDOW_DAY_OF_WEEK
              value: {{ .Values.clusterMaintenance.autoUpgradeWindow.dayOfWeek | quote }}
            - name: AKS_MAINTENANCE_WINDOW_START_TIME
              value: {{ .Values.clusterMaintenance.autoUpgradeWindow.startTime | quote }}
            - name: AKS_MAINTENANCE_WINDOW_UTC_OFFSET
              value: {{ .Values.clusterMaintenance.autoUpgradeWindow.utcOffset | quote }}
            - name: AKS_MAINTENANCE_WINDOW_DURATION_HOURS
              value: {{ .Values.clusterMaintenance.autoUpgradeWindow.durationHours | quote }}
            # GitHub App slug used to build the install URL in the
            # onboarding flow (#57 stage 2). The App's Setup URL in the
            # GitHub UI must point at /api/github/install/callback for
            # the redirect to complete.
            - name: GITHUB_APP_SLUG
              value: {{ .Values.github.appSlug | quote }}
            # Cluster operator email used when Tank mints GitHub MCP
            # attestations for the host's sessions.
            - name: HOST_EMAIL
              value: {{ .Values.host.email | quote }}
            # Comma-separated emails that receive explicit super-admin
            # behavior in MCP servers. Empty uses HOST_EMAIL.
            - name: SUPER_ADMIN_EMAILS
              value: {{ .Values.superAdmins.emails | quote }}
            # Public hostname the orchestrator uses to build session URLs in
            # internal session API responses (mcp-tank-operator uses these).
            - name: TANK_UI_HOST
              value: {{ include "tank-operator.publicUIHost" . | quote }}
            # Projected SA token used by /api/github/repos. The backend
            # exchanges it on-behalf-of the SPA caller at auth.romaine.life,
            # then calls mcp-github over the cluster network.
            - name: MCP_GITHUB_EXCHANGE_URL
              value: "https://auth.romaine.life/api/auth/exchange/k8s"
            - name: MCP_GITHUB_SA_TOKEN_PATH
              value: "/var/run/secrets/auth.romaine.life/token"
            # Provider-credential health poller — reads the codex-api-proxy
            # /health/codex endpoint to drive the transcript-surfaced
            # "Codex sign-in expired" banner. The poll loop is conditional
            # on this env var being set; empty disables the banner
            # surface entirely (useful in test environments). The
            # re-auth URL is the user-facing affordance the SPA renders
            # as a button on the system message — point it at the
            # canonical Codex sign-in flow.
            - name: CODEX_PROXY_HEALTH_URL
              value: {{ .Values.providerHealth.codexProxyHealthURL | default "" | quote }}
            - name: CODEX_REAUTH_URL
              value: {{ .Values.providerHealth.codexReauthURL | default "https://auth.romaine.life" | quote }}
          envFrom:
            - secretRef:
                name: {{ include "tank-operator.credentialRefresherConfigSecret" . }}
          volumeMounts:
            - name: oauth-gateway-tls
              mountPath: /etc/oauth-gateway-tls
              readOnly: true
            {{- if not (eq (include "tank-operator.isTestEnv" .) "true") }}
            - name: claude-credentials
              mountPath: /etc/claude-credentials
              readOnly: true
            {{- end }}
            - name: app-config
              mountPath: /etc/tank-operator/app-config
              readOnly: true
            # Audience-pinned projected SA token used to exchange at
            # auth.romaine.life/api/auth/exchange/k8s for a role=service
            # JWT. Distinct file path (and distinct audience) from the
            # default cluster-API SA token at
            # /var/run/secrets/kubernetes.io/serviceaccount/token so a
            # stolen token cannot be replayed across services.
            - name: auth-romaine-sa-token
              mountPath: /var/run/secrets/auth.romaine.life
              readOnly: true
            {{- if and (eq (include "tank-operator.isTestEnv" .) "true") .Values.hotSwapBackend.enabled }}
            - name: hot-backend
              mountPath: {{ .Values.hotSwapBackend.mountPath | quote }}
            {{- end }}
            {{- if and (eq (include "tank-operator.isTestEnv" .) "true") .Values.staticOverride.enabled }}
            - name: static-override
              mountPath: {{ .Values.staticOverride.mountPath | quote }}
            {{- end }}
          # Burstable QoS (issue #1079 item 6): with no resources at all the
          # orchestrator ran BestEffort — first evicted under node pressure
          # and with zero CPU guarantee for the persister. Requests are the
          # guarantee; the memory limit is the runaway guard; no CPU limit
          # (throttling the persister is worse than contention).
          resources:
            requests:
              cpu: {{ .Values.orchestrator.resources.requests.cpu | quote }}
              memory: {{ .Values.orchestrator.resources.requests.memory | quote }}
            limits:
              memory: {{ .Values.orchestrator.resources.limits.memory | quote }}
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - sleep {{ .Values.orchestrator.preStopSleepSeconds }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
        {{- if and (eq (include "tank-operator.isTestEnv" .) "true") .Values.staticOverride.enabled }}
        - name: {{ .Values.staticOverride.writerContainerName }}
          image: {{ .Values.staticOverride.writerImage | quote }}
          imagePullPolicy: {{ .Values.staticOverride.writerImagePullPolicy }}
          command:
            - sh
            - -c
            - |
              mkdir -p {{ .Values.staticOverride.mountPath | quote }}
              while true; do sleep 3600; done
          volumeMounts:
            - name: static-override
              mountPath: {{ .Values.staticOverride.mountPath | quote }}
        {{- end }}
      volumes:
        - name: oauth-gateway-tls
          secret:
            secretName: claude-oauth-leaf
            optional: true  # cert-manager hasn't issued yet on first install
        {{- if not (eq (include "tank-operator.isTestEnv" .) "true") }}
        - name: claude-credentials
          secret:
            # ESO-managed; the orchestrator's in-process rotation writes
            # to KV and ESO mirrors KV to here within ~1m. Marked optional
            # so first install doesn't crash-loop the pod before ESO has
            # synced (or before "+ config sub" has seeded credentials).
            secretName: {{ include "tank-operator.claudeCredentialsSecret" . }}
            optional: true
        {{- end }}
        - name: app-config
          configMap:
            name: {{ include "tank-operator.appConfigMap" . }}
        # Projected SA token bound to the orchestrator pod, audience
        # https://auth.romaine.life. auth.romaine.life's
        # /api/auth/exchange/k8s validates the audience claim against
        # its K8S_SERVICE_AUDIENCE config and exchanges this token for
        # a role=service JWT (per romaine-life/auth#42 the orchestrator
        # is admitted as a `pod-stable` consumer with slug
        # `tank-operator`). The backend reads this file fresh per
        # exchange.
        - name: auth-romaine-sa-token
          projected:
            sources:
              - serviceAccountToken:
                  audience: "https://auth.romaine.life"
                  expirationSeconds: 3600
                  path: token
        {{- if and (eq (include "tank-operator.isTestEnv" .) "true") .Values.staticOverride.enabled }}
        - name: static-override
          emptyDir: {}
        {{- end }}
        {{- if and (eq (include "tank-operator.isTestEnv" .) "true") .Values.hotSwapBackend.enabled }}
        - name: hot-backend
          emptyDir: {}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: tank-operator
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
  labels:
    app.kubernetes.io/name: tank-operator
spec:
  selector:
    app.kubernetes.io/name: tank-operator
  ports:
    - name: http
      port: 80
      targetPort: http
{{- end }}
