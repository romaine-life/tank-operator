apiVersion: apps/v1
kind: Deployment
metadata:
  name: tank-operator
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
  labels:
    app.kubernetes.io/name: tank-operator
spec:
  replicas: {{ .Values.orchestrator.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tank-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tank-operator
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: {{ include "tank-operator.orchestratorServiceAccount" . }}
      terminationGracePeriodSeconds: {{ .Values.orchestrator.terminationGracePeriodSeconds }}
      containers:
        - name: tank-operator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          terminationMessagePolicy: FallbackToLogsOnError
          ports:
            - name: http
              containerPort: 8000
            - name: oauth-tls
              containerPort: 8443
          env:
            - name: SESSIONS_NAMESPACE
              value: {{ include "tank-operator.sessionsNamespace" . | quote }}
            - name: SESSION_IMAGE
              value: {{ .Values.session.image | quote }}
            - name: CODEX_SESSION_IMAGE
              value: {{ .Values.session.codexImage | quote }}
            - name: PI_SESSION_IMAGE
              value: {{ .Values.session.piImage | quote }}
            - name: SESSION_SERVICE_ACCOUNT
              value: {{ include "tank-operator.sessionServiceAccount" . | quote }}
            - name: SESSION_CONFIGMAP
              value: {{ include "tank-operator.sessionConfigMap" . | quote }}
            - name: SESSION_REGISTRY_SCOPE
              value: {{ include "tank-operator.sessionRegistryScope" . | quote }}
            - name: GITHUB_APP_SECRET
              value: {{ include "tank-operator.githubAppSecret" . | quote }}
            - name: CODEX_CREDS_SECRET
              value: {{ include "tank-operator.codexCredentialsSecret" . | quote }}
            - name: IDLE_TIMEOUT_SECONDS
              value: {{ .Values.session.idleTimeoutSeconds | quote }}
            - name: REAPER_INTERVAL_SECONDS
              value: {{ .Values.session.reaperIntervalSeconds | quote }}
            - name: TANK_OPERATOR_STATIC_DIR
              value: /app/static
            {{- if and .Values.testEnv.enabled .Values.staticOverride.enabled }}
            - name: TANK_OPERATOR_STATIC_OVERRIDE_DIR
              value: {{ .Values.staticOverride.mountPath | quote }}
            {{- end }}
            - name: CLAUDE_CREDENTIALS_FILE
              value: /etc/claude-credentials/{{ .Values.externalSecret.claudeCredentials.secretKey }}
            - name: CLAUDE_OAUTH_GATEWAY_HOST
              value: {{ include "tank-operator.oauthGatewayHost" . | quote }}
            - name: CLAUDE_API_PROXY_HOST
              value: {{ include "tank-operator.apiProxyHost" . | quote }}
            # Workload-identity wiring for the orchestrator's KV writes.
            # Used only by the break-glass save-credentials endpoint that
            # captures a logged-in blob from a config-mode pod. Steady-state
            # credential rotation lives in the api-proxy's ext_proc sidecar
            # (k8s/templates/api-proxy.yaml) — same UAMI, same env.
            #
            # Token file is mounted by the WI webhook because the pod
            # carries the `azure.workload.identity/use=true` label;
            # AZURE_CLIENT_ID + AZURE_TENANT_ID arrive via envFrom from
            # the ESO Secret that syncs the UAMI's client_id from KV.
            - name: AZURE_KEYVAULT_URL
              value: {{ .Values.credentialRefresher.keyVaultUrl | quote }}
            - name: CLAUDE_CREDENTIALS_KV_KEY
              value: {{ include "tank-operator.claudeCredentialsKvKey" . | quote }}
            - name: AZURE_FEDERATED_TOKEN_FILE
              value: /var/run/secrets/azure/tokens/azure-identity-token
            - name: AZURE_AUTHORITY_HOST
              value: https://login.microsoftonline.com/
            # Cosmos DB profile store (#57). Auth is via the same workload
            # identity as the KV writer above — DefaultAzureCredential picks
            # up the federated SA-token. Empty COSMOS_ENDPOINT puts the
            # backend's profiles store in degraded "stub" mode (logged
            # warning at startup, in-memory Profile returned for any
            # get_or_create), which keeps first-install boot working before
            # tofu has provisioned the account.
            - name: COSMOS_ENDPOINT
              value: {{ .Values.cosmos.endpoint | quote }}
            - name: COSMOS_DATABASE
              value: {{ .Values.cosmos.database | quote }}
            - name: COSMOS_PROFILES_CONTAINER
              value: {{ .Values.cosmos.profilesContainer | quote }}
            - name: COSMOS_ACTIVE_RUNS_CONTAINER
              value: {{ .Values.cosmos.activeRunsContainer | quote }}
            - name: COSMOS_RUN_EVENTS_CONTAINER
              value: {{ .Values.cosmos.runEventsContainer | quote }}
            # GitHub App slug used to build the install URL in the
            # onboarding flow (#57 stage 2). The App's Setup URL in the
            # GitHub UI must point at /api/github/install/callback for
            # the redirect to complete.
            - name: GITHUB_APP_SLUG
              value: {{ .Values.github.appSlug | quote }}
            # Cluster operator email (#57 stage 3) — tagged on the
            # /api/internal/resolve-caller response so mcp-github can
            # use the host's romaine-life-app installation for
            # host-owned repos when a non-host caller touches them.
            - name: HOST_EMAIL
              value: {{ .Values.host.email | quote }}
            # Comma-separated "namespace/serviceaccount" pairs allowed to call
            # /api/internal/*. Widened here to include mcp-tank-operator in
            # addition to mcp-github. Override in per-slot value overlays when
            # the SA namespace differs.
            - name: INTERNAL_API_ALLOWED_SUBJECTS
              value: {{ .Values.internalApi.allowedSubjects | quote }}
            # Public hostname the orchestrator uses to build session URLs in
            # internal session API responses (mcp-tank-operator uses these).
            - name: TANK_UI_HOST
              value: {{ .Values.internalApi.tankUiHost | quote }}
            - name: PYTHONFAULTHANDLER
              value: "1"
          envFrom:
            - secretRef:
                name: {{ include "tank-operator.authSecret" . }}
            - secretRef:
                name: {{ include "tank-operator.credentialRefresherConfigSecret" . }}
          volumeMounts:
            - name: oauth-gateway-tls
              mountPath: /etc/oauth-gateway-tls
              readOnly: true
            - name: claude-credentials
              mountPath: /etc/claude-credentials
              readOnly: true
            {{- if and .Values.testEnv.enabled .Values.staticOverride.enabled }}
            - name: static-override
              mountPath: {{ .Values.staticOverride.mountPath | quote }}
              readOnly: true
            {{- end }}
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - sleep {{ .Values.orchestrator.preStopSleepSeconds }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
        {{- if and .Values.testEnv.enabled .Values.staticOverride.enabled }}
        - name: {{ .Values.staticOverride.writerContainerName }}
          image: {{ .Values.staticOverride.writerImage | quote }}
          imagePullPolicy: {{ .Values.staticOverride.writerImagePullPolicy }}
          command:
            - sh
            - -c
            - |
              mkdir -p {{ .Values.staticOverride.mountPath | quote }}
              while true; do sleep 3600; done
          volumeMounts:
            - name: static-override
              mountPath: {{ .Values.staticOverride.mountPath | quote }}
        {{- end }}
      volumes:
        - name: oauth-gateway-tls
          secret:
            secretName: claude-oauth-leaf
            optional: true  # cert-manager hasn't issued yet on first install
        - name: claude-credentials
          secret:
            # ESO-managed; the orchestrator's in-process rotation writes
            # to KV and ESO mirrors KV → here within ~1m. Marked optional
            # so first install doesn't crash-loop the pod before ESO has
            # synced (or before "+ config sub" has seeded credentials).
            secretName: {{ include "tank-operator.claudeCredentialsSecret" . }}
            optional: true
        {{- if and .Values.testEnv.enabled .Values.staticOverride.enabled }}
        - name: static-override
          emptyDir: {}
        {{- end }}
---
{{- if .Values.goShadow.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tank-operator-go-shadow
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
  labels:
    app.kubernetes.io/name: tank-operator-go-shadow
spec:
  replicas: {{ .Values.goShadow.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: tank-operator-go-shadow
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tank-operator-go-shadow
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: {{ include "tank-operator.orchestratorServiceAccount" . }}
      containers:
        - name: tank-operator-go-shadow
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /app/tank-operator-go
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: TANK_GO_SHADOW_SESSIONS
              value: "1"
            - name: TANK_PYTHON_BASE_URL
              value: {{ include "tank-operator.goShadowPythonBaseUrl" . | quote }}
            - name: SESSIONS_NAMESPACE
              value: {{ include "tank-operator.sessionsNamespace" . | quote }}
            - name: SESSION_REGISTRY_SCOPE
              value: {{ include "tank-operator.sessionRegistryScope" . | quote }}
            - name: COSMOS_ENDPOINT
              value: {{ .Values.cosmos.endpoint | quote }}
            - name: COSMOS_DATABASE
              value: {{ .Values.cosmos.database | quote }}
            - name: COSMOS_PROFILES_CONTAINER
              value: {{ .Values.cosmos.profilesContainer | quote }}
            - name: AZURE_FEDERATED_TOKEN_FILE
              value: /var/run/secrets/azure/tokens/azure-identity-token
            - name: AZURE_AUTHORITY_HOST
              value: https://login.microsoftonline.com/
          envFrom:
            - secretRef:
                name: {{ include "tank-operator.authSecret" . }}
            - secretRef:
                name: {{ include "tank-operator.credentialRefresherConfigSecret" . }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: tank-operator-go-shadow
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
spec:
  selector:
    app.kubernetes.io/name: tank-operator-go-shadow
  ports:
    - name: http
      port: 80
      targetPort: http
---
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: tank-operator
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
spec:
  selector:
    app.kubernetes.io/name: tank-operator
  ports:
    - name: http
      port: 80
      targetPort: http
