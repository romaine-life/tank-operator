# Mirrors the `codex-credentials` KV secret into a Secret in the SESSIONS
# namespace, where codex_subscription pods mount it as a file at
# /etc/codex-creds/auth.json.
#
# Differs from claudeCredentials: that one targets the orchestrator
# namespace (the api-proxy mounts it; session pods never see it). Codex
# has no proxy today — pods mount this Secret directly. See
# k8s/values.yaml externalSecret.codexCredentials and the codex_gui /
# codex_cli paths in backend-go/internal/sessions/dispatch.go for the
# multi-pod rotation gap this still leaves open.
#
# `creationPolicy: Owner` and the verbose remoteRef defaults match the
# pattern in externalsecret.yaml — without them ArgoCD's SSA diff
# treats ESO defaults as drift and self-heals in a loop.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "tank-operator.codexCredentialsSecret" . }}
  namespace: {{ include "tank-operator.sessionsNamespace" . }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: {{ .Values.externalSecret.storeKind }}
  target:
    name: {{ include "tank-operator.codexCredentialsSecret" . }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: {{ .Values.externalSecret.codexCredentials.secretKey }}
      remoteRef:
        key: {{ .Values.externalSecret.codexCredentials.kvKey }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
