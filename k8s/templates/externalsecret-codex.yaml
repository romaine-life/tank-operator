# Mirrors the `codex-credentials` KV secret into a Secret in the
# ORCHESTRATOR namespace for the codex-api-proxy ext_proc sidecar.
#
# Codex CLI/GUI session pods do not mount this Secret. They write a
# synthetic ~/.codex/auth.json with auth_mode=chatgptAuthTokens and a
# placeholder access token; codex-api-proxy owns the real access/refresh
# token chain and writes rotations back to KV.
#
# `creationPolicy: Owner` and the verbose remoteRef defaults match the
# pattern in externalsecret.yaml. Without them ArgoCD's SSA diff treats
# ESO defaults as drift and self-heals in a loop.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "tank-operator.codexCredentialsSecret" . }}
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: {{ .Values.externalSecret.storeKind }}
  target:
    name: {{ include "tank-operator.codexCredentialsSecret" . }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: {{ .Values.externalSecret.codexCredentials.secretKey }}
      remoteRef:
        key: {{ .Values.externalSecret.codexCredentials.kvKey }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
