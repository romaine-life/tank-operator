{{- if eq (include "tank-operator.renderWarm" .) "true" }}
# Proxyless Gemini OAuth credential. Unlike Claude/Codex there is no proxy: the
# gemini_gui session pod mounts this Secret DIRECTLY at
# /etc/gemini-credentials/oauth_creds.json and the gemini CLI refreshes the
# Google token itself. We therefore sync it into the SESSIONS namespace (where
# the pods live), not the orchestrator namespace. Test slots get a slot-local
# Secret name so leases clean up independently, but every environment reads the
# same shared no-proxy OAuth credential from KV.
#
# `creationPolicy: Owner` and the verbose remoteRef defaults match the pattern
# in externalsecret.yaml. Without them ArgoCD's SSA diff treats ESO defaults as
# drift and self-heals in a loop.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "tank-operator.geminiCredentialsTestSecret" . }}
  namespace: {{ include "tank-operator.sessionsNamespace" . }}
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: {{ .Values.externalSecret.storeKind }}
  target:
    name: {{ include "tank-operator.geminiCredentialsTestSecret" . }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: oauth_creds.json
      remoteRef:
        key: {{ include "tank-operator.geminiCredentialsTestKvKey" . }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
{{- end }}
