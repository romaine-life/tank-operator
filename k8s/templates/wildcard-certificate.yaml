{{- if and .Values.wildcardCertificate.enabled (not (eq (include "tank-operator.isTestEnv" .) "true")) }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.wildcardCertificate.tlsSecret }}
  namespace: {{ include "tank-operator.orchestratorNamespace" . }}
spec:
  secretName: {{ .Values.wildcardCertificate.tlsSecret }}
  issuerRef:
    name: {{ .Values.wildcardCertificate.issuer }}
    kind: {{ .Values.wildcardCertificate.issuerKind }}
  dnsNames:
    {{- range .Values.wildcardCertificate.hosts }}
    - {{ . | quote }}
    {{- end }}
{{- end }}
