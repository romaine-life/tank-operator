apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tank-operator.sessionConfigMap" . }}
  namespace: {{ include "tank-operator.sessionsNamespace" . }}
  labels:
    app.kubernetes.io/name: tank-operator
data:
  mcp.json: |
{{ .Files.Get "session-config/mcp.json" | indent 4 }}
  default-claude.md: |
{{ .Files.Get "session-config/default-claude.md" | indent 4 }}
  write-glimmung-context.sh: |
{{ .Files.Get "session-config/write-glimmung-context.sh" | indent 4 }}
  install-tank-skills.sh: |
{{ .Files.Get "session-config/install-tank-skills.sh" | indent 4 }}
  agent-runner-launch.sh: |
{{ .Files.Get "session-config/agent-runner-launch.sh" | indent 4 }}
  codex-runner-launch.sh: |
{{ .Files.Get "session-config/codex-runner-launch.sh" | indent 4 }}
{{- range $scope := list "common" "claude" "codex" }}
{{- range $path, $_ := $.Files.Glob (printf "session-config/skills/%s/**" $scope) }}
  skills__{{ trimPrefix "session-config/skills/" $path | replace "/" "__" }}: |
{{ $.Files.Get $path | indent 4 }}
{{- end }}
{{- end }}
