apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.session.configMap }}
  namespace: {{ .Values.namespaces.sessions }}
  labels:
    app.kubernetes.io/name: tank-operator
data:
  mcp.json: |
{{ .Files.Get "session-config/mcp.json" | indent 4 }}
  default-claude.md: |
{{ .Files.Get "session-config/default-claude.md" | indent 4 }}
  write-glimmung-context.sh: |
{{ .Files.Get "session-config/write-glimmung-context.sh" | indent 4 }}
  tank-bootstrap.sh: |
{{ .Files.Get "session-config/tank-bootstrap.sh" | indent 4 }}
  headless-run.sh: |
{{ .Files.Get "session-config/headless-run.sh" | indent 4 }}
{{- range $scope := list "common" "claude" "codex" }}
{{- range $path, $_ := $.Files.Glob (printf "session-config/skills/%s/**" $scope) }}
  skills__{{ trimPrefix "session-config/skills/" $path | replace "/" "__" }}: |
{{ $.Files.Get $path | indent 4 }}
{{- end }}
{{- end }}
