{{- if eq (include "tank-operator.renderWarm" .) "true" }}
{{- $mcpSpireLens := (.Files.Get "session-config/mcp.json" | fromJson) -}}
{{- $mcpSpireLensServers := (get $mcpSpireLens "mcpServers") -}}
{{- $_ := set $mcpSpireLensServers "spire-lens-mcp" (dict "type" "http" "url" "http://127.0.0.1:9997/mcp") -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tank-operator.sessionConfigMap" . }}
  namespace: {{ include "tank-operator.sessionsNamespace" . }}
  labels:
    app.kubernetes.io/name: tank-operator
data:
  mcp.json: |
{{ .Files.Get "session-config/mcp.json" | indent 4 }}
  mcp.spirelens.json: |
{{ $mcpSpireLens | toPrettyJson | indent 4 }}
  default-claude.md: |
{{ .Files.Get "session-config/default-claude.md" | indent 4 }}
  write-glimmung-context.sh: |
{{ .Files.Get "session-config/write-glimmung-context.sh" | indent 4 }}
  install-tank-docs.sh: |
{{ .Files.Get "session-config/install-tank-docs.sh" | indent 4 }}
  install-tank-skills.sh: |
{{ .Files.Get "session-config/install-tank-skills.sh" | indent 4 }}
  agent-post-commit-hook.sh: |
{{ .Files.Get "session-config/agent-post-commit-hook.sh" | indent 4 }}
  agent-pre-push-hook.sh: |
{{ .Files.Get "session-config/agent-pre-push-hook.sh" | indent 4 }}
  install-agent-git-template.sh: |
{{ .Files.Get "session-config/install-agent-git-template.sh" | indent 4 }}
  write-claude-settings.sh: |
{{ .Files.Get "session-config/write-claude-settings.sh" | indent 4 }}
  session-pod-bootstrap.sh: |
{{ .Files.Get "session-config/session-pod-bootstrap.sh" | indent 4 }}
  claude-runner-launch.sh: |
{{ .Files.Get "session-config/claude-runner-launch.sh" | indent 4 }}
  codex-runner-launch.sh: |
{{ .Files.Get "session-config/codex-runner-launch.sh" | indent 4 }}
  repo-cloner.sh: |
{{ .Files.Get "session-config/repo-cloner.sh" | indent 4 }}
{{- range $path, $_ := $.Files.Glob "session-config/docs/**" }}
  docs__{{ trimPrefix "session-config/docs/" $path | replace "/" "__" }}: |
{{ $.Files.Get $path | indent 4 }}
{{- end }}
{{- range $scope := list "common" "claude" "codex" "antigravity" }}
{{- range $path, $_ := $.Files.Glob (printf "session-config/skills/%s/**" $scope) }}
  skills__{{ trimPrefix "session-config/skills/" $path | replace "/" "__" }}: |
{{ $.Files.Get $path | indent 4 }}
{{- end }}
{{- end }}
{{- end }}
