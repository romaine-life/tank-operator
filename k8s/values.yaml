image:
  repository: romainecr.azurecr.io/tank-operator
  # SHA-pinned. The build workflow rewrites this line on every push to main
  # via a `[skip ci]` follow-up commit, so the cluster reconciles to the
  # exact image CI just produced — no implicit `:latest` drift.
  tag: "4320a77"
  pullPolicy: IfNotPresent

namespaces:
  orchestrator: tank-operator
  sessions: tank-operator-sessions

orchestrator:
  # Renamed from `infra-shared` to make explicit that this SA is *not* part of the
  # cluster's shared workload-identity pool — the orchestrator only needs in-cluster
  # K8s API auth (projected SA token + RoleBinding).
  serviceAccount: tank-operator
  replicas: 2
  terminationGracePeriodSeconds: 75
  preStopSleepSeconds: 20
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

session:
  # SHA-pinned. claude-container-build.yml rewrites these tag suffixes on
  # every push to main via a `[skip ci]` follow-up commit.
  image: romainecr.azurecr.io/claude-container:claude-8830ff958b11a7cddfb2c4d52dd87fb1598ec6ef98a3453435169302d6c5fbd4
  codexImage: romainecr.azurecr.io/codex-container:codex-ea7771dd50b2f186bd0556803ef7170ad1641de89220393fa9b628bedb6064d9
  piImage: romainecr.azurecr.io/pi-container:pi-df8b577187ecab9f7cc0eb9dbe21010581790bdb1ebdd6e55b183e2da1665241
  configMap: tank-session-config
  serviceAccount: claude-session
  registryScope: default
  # Idle reaper: a session with no open WebSocket connections for this many
  # seconds is deleted by the orchestrator's background sweep. 7 days is
  # effectively "manual close only" — the in-app close button is the
  # primary teardown path; this only reaps truly abandoned sessions left
  # running over a long weekend.
  idleTimeoutSeconds: 604800
  reaperIntervalSeconds: 60

terminalProxy:
  configMap: tank-terminal-proxy
  image: quay.io/brancz/kube-rbac-proxy:v0.22.0
  terminaldPort: 7680
  proxyPort: 7681

ingress:
  hostname: tank.romaine.life
  gatewayName: main
  gatewayNamespace: envoy-gateway-system
  certIssuer: letsencrypt-prod
  tlsSecret: tank-operator-tls

# Sessions ingress: wildcard DNS for *.<ingress.hostname>. Off by
# default; enabled only for slot envs that host a per-session
# subdomain space (cloudcli iframes etc). external-dns watches the
# DNSEndpoint and creates a wildcard A record, so per-session
# HTTPRoutes don't need their own DNS records (orchestrator marks
# them with external-dns.alpha.kubernetes.io/exclude=true).
sessionsIngress:
  # Set to a real value (the envoy-gateway LoadBalancer IP) when
  # enabling. Hardcoded because the Service holds a stable
  # Azure-allocated IP across normal operation.
  gatewayIP: ""
  dnsEndpoint:
    enabled: false
    ttl: 300

# OAuth gateway: the orchestrator pod also serves an HTTPS listener
# impersonating platform.claude.com (self-signed CA, trusted only by session
# pods that mount our ca.crt). Session pods get a hostAlias mapping that
# hostname to the gateway service's ClusterIP.
oauthGateway:
  serviceHost: claude-oauth-gateway.tank-operator.svc.cluster.local

# Anthropic API proxy: Envoy + ext_proc sidecar in front of api.anthropic.com.
# Session pods get a hostAlias mapping api.anthropic.com to this service's
# ClusterIP and the proxy injects the real OAuth Authorization on every
# request. See k8s/templates/api-proxy.yaml for the design rationale.
apiProxy:
  image:
    repository: romainecr.azurecr.io/api-proxy
    # SHA-pinned. The api-proxy build workflow rewrites this line on every
    # push to main via a `[skip ci]` follow-up commit. The 4-space indent
    # is load-bearing — the bump-tag sed in .github/workflows/api-proxy-build.yml
    # anchors to it so the orchestrator's 2-space `  tag:` line in this same
    # file isn't accidentally rewritten.
    tag: "33d14e7"
    pullPolicy: IfNotPresent
  envoyImage: envoyproxy/envoy:v1.34-latest
  serviceAccount: claude-api-proxy
  serviceHost: claude-api-proxy.tank-operator.svc.cluster.local
  configSecret: claude-api-proxy-config
  # Published to KV by infra/api_proxy.tf — separate UAMI from the
  # orchestrator's, scoped to "read+write the credentials KV secret only".
  kvClientIdKey: claude-api-proxy-mi-client-id

# Anthropic credential rotation: lives in the api-proxy's ext_proc sidecar
# (api-proxy/src/tank_api_proxy/server.py). The sidecar caches the access
# token, observes upstream 401s, calls platform.claude.com with the current
# refresh token to rotate, writes the new blob back to KV. ESO mirrors KV →
# the proxy's mounted Secret on a 1m interval.
#
# This values block is named `credentialRefresher` for legacy reasons —
# the original design used a CronJob that's since been retired. The block
# stayed because two consumers still authenticate to KV via the same UAMI:
#   - api-proxy ext_proc sidecar: KV write of rotated blobs.
#   - orchestrator save-credentials: KV write on "+ config sub" harvest.
# The UAMI itself (infra/credential_refresher.tf) keeps the legacy name
# for the same TF-state-stability reason; the ExternalSecret below syncs
# its AZURE_CLIENT_ID + AZURE_TENANT_ID into a Secret both consumers
# envFrom-pull, so DefaultAzureCredential mints a federated KV token
# bound to that UAMI.
credentialRefresher:
  configSecret: claude-credentials-refresher-config
  keyVaultUrl: https://romaine-kv.vault.azure.net/
  # Published to KV by infra/credential_refresher.tf (Terraform).
  kvClientIdKey: claude-credentials-refresher-mi-client-id
  kvTenantIdKey: mcp-tenant-id

# Cosmos DB — per-user profile store for multi-user (#57). Provisioned by
# infra/cosmos.tf; same workload-identity auth path as the KV writer above
# (the `claude-credentials-refresher-identity` UAMI carries both roles).
# Account name is a tofu variable defaulting to `tank-operator-romaine`;
# update `endpoint` here if you set TF_VAR_cosmos_account_name to something
# else.
cosmos:
  endpoint: https://tank-operator-romaine.documents.azure.com:443/
  database: tank-operator
  profilesContainer: profiles

# GitHub App slug used for the install URL the orchestrator redirects users
# to (#57 stage 2). The App's Setup URL must be configured to point at
# https://<hostname>/api/github/install/callback in the GitHub UI for
# the onboarding flow to complete. The `tank-operator` slug was taken on
# github.com so we registered as `tank-operator-romaine-life`.
github:
  appSlug: tank-operator-romaine-life

# Cluster operator email — the user whose romaine-life-app installation is
# the "host" fallback when a non-host session pod touches a host-owned repo
# via mcp-github (#57 stage 3). Empty means no host: every caller goes
# through the user-facing tank-operator-romaine-life App. Must match the
# tank-operator/owner-email annotation that session pods carry, which the
# orchestrator stamps from the signed-in user's email.
host:
  email: nelson@romaine.life

# Comma-separated "namespace/serviceaccount" pairs that may call the
# /api/internal/* endpoints. The default covers mcp-github and mcp-tank-operator;
# extend here when adding future in-cluster MCP servers that need the
# resolve-caller or internal-session APIs.
internalApi:
  allowedSubjects: "mcp-github/mcp-github,mcp-tank-operator/mcp-tank-operator"
  # Public hostname used to build session URLs returned by internal session endpoints.
  tankUiHost: "https://tank.romaine.life"

externalSecret:
  storeName: romaine-kv
  storeKind: ClusterSecretStore
  refreshInterval: 1h
  # Env vars the session container needs at startup. Session pods envFrom this
  # Secret. The MCP server list is mounted from the session.configMap
  # ConfigMap. Those MCP servers run in-cluster and read their own
  # credentials from KV via per-server
  # ExternalSecrets, NOT from this Secret.
  #
  # Both auth paths are bundled in every pod; the orchestrator stamps
  # TANK_SESSION_MODE on each Pod to pick which one the bootstrap uses:
  #   - api_key:      ANTHROPIC_API_KEY → console.anthropic.com billing.
  #                   Populate via scripts/setup-anthropic-key.ps1 (or .sh).
  #   - subscription: CLAUDE_CODE_CREDENTIALS_JSON → snapshot of an
  #                   already-logged-in machine's ~/.claude/.credentials.json,
  #                   bootstrap writes it back to that path so the TUI treats
  #                   the pod as a logged-in subscriber. Populate via
  #                   scripts/setup-claude-credentials.ps1 (or .sh).
  #
  # The block is named `githubApp` and the K8s Secret is `github-app-creds`
  # for legacy reasons — it used to carry the GitHub App private key, until
  # the App credentials moved to the mcp-github Deployment's own ExternalSecret
  # in the standalone mcp-github chart. Session pods never read
  # the App credentials directly; mcp-github mints installation tokens itself
  # and authenticates session-pod → mcp-github via the projected SA token.
  # Names retained to avoid a multi-step migration; rename when convenient.
  githubApp:
    secretName: github-app-creds
    keys:
      - envVar: ANTHROPIC_API_KEY
        kvKey: anthropic-api-key
  # Claude Code subscription credentials. Lives ONLY in the orchestrator
  # namespace; session pods cannot read this Secret. KV is the source of
  # truth: the orchestrator's in-process rotation writes to KV, ESO
  # mirrors KV → this Secret on a 1m interval, and the orchestrator pod
  # mounts the Secret as a file. Re-seed via the in-app "+ config sub"
  # flow, or out-of-band by uploading a fresh credentials.json to the
  # KV secret named below.
  claudeCredentials:
    secretName: claude-code-credentials
    secretKey: claude-code-credentials
    # Optional Key Vault secret name override. When empty, production uses
    # the historical `claude-code-credentials` name and validation slots use
    # `<orchestrator-namespace>-claude-code-credentials`, so each test env
    # gets its own refresh-token chain.
    kvKey: ""
  # OpenAI codex subscription credentials. Unlike claudeCredentials,
  # this Secret lives in the SESSIONS namespace — codex_subscription
  # pods mount it directly (no api-proxy in front today). The
  # ExternalSecret is templated by externalsecret-codex.yaml.
  #
  # The orchestrator's harvest path (codex_config save-credentials) is
  # the only writer; ESO mirrors KV → this Secret. Phase 2 will add
  # rotation-write-back from the pod side (or move to a proxy that owns
  # rotation centrally) — see CODEX_SUBSCRIPTION_MODE comment in
  # backend/src/tank_operator/sessions.py.
  codexCredentials:
    secretName: codex-credentials
    # Key inside the K8s Secret. The bootstrap reads
    # /etc/codex-creds/auth.json — Secret-volume keys mount as filenames,
    # so this name has to be `auth.json`.
    secretKey: auth.json
    kvKey: codex-credentials
  # Auth secrets for the orchestrator's MSAL → backend JWT flow. ENTRA_CLIENT_ID
  # is the audience for verifying Entra ID tokens; JWT_SECRET signs the backend's
  # own session tokens; ALLOWED_EMAILS (comma-separated) gates which signed-in
  # users can use the app.
  auth:
    secretName: tank-operator-auth
    keys:
      - envVar: ENTRA_CLIENT_ID
        kvKey: tank-operator-oauth-client-id
      - envVar: JWT_SECRET
        kvKey: tank-operator-jwt-secret
      - envVar: ALLOWED_EMAILS
        kvKey: tank-operator-oauth-allowed-emails
