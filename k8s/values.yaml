image:
  repository: romainecr.azurecr.io/tank-operator
  # SHA-pinned. The build workflow rewrites this line on every push to main
  # via a `[skip ci]` follow-up commit, so the cluster reconciles to the
  # exact image CI just produced â€” no implicit `:latest` drift.
  tag: "app-778aeb3ca5c013678bb451e6240fa8429c5d64e9cdcf64917667a42ba5486369"
  pullPolicy: IfNotPresent
  metadata:
    built_at: "2026-06-14T20:17:17Z"
    git_sha: "48012efb955385b647aa6fa66158d44087df7fcd"
    git_ref: "main"
    commit_url: "https://github.com/romaine-life/tank-operator/commit/48012efb955385b647aa6fa66158d44087df7fcd"
    pr_number: "1190"
    pr_url: "https://github.com/romaine-life/tank-operator/pull/1190"
    workflow_run_url: "https://github.com/romaine-life/tank-operator/actions/runs/27510788655"
    repository: "romaine-life/tank-operator"
    actor: "tank-operator-host[bot]"

# normal: regular chart render
# warm: per-slot baseline resources, no long-running app/proxy pods
# hot: per-slot live runtime resources
renderMode: normal

testEnv:
  # Stable slot identity for warm/hot Glimmung native validation slots.
  # Required when renderMode is warm or hot because split Helm releases use
  # different release names while rendering the same slot-local resource names.
  slotName: ""
  recordBase: tank.dev.romaine.life
  wildcardListenerSetName: tank-operator-wildcard
  wildcardListenerSetNamespace: tank-operator
  sessionsGatewayIP: 172.179.163.96

staticOverride:
  enabled: true
  mountPath: /var/run/tank-operator-static-override
  writerContainerName: static-writer
  writerImage: alpine:3.20
  writerImagePullPolicy: IfNotPresent

hotSwapBackend:
  enabled: true
  mountPath: /var/run/tank-operator-hot
  target: /var/run/tank-operator-hot/tank-operator-go
  childCommand: /app/tank-operator-go

namespaces:
  orchestrator: tank-operator
  sessions: tank-operator-sessions

orchestrator:
  # Renamed from `infra-shared` to make explicit that this SA is *not* part of the
  # cluster's shared workload-identity pool â€” the orchestrator only needs in-cluster
  # K8s API auth (projected SA token + RoleBinding).
  serviceAccount: tank-operator
  replicas: 2
  terminationGracePeriodSeconds: 75
  preStopSleepSeconds: 20
  # Burstable QoS for the orchestrator: requests guarantee scheduling
  # weight + eviction protection for the persister/SSE fabric; the memory
  # limit guards against runaway growth; CPU is deliberately unlimited.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

session:
  # SHA-pinned. claude-container-build.yml rewrites these tag suffixes on
  # every push to main via a `[skip ci]` follow-up commit.
  image: "romainecr.azurecr.io/claude-container:claude-a66e159d9f87fed3e883077d46fd5ff56a0e820cabaf6a0effe368549067564e"
  codexImage: "romainecr.azurecr.io/codex-container:codex-f4c5668d534f8dbd9f1944250b43d5c804ad46729b5cb544004eca353ceac777"
  imageMetadata:
    claude:
      built_at: "2026-06-14T19:21:27Z"
      git_sha: "23a92f149273dc9ca52ec3254a125002c7c96ff0"
      git_ref: "main"
      commit_url: "https://github.com/romaine-life/tank-operator/commit/23a92f149273dc9ca52ec3254a125002c7c96ff0"
      pr_number: ""
      pr_url: ""
      workflow_run_url: "https://github.com/romaine-life/tank-operator/actions/runs/27509375681"
      repository: "romaine-life/tank-operator"
      actor: "tank-operator-host[bot]"
    codex:
      built_at: "2026-06-14T19:21:27Z"
      git_sha: "23a92f149273dc9ca52ec3254a125002c7c96ff0"
      git_ref: "main"
      commit_url: "https://github.com/romaine-life/tank-operator/commit/23a92f149273dc9ca52ec3254a125002c7c96ff0"
      pr_number: ""
      pr_url: ""
      workflow_run_url: "https://github.com/romaine-life/tank-operator/actions/runs/27509375681"
      repository: "romaine-life/tank-operator"
      actor: "tank-operator-host[bot]"
  configMap: tank-session-config
  serviceAccount: claude-session
  registryScope: default
  # Idle reaper: a session whose durable row has been untouched for this
  # many seconds (no runner events, no status transitions, no read-state
  # refreshes) AND whose activity status is settled (ready/error) AND
  # which holds no pending scheduled wakeup, background-task wake, or
  # undispatched launch turn, is claimed and deleted by the durable
  # reaper (cmd/tank-operator/idle_session_reaper.go). The claim is one
  # conditional registry UPDATE, so any concurrent activity defeats it
  # atomically; both replicas may run the loop. 7 days is effectively
  # "manual close only": the in-app close button is the primary teardown
  # path; this only reaps truly abandoned sessions. (The prior in-memory
  # reaper's WebSocket guard was dead code and its clocks reset on every
  # deploy. See issue #1079.)
  idleTimeoutSeconds: 604800
  reaperIntervalSeconds: 900
  spirelens:
    # Non-secret OIDC federation trust used by opted-in session pods to join
    # the tailnet and reach the SpireLens game-host MCP. Dormant unless a
    # session is created with capabilities: ["spirelens_mcp"].
    oidcClientId: T6vFBk1dAa11CNTRL-kf6kJRvG5T11CNTRL
    tailnet: "-"
    authTag: tag:spirelens-orchestrator
    host: nelsonlaptop
    port: 15527

# Per-session NATS credential issuer (#1128): answers the NATS server's
# auth_callout with user JWTs scoped to one session's subjects, identity
# anchored in auth.romaine.life's k8s service-principal exchange.
# DISABLED until the staged rollout starts; flipping `enabled` only deploys
# the issuer — nothing routes through it until infra-bootstrap's NATS chart
# turns on authorization.auth_callout with this issuer's account public key
# (k8s/nats values there; both halves are documented in
# docs/session-bus-auth.md). The KV secrets are seeded out-of-band:
#   tank-nats-callout-issuer-seed  — `nk -gen account` seed (SA...)
#   tank-nats-callout-password     — the callout's static NATS user password
natsCallout:
  enabled: true
  replicas: 2
  user: nats-auth-callout
  issuerSeedKvKey: tank-nats-callout-issuer-seed
  passwordKvKey: tank-nats-callout-password

appConfig:
  configMap: tank-operator-app-config

ingress:
  hostname: tank.romaine.life
  gatewayName: main
  gatewayNamespace: envoy-gateway-system
  certIssuer: letsencrypt-prod
  tlsSecret: tank-operator-tls

# Shared HTTPS listener for validation slots. The synced prod release owns one
# wildcard cert/listener for tank.dev.romaine.life; slot HTTPRoutes attach to
# it instead of creating per-slot public certificates.
wildcardCertificate:
  enabled: true
  name: tank-operator-wildcard
  tlsSecret: tank-operator-wildcard-tls
  hosts:
    - tank.dev.romaine.life
    - "*.tank.dev.romaine.life"
  issuer: letsencrypt-prod-dns01
  issuerKind: ClusterIssuer
  allowedFromNamespaces: All

# Sessions ingress: wildcard DNS for *.<ingress.hostname>. Off by
# default; enabled only for environments that host a per-session
# subdomain space (cloudcli iframes etc). external-dns watches the
# DNSEndpoint and creates a wildcard A record, so per-session
# HTTPRoutes don't need their own DNS records (orchestrator marks
# them with external-dns.alpha.kubernetes.io/exclude=true).
sessionsIngress:
  # Set to a real value (the envoy-gateway LoadBalancer IP) when
  # enabling. Hardcoded because the Service holds a stable
  # Azure-allocated IP across normal operation.
  gatewayIP: ""
  dnsEndpoint:
    enabled: false
    ttl: 300

# OAuth gateway: production serves the HTTPS listener impersonating
# platform.claude.com (self-signed CA, trusted only by session pods that mount
# our ca.crt). Session pods in production and validation slots get a hostAlias
# mapping that hostname to this production service's ClusterIP.
oauthGateway:
  serviceHost: claude-oauth-gateway.tank-operator.svc.cluster.local

# Anthropic API proxy: Envoy + ext_proc sidecar in front of api.anthropic.com.
# Session pods in production and validation slots get a hostAlias mapping
# api.anthropic.com to this production service's ClusterIP and the proxy
# injects the real OAuth Authorization on every request. See
# k8s/templates/api-proxy.yaml for the design rationale.
apiProxy:
  image:
    repository: romainecr.azurecr.io/api-proxy
    # SHA-pinned. The api-proxy build workflow rewrites this line on every
    # push to main via a `[skip ci]` follow-up commit. The 4-space indent
    # is load-bearing â€” the bump-tag sed in .github/workflows/api-proxy-build.yml
    # anchors to it so the orchestrator's 2-space `  tag:` line in this same
    # file isn't accidentally rewritten.
    tag: "api-proxy-a43c007240c6f401994b0dc2aa0c067a559013339c6c26e2ff0c33fa02f63398"
    pullPolicy: IfNotPresent
  envoyImage: envoyproxy/envoy:v1.34-latest
  # Replica count shared by all provider proxy Deployments. HOLD AT 1 until the refresh
  # lease proves itself in production: cross-replica rotation safety rides
  # the api-proxy-refresh-<kv-secret-name> coordination.k8s.io Lease
  # (api-proxy/src/tank_api_proxy/lease.py), and the gate for raising this
  # is tank_api_proxy_refresh_lease_total showing acquired/deferred_to_peer
  # outcomes with no sustained `unavailable`. Raising it also renders
  # minAvailable=1 PDBs for each proxy.
  replicas: 1
  serviceAccount: claude-api-proxy
  serviceHost: claude-api-proxy.tank-operator.svc.cluster.local
  configSecret: claude-api-proxy-config
  # Published to KV by infra/api_proxy.tf â€” separate UAMI from the
  # orchestrator's, scoped to "read+write the credentials KV secret only".
  kvClientIdKey: claude-api-proxy-mi-client-id
claudeSecondaryApiProxy:
  serviceHost: claude-secondary-api-proxy.tank-operator.svc.cluster.local

# Codex API proxy: a second production Envoy + ext_proc deployment using the
# same image and UAMI as apiProxy. It fronts chatgpt.com/backend-api/codex and
# owns the real ChatGPT OAuth refresh chain for Codex sessions in production
# and validation slots.
codexApiProxy:
  serviceHost: codex-api-proxy.tank-operator.svc.cluster.local

# Anthropic credential rotation: lives in the api-proxy's ext_proc sidecar
# (api-proxy/src/tank_api_proxy/server.py). The sidecar caches the access
# token, observes upstream 401s, calls platform.claude.com with the current
# refresh token to rotate, writes the new blob back to KV. ESO mirrors KV â†’
# the proxy's mounted Secret on a 1m interval.
#
# This values block is named `credentialRefresher` for historical reasons â€”
# the original design used a CronJob that's since been retired. The block
# stayed because two consumers still authenticate to KV via the same UAMI:
#   - api-proxy ext_proc sidecar: KV write of rotated blobs.
#   - orchestrator save-credentials: KV write on "+ config sub" harvest.
# The UAMI itself (infra/credential_refresher.tf) keeps the historical name
# for the same TF-state-stability reason; the ExternalSecret below syncs
# its AZURE_CLIENT_ID + AZURE_TENANT_ID into a Secret both consumers
# envFrom-pull, so DefaultAzureCredential mints a federated KV token
# bound to that UAMI.
credentialRefresher:
  configSecret: claude-credentials-refresher-config
  keyVaultUrl: https://romaine-kv.vault.azure.net/
  # Published to KV by infra/credential_refresher.tf (Terraform).
  kvClientIdKey: claude-credentials-refresher-mi-client-id
  kvTenantIdKey: mcp-tenant-id

# Azure Database for PostgreSQL — Flexible Server. Replaces the prior Cosmos
# account as the durable history layer (profiles, session registry, session
# events ledger, conversation read state). Provisioned by infra/postgres.tf;
# same workload-identity auth path as the KV writer above — the orchestrator
# pod's credential_refresher UAMI is the AAD admin on the server and exchanges
# its federated SA token for a Postgres connection password at dial time.
#
# Host pinned to the server FQDN tofu emits; database name matches the
# `azurerm_postgresql_flexible_server_database` resource.
postgres:
  host: tank-operator-db.postgres.database.azure.com
  database: tank-operator
  # AAD-issued Postgres role name; equals the UAMI's display name.
  user: claude-credentials-refresher-identity

avatarAssets:
  # Private Azure Blob container provisioned by infra/avatar_assets.tf.
  # The backend reads/writes it through the same workload identity used
  # for Postgres and Key Vault; browsers still go through authenticated
  # /api/avatars/{id}/image|backing routes.
  blobAccountURL: "https://romainetankavatars.blob.core.windows.net"
  blobContainer: avatar-assets

sessionBus:
  stream: TANK_SESSION_BUS
  # WorkQueue stream owning durable session commands (issue #1076 item 2);
  # events stay on `stream`. Pre-split session pods keep consuming command
  # subjects on `stream` via the backend's dual-publish until they age out.
  commandStream: TANK_SESSION_COMMANDS
  # JetStream Raft tolerates {1, 3, 5} replicas. R=2 needs both replicas
  # to ack to make progress (write quorum = 2 of 2) and has no tiebreaker,
  # so a single slow member halts writes — the 2026-05-25 incident shape
  # (one NATS pod slowed under host CPU pressure → entire TANK_SESSION_BUS
  # lost quorum → every submit_turn failed with `nats: no response from
  # stream`). R=3 requires the infra-bootstrap NATS chart to also run
  # cluster.replicas: 3; both must move together.
  streamReplicas: 3
  # Static password Secret for the orchestrator's NATS auth_users entry.
  # Session pods do not mount this; they authenticate through auth_callout
  # with projected auth.romaine.life service-account tokens.
  authSecret: tank-nats-auth
  tokenKvKey: tank-nats-token
  # Static NATS user for the orchestrator. Must match infra-bootstrap's
  # NATS authorization.users entry.
  user: tank-operator
  monitorURLs:
    - http://tank-nats-0.tank-nats-headless.nats.svc.cluster.local:8222
    - http://tank-nats-1.tank-nats-headless.nats.svc.cluster.local:8222
    - http://tank-nats-2.tank-nats-headless.nats.svc.cluster.local:8222
  # NATS lives in its own namespace, deployed by infra-bootstrap's nats
  # chart. tank-operator chart no longer owns the NATS sub-chart; the
  # ExternalSecret template in k8s/templates/externalsecret-nats.yaml
  # provisions only the orchestrator static-user password Secret.
  url: nats://tank-nats.nats.svc.cluster.local:4222

clusterMaintenance:
  autoUpgradeChannel: patch
  nodeOSUpgradeChannel: NodeImage
  autoUpgradeWindow:
    dayOfWeek: Sunday
    startTime: "06:00"
    utcOffset: "+00:00"
    durationHours: 12

# GitHub App slug used for the install URL the orchestrator redirects users
# to (#57 stage 2). The App's Setup URL must be configured to point at
# https://<hostname>/api/github/install/callback in the GitHub UI for
# the onboarding flow to complete. The user-facing App must stay org-owned
# and public so standard users can install it on their own accounts.
github:
  appSlug: romaine-life-tank-operator

# Tank session owner treated as the host by GitHub MCP attestations. Must match
# the tank-operator/owner-email annotation that session pods carry.
host:
  email: nelson@romaine.life

# Comma-separated emails that receive super-admin behavior in MCP servers.
# Empty means HOST_EMAIL is used.
superAdmins:
  emails: nelson@romaine.life

# Internal-API config. The pre-#486 allowlist (allowedSubjects) was
# retired when /api/internal/sessions/* moved to auth.romaine.life
# service-principal JWT auth; remaining setting is just the public
# hostname used to build session URLs returned by internal endpoints.
internalApi:
  tankUiHost: "https://tank.romaine.life"

# Provider-credential health poller — drives the transcript-surfaced
# "<provider> sign-in expired" banner. The orchestrator polls
# codexProxyHealthURL every 30s, debounces sustained failures, writes
# Layer 1 rows (provider_credential_health), and fans session.status
# banner events into every active codex_gui session whose transcript would
# otherwise show only a cryptic "Error" line. Validation slots route Codex
# through the same production proxy, so they intentionally poll this same
# production health URL. The re-auth URL is the affordance the SPA renders as a
# button on the banner; point at the canonical Codex sign-in flow on
# auth.romaine.life.
providerHealth:
  codexProxyHealthURL: "http://codex-api-proxy.tank-operator.svc.cluster.local:9100/health/codex"
  codexReauthURL: "https://auth.romaine.life"

externalSecret:
  storeName: romaine-kv
  storeKind: ClusterSecretStore
  refreshInterval: 1h
  # Claude Code subscription credentials. Lives ONLY in the production
  # orchestrator namespace; session pods and validation-slot orchestrators
  # cannot read this Secret. KV is the source of truth: production
  # save-credentials writes to KV, ESO mirrors KV → this Secret on a 1m
  # interval, and the production api-proxy pod mounts the Secret as a file.
  # Re-seed via the in-app "+ config sub" flow on production, or out-of-band by
  # uploading a fresh credentials.json to the KV secret named below.
  claudeCredentials:
    secretName: claude-code-credentials
    secretKey: claude-code-credentials
  claudeSecondaryCredentials:
    secretName: claude-secondary-code-credentials
    secretKey: claude-secondary-code-credentials
  # OpenAI Codex subscription credentials. The primary Secret lives in the
  # production orchestrator namespace and is mounted by production
  # codex-api-proxy. Codex CLI/GUI session launchers write a placeholder
  # chatgptAuthTokens auth.json and route chatgpt.com through the production
  # proxy, which injects/rotates the real tokens and writes back to KV.
  codexCredentials:
    secretName: codex-credentials
    # Key inside the K8s Secret. The proxy mounts this as
    # /etc/codex-credentials/auth.json.
    secretKey: auth.json
# Observability templates (ServiceMonitor, PodMonitor, PrometheusRule, Grafana
# dashboards) ship only when the kube-prometheus-stack operator CRDs are
# present. Disabled environments render the chart without these resources so
# `helm template` doesn't fail on a fresh cluster.
#
# docs/observability.md is the contract for everything below.
observability:
  enabled: true
  scrapeInterval: 30s
  # Grafana dashboard ConfigMaps are picked up by the kube-prometheus-stack
  # Grafana sidecar via the `grafana_dashboard: "1"` label selector.
  dashboards:
    enabled: true
    labelKey: grafana_dashboard
    labelValue: "1"
    namespace: monitoring
