name: Build mcp-auth-proxy image

# Standalone publish path for the mcp-auth-proxy sidecar image consumed
# by sibling repos (romaine-life/hermes today). Tank session pods continue
# baking the package inline via claude-container/Dockerfile — that build
# is governed by .github/workflows/claude-container-build.yml and is
# unaffected. This workflow only publishes the standalone image; it does
# NOT rewrite any chart values here (no consumer in this repo).

on:
  push:
    branches: [main]
    paths:
      - 'claude-container/mcp-auth-proxy/**'
      - 'scripts/image-fingerprint.sh'
      - '.github/workflows/mcp-auth-proxy-build.yml'
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref or commit SHA to build. Leave blank to build the dispatch revision."
        required: false
        type: string

concurrency:
  group: mcp-auth-proxy-image-build
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build mcp-auth-proxy image
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve requested ref
        env:
          INPUT_REF: ${{ inputs.git_ref }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin '+refs/heads/*:refs/remotes/origin/*'

          TARGET_REF="${INPUT_REF:-$GITHUB_SHA}"
          FULL_SHA=""
          if FULL_SHA="$(git rev-parse --verify "${TARGET_REF}^{commit}" 2>/dev/null)"; then
            :
          elif git show-ref --verify --quiet "refs/remotes/origin/${TARGET_REF}"; then
            FULL_SHA="$(git rev-parse "refs/remotes/origin/${TARGET_REF}^{commit}")"
          elif git show-ref --verify --quiet "refs/tags/${TARGET_REF}"; then
            FULL_SHA="$(git rev-parse "refs/tags/${TARGET_REF}^{commit}")"
          else
            echo "::error::Unable to resolve git_ref '${TARGET_REF}' to a commit."
            exit 1
          fi
          git checkout --detach "${FULL_SHA}"
          echo "Resolved ${TARGET_REF} -> ${FULL_SHA}"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name romainecr

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image fingerprint
        id: fingerprint
        run: |
          set -euo pipefail
          # Fingerprint covers just the package source + the Dockerfile.
          # Intentionally does NOT include claude-container/Dockerfile or
          # the claude-runner / codex-runner trees — those are baked into
          # the session images, not this one. Changes there must not
          # cause spurious mcp-auth-proxy rebuilds.
          fingerprint="$(scripts/image-fingerprint.sh \
            --image mcp-auth-proxy \
            --dockerfile claude-container/mcp-auth-proxy/Dockerfile \
            --context . \
            --paths 'claude-container/mcp-auth-proxy/Dockerfile claude-container/mcp-auth-proxy/pyproject.toml claude-container/mcp-auth-proxy/src' \
            | awk -F= '$1 == "fingerprint" { print $2 }')"
          echo "ALIAS_TAG=mcp-auth-proxy-${fingerprint}" >> "$GITHUB_ENV"

      - name: Check existing image
        id: image
        run: |
          set -euo pipefail
          if az acr repository show-tags \
              --name romainecr \
              --repository mcp-auth-proxy \
              --query "[?@=='${ALIAS_TAG}'] | [0]" \
              --output tsv | grep -qx "${ALIAS_TAG}"; then
            echo "exists=true" >>"${GITHUB_OUTPUT}"
            echo "Found reusable image romainecr.azurecr.io/mcp-auth-proxy:${ALIAS_TAG}"
          else
            echo "exists=false" >>"${GITHUB_OUTPUT}"
            echo "No reusable image found for mcp-auth-proxy fingerprint"
          fi

      - name: Build and push image
        if: steps.image.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: claude-container/mcp-auth-proxy/Dockerfile
          push: true
          tags: romainecr.azurecr.io/mcp-auth-proxy:${{ env.ALIAS_TAG }}
          cache-from: type=registry,ref=romainecr.azurecr.io/mcp-auth-proxy-build-cache:mcp-auth-proxy
          cache-to: type=registry,ref=romainecr.azurecr.io/mcp-auth-proxy-build-cache:mcp-auth-proxy,mode=max

      - name: Summarize
        run: |
          {
            echo "### mcp-auth-proxy :${ALIAS_TAG}"
            if [[ "${{ steps.image.outputs.exists }}" == "true" ]]; then
              echo "- fingerprint tag already existed; nothing to do"
            else
              echo "- built fresh and pushed"
            fi
            echo
            echo "Consumed by:"
            echo "- romaine-life/hermes (sidecar in the Hermes StatefulSet)"
            echo "- Tank session pods bake the package inline via claude-container/Dockerfile;"
            echo "  this image is **not** a build dependency of session pods."
          } >> $GITHUB_STEP_SUMMARY
