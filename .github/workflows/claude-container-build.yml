name: Build session agent images

on:
  push:
    branches: [main]
    paths:
      - 'claude-container/**'
      - '.github/workflows/claude-container-build.yml'
  workflow_dispatch:

concurrency:
  group: session-agent-images-build
  cancel-in-progress: true

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name romainecr

      - name: Compute tag
        id: tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build + push session images (SHA-pinned, no :latest)
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          docker build -f claude-container/Dockerfile \
            --build-arg TANK_AGENT=claude \
            -t romainecr.azurecr.io/claude-container:$TAG .
          docker build -f claude-container/Dockerfile \
            --build-arg TANK_AGENT=codex \
            -t romainecr.azurecr.io/codex-container:$TAG .
          docker push romainecr.azurecr.io/claude-container:$TAG
          docker push romainecr.azurecr.io/codex-container:$TAG
          {
            echo "### Pushed session images"
            echo "- romainecr.azurecr.io/claude-container:$TAG"
            echo "- romainecr.azurecr.io/codex-container:$TAG"
          } >> $GITHUB_STEP_SUMMARY

      - name: Bump session images in tank-operator chart
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          # session.image / session.codexImage are repo:tag strings; rewrite them.
          sed -i -E "s|^(  image: romainecr.azurecr.io/claude-container:).*$|\1${tag}|" k8s/values.yaml
          sed -i -E "s|^(  codexImage: ).*$|\1romainecr.azurecr.io/codex-container:${tag}|" k8s/values.yaml

          if git diff --quiet k8s/values.yaml; then
            echo "no tag change"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/values.yaml
          git commit -m "chart: bump session agent images to ${tag} [skip ci]"
          # Concurrent builds (e.g. mcp-github-build.yml landing its own bump)
          # can leave us non-fast-forward. Rebase-retry a few times before
          # giving up.
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git pull --rebase origin main
          done
          git push
