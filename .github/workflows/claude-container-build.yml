name: Build session agent images

on:
  push:
    branches: [main]
    paths:
      - 'claude-container/**'
      - 'scripts/image-fingerprint.sh'
      - '.github/workflows/claude-container-build.yml'
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref or commit SHA to build. Leave blank to build the dispatch revision."
        required: false
        type: string

concurrency:
  group: session-agent-images-build
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write

jobs:
  build:
    name: Build ${{ matrix.agent }} image
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - agent: claude
            image: claude-container
          - agent: codex
            image: codex-container
          - agent: pi
            image: pi-container
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve requested ref
        env:
          INPUT_REF: ${{ inputs.git_ref }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin '+refs/heads/*:refs/remotes/origin/*'

          TARGET_REF="${INPUT_REF:-$GITHUB_SHA}"
          FULL_SHA=""
          if FULL_SHA="$(git rev-parse --verify "${TARGET_REF}^{commit}" 2>/dev/null)"; then
            :
          elif git show-ref --verify --quiet "refs/remotes/origin/${TARGET_REF}"; then
            FULL_SHA="$(git rev-parse "refs/remotes/origin/${TARGET_REF}^{commit}")"
          elif git show-ref --verify --quiet "refs/tags/${TARGET_REF}"; then
            FULL_SHA="$(git rev-parse "refs/tags/${TARGET_REF}^{commit}")"
          else
            echo "::error::Unable to resolve git_ref '${TARGET_REF}' to a commit."
            exit 1
          fi
          git checkout --detach "${FULL_SHA}"
          echo "Resolved ${TARGET_REF} -> ${FULL_SHA}"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name romainecr

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image tag
        run: |
          TAG="$(git rev-parse --short=7 HEAD)"
          echo "TAG=${TAG}" >> $GITHUB_ENV

      - name: Compute image fingerprint
        id: fingerprint
        env:
          PROOF_REPOSITORY: ${{ matrix.image }}-build-proof
        run: |
          set -euo pipefail
          # Each TANK_AGENT variant builds a different image even from the
          # same Dockerfile (the `case "${TANK_AGENT}" in ... esac` step
          # branches per agent), so the fingerprint must include the agent
          # name. --image is what the script uses to namespace the alias
          # tag, and we propagate that through to ALIAS_TAG below.
          fingerprint="$(scripts/image-fingerprint.sh \
            --image ${{ matrix.agent }} \
            --dockerfile claude-container/Dockerfile \
            --context . \
            --paths 'claude-container/Dockerfile claude-container/mcp-auth-proxy claude-container/terminald' \
            | awk -F= '$1 == "fingerprint" { print $2 }')"
          echo "ALIAS_TAG=${{ matrix.agent }}-${fingerprint}" >> "$GITHUB_ENV"

      - name: Check existing image aliases
        id: image
        run: |
          set -euo pipefail
          if az acr repository show-tags \
              --name romainecr \
              --repository ${{ matrix.image }} \
              --query "[?@=='${TAG}'] | [0]" \
              --output tsv | grep -qx "${TAG}"; then
            echo "target_exists=true" >>"${GITHUB_OUTPUT}"
          else
            echo "target_exists=false" >>"${GITHUB_OUTPUT}"
          fi

          if az acr repository show-tags \
              --name romainecr \
              --repository ${{ matrix.image }} \
              --query "[?@=='${ALIAS_TAG}'] | [0]" \
              --output tsv | grep -qx "${ALIAS_TAG}"; then
            echo "alias_exists=true" >>"${GITHUB_OUTPUT}"
            echo "Found reusable image romainecr.azurecr.io/${{ matrix.image }}:${ALIAS_TAG}"
          else
            echo "alias_exists=false" >>"${GITHUB_OUTPUT}"
            echo "No reusable image found for ${{ matrix.agent }} fingerprint"
          fi

      - name: Retag existing fingerprint image
        if: steps.image.outputs.target_exists != 'true' && steps.image.outputs.alias_exists == 'true'
        run: |
          set -euo pipefail
          az acr import \
            --name romainecr \
            --source "romainecr.azurecr.io/${{ matrix.image }}:${ALIAS_TAG}" \
            --image "${{ matrix.image }}:${TAG}" \
            --force

      - name: Build and push image
        if: steps.image.outputs.target_exists != 'true' && steps.image.outputs.alias_exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: claude-container/Dockerfile
          push: true
          build-args: |
            TANK_AGENT=${{ matrix.agent }}
          tags: |
            romainecr.azurecr.io/${{ matrix.image }}:${{ env.TAG }}
            romainecr.azurecr.io/${{ matrix.image }}:${{ env.ALIAS_TAG }}
          cache-from: type=registry,ref=romainecr.azurecr.io/${{ matrix.image }}-build-cache:${{ matrix.agent }}
          cache-to: type=registry,ref=romainecr.azurecr.io/${{ matrix.image }}-build-cache:${{ matrix.agent }},mode=max

      - name: Summarize
        run: |
          {
            echo "### ${{ matrix.image }} :${TAG}"
            if [[ "${{ steps.image.outputs.target_exists }}" == "true" ]]; then
              echo "- target tag already existed; nothing to do"
            elif [[ "${{ steps.image.outputs.alias_exists }}" == "true" ]]; then
              echo "- retagged from \`${ALIAS_TAG}\` (cached)"
            else
              echo "- built fresh and pushed (\`${ALIAS_TAG}\` + \`${TAG}\`)"
            fi
          } >> $GITHUB_STEP_SUMMARY

  bump-tag:
    name: Bump session image tags in chart
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump session image tags
        run: |
          set -euo pipefail
          tag="$(git rev-parse --short=7 HEAD)"
          # session.image / session.codexImage / session.piImage are
          # repo:tag strings; rewrite them. The matrix above pushed
          # all three tags at this SHA before this job runs.
          sed -i -E "s|^(  image: romainecr.azurecr.io/claude-container:).*$|\1${tag}|" k8s/values.yaml
          sed -i -E "s|^(  codexImage: ).*$|\1romainecr.azurecr.io/codex-container:${tag}|" k8s/values.yaml
          sed -i -E "s|^(  piImage: ).*$|\1romainecr.azurecr.io/pi-container:${tag}|" k8s/values.yaml

          if git diff --quiet k8s/values.yaml; then
            echo "no tag change"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/values.yaml
          git commit -m "chart: bump session agent images to ${tag} [skip ci]"
          # Concurrent builds can leave us non-fast-forward. Rebase-retry a
          # few times before giving up.
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git pull --rebase origin main
          done
          git push
