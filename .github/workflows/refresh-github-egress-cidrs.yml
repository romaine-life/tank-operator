name: Refresh GitHub egress CIDRs

# The restricted-session egress lockdown (k8s/templates/restricted-git-egress-policy.yaml)
# denies session pods direct egress to GitHub's published IP ranges, forcing
# github.com/api.github.com through the wall. GitHub's ranges drift, and a STALE deny
# list fails OPEN (a newly announced range would be reachable directly, bypassing the
# wall), so this regenerates the list weekly and opens a PR when it changes.
on:
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refresh-github-egress-cidrs
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Regenerate GitHub egress CIDRs
        run: python3 scripts/gen-github-egress-cidrs.py
      - name: Open a PR if the deny list changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          policy=k8s/templates/restricted-git-egress-policy.yaml
          if git diff --quiet -- "$policy"; then
            echo "GitHub egress CIDRs unchanged."
            exit 0
          fi
          branch=chore/refresh-github-egress-cidrs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -C "$branch"
          git add "$policy"
          git commit -m "chore(egress): refresh GitHub egress CIDR lockdown list"
          git push -f -u origin "$branch"
          gh pr create --base main --head "$branch" \
            --title "chore(egress): refresh GitHub egress CIDR lockdown list" \
            --body $'Automated refresh of the GitHub egress deny CIDRs in `k8s/templates/restricted-git-egress-policy.yaml` from api.github.com/meta (`scripts/gen-github-egress-cidrs.py`).\n\nA stale deny list fails OPEN (a newly announced GitHub range would be reachable directly from a restricted session, bypassing the wall), so this keeps the restricted-session egress lockdown current.\n\n## Feature Contracts\n- [x] Agent Runners\n- [x] Observability\n- [ ] None\n\nEvidence: data-only refresh of which CIDRs count as "GitHub" for the restricted-session egress NetworkPolicy. No behavior change — restricted (tank-operator/git-egress=proxy) pods are still confined to the wall for GitHub.' \
            || echo "PR already open for $branch; branch updated in place."
