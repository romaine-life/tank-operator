name: Rename Azure MCP Repository

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/rename-azure-mcp-repo.yml'

permissions:
  id-token: write
  contents: read

jobs:
  rename:
    runs-on: ubuntu-latest
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Rename repository
        run: |
          GITHUB_PAT=$(az keyvault secret show --vault-name romaine-kv --name github-pat --query value -o tsv)
          echo "::add-mask::$GITHUB_PAT"

          status=$(GH_TOKEN="$GITHUB_PAT" gh api repos/nelsong6/mcp-azure-personal --jq .name 2>/dev/null || true)
          if [ "$status" = "mcp-azure-personal" ]; then
            echo "Repository is already named mcp-azure-personal"
            exit 0
          fi

          GH_TOKEN="$GITHUB_PAT" gh api \
            --method PATCH \
            repos/nelsong6/mcp-azure-admin \
            -f name=mcp-azure-personal
