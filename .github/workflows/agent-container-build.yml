name: Build agent-container image

# Image used by the issue-runner agent flow (ambience, others). Distinct
# from claude-container — that one serves tank-operator's interactive
# sessions and stays slim. This image bundles playwright + chromium + Go
# for in-pod evidence capture and dev-server runs.
#
# The chart in tank-operator/k8s/values.yaml does NOT consume this image
# (sessions stay on claude-container). So no values.yaml bump here.

on:
  push:
    branches: [main]
    paths:
      - '.dockerignore'
      - 'agent-container/**'
      - 'scripts/image-fingerprint.sh'
      - '.github/workflows/agent-container-build.yml'
  workflow_dispatch:

concurrency:
  group: agent-container-build
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name romainecr

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image fingerprint
        id: fingerprint
        shell: bash
        run: |
          set -euo pipefail
          scripts/image-fingerprint.sh \
            --image agent-container \
            --dockerfile agent-container/Dockerfile \
            --context . \
            --paths 'agent-container/Dockerfile .dockerignore'

      - name: Check ACR proof image
        id: proof
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.fingerprint.outputs.proof_tag }}"
          if az acr repository show-tags \
              --name romainecr \
              --repository agent-container \
              --query "[?@=='${tag}'] | [0]" \
              --output tsv | grep -qx "${tag}"; then
            echo "hit=true" >>"${GITHUB_OUTPUT}"
            echo "Found reusable proof image: romainecr.azurecr.io/agent-container:${tag}"
          else
            echo "hit=false" >>"${GITHUB_OUTPUT}"
            echo "No proof image found for agent-container fingerprint ${{ steps.fingerprint.outputs.fingerprint }}"
          fi

      - name: Build and push proof image
        if: steps.proof.outputs.hit != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: agent-container/Dockerfile
          push: true
          tags: romainecr.azurecr.io/agent-container:${{ steps.fingerprint.outputs.proof_tag }}
          cache-from: |
            type=registry,ref=romainecr.azurecr.io/agent-container-build-cache:agent-container
            type=gha,scope=agent-container
          cache-to: |
            type=registry,ref=romainecr.azurecr.io/agent-container-build-cache:agent-container,mode=max
            type=gha,mode=max,scope=agent-container
