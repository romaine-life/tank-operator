name: Infrastructure

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/tofu.yml'
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/tofu.yml'
  workflow_dispatch:

concurrency:
  group: opentofu-tank-operator
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_INPUT: "false"
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
  TF_VAR_arm_subscription_id: ${{ vars.ARM_SUBSCRIPTION_ID }}
  TF_VAR_arm_tenant_id: ${{ vars.ARM_TENANT_ID }}
  TF_VAR_cluster_subscription_id: ${{ vars.CLUSTER_ARM_SUBSCRIPTION_ID || '606a1ca1-5833-4d21-8937-d0fcd97cd0a0' }}
  TF_VAR_mcp_azure_extra_reader_subscription_ids: ${{ vars.MCP_AZURE_EXTRA_READER_SUBSCRIPTION_IDS }}

jobs:
  tofu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: '1.9.0'

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Fetch github-pat from Key Vault
        id: secrets
        run: |
          GITHUB_PAT=$(az keyvault secret show --vault-name romaine-kv --name github-pat --query value -o tsv)
          echo "::add-mask::$GITHUB_PAT"
          echo "github_pat=$GITHUB_PAT" >> $GITHUB_OUTPUT

      - name: tofu init
        working-directory: infra
        run: |
          tofu init \
            -backend-config="resource_group_name=infra" \
            -backend-config="storage_account_name=nelsontofu" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=tank-operator.tfstate"

      - name: tofu fmt -check
        working-directory: infra
        run: tofu fmt -check -recursive

      - name: tofu validate
        working-directory: infra
        run: tofu validate

      - name: tofu plan
        working-directory: infra
        env:
          TF_VAR_github_pat: ${{ steps.secrets.outputs.github_pat }}
        run: tofu plan -out=tfplan

      - name: tofu apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: infra
        env:
          TF_VAR_github_pat: ${{ steps.secrets.outputs.github_pat }}
        run: tofu apply -auto-approve tfplan
