name: Infrastructure

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/tofu.yml'
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/tofu.yml'
  workflow_dispatch:

concurrency:
  group: opentofu-tank-operator
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  tofu:
    # Shared template handles checkout, OIDC login, shared-providers
    # overlay from infra-bootstrap, init/plan/apply, and the plan PR
    # comment. We override tofu_version (template default is 1.9.0) so
    # the `removed { lifecycle { destroy = false } }` syntax (added in
    # OpenTofu 1.10) works — that's what lets the `removed` blocks in
    # mcp.tf forget the moved mcp_azure_personal resources without
    # destroying them in Azure on apply.
    uses: romaine-life/pipeline-templates/.github/workflows/tofu-plan-apply-template.yml@main
    with:
      working_directory: infra
      backend_resource_group: infra
      backend_storage_account: nelsontofu
      backend_container: tfstate
      backend_key: tank-operator.tfstate
      tofu_version: '1.12.0'
    secrets: inherit
