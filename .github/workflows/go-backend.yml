name: Go backend

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend-go/**'
      - '.github/workflows/go-backend.yml'
  push:
    branches: [main]
    paths:
      - 'backend-go/**'
      - '.github/workflows/go-backend.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tank
          POSTGRES_PASSWORD: tank
          POSTGRES_DB: tank_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tank -d tank_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend-go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend-go/go.mod

      - name: go test
        env:
          TANK_TEST_POSTGRES_DSN: postgres://tank:tank@localhost:5432/tank_test?sslmode=disable
        run: go test ./...
