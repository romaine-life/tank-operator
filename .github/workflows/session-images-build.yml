name: Build session agent images

on:
  push:
    branches: [main]
    paths:
      - 'claude-container/**'
      - 'session-images/**'
      - 'claude-runner/**'
      - 'codex-runner/**'
      - 'runner-shared/**'
      - 'scripts/check-session-image-common-tools.mjs'
      - 'scripts/image-fingerprint.sh'
      - '.github/workflows/session-images-build.yml'
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref or commit SHA to build. Leave blank to build the dispatch revision."
        required: false
        type: string

concurrency:
  group: session-agent-images-build
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write

jobs:
  build:
    name: Build ${{ matrix.agent }} image
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - agent: claude
            image: claude-container
            dockerfile: claude-container/Dockerfile
            build_args: TANK_AGENT=claude
            fingerprint_paths: 'claude-container/Dockerfile session-images .dockerignore claude-container/mcp-auth-proxy claude-runner codex-runner runner-shared backend-go/go.mod backend-go/go.sum backend-go/internal backend-go/cmd/tank-supervisor'
          - agent: codex
            image: codex-container
            dockerfile: claude-container/Dockerfile
            build_args: TANK_AGENT=codex
            fingerprint_paths: 'claude-container/Dockerfile session-images .dockerignore claude-container/mcp-auth-proxy claude-runner codex-runner runner-shared backend-go/go.mod backend-go/go.sum backend-go/internal backend-go/cmd/tank-supervisor'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve requested ref
        env:
          INPUT_REF: ${{ inputs.git_ref }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin '+refs/heads/*:refs/remotes/origin/*'

          TARGET_REF="${INPUT_REF:-$GITHUB_SHA}"
          FULL_SHA=""
          if FULL_SHA="$(git rev-parse --verify "${TARGET_REF}^{commit}" 2>/dev/null)"; then
            :
          elif git show-ref --verify --quiet "refs/remotes/origin/${TARGET_REF}"; then
            FULL_SHA="$(git rev-parse "refs/remotes/origin/${TARGET_REF}^{commit}")"
          elif git show-ref --verify --quiet "refs/tags/${TARGET_REF}"; then
            FULL_SHA="$(git rev-parse "refs/tags/${TARGET_REF}^{commit}")"
          else
            echo "::error::Unable to resolve git_ref '${TARGET_REF}' to a commit."
            exit 1
          fi
          git checkout --detach "${FULL_SHA}"
          echo "Resolved ${TARGET_REF} -> ${FULL_SHA}"

      - name: Check common session image baseline
        run: node scripts/check-session-image-common-tools.mjs

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name romainecr

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image fingerprint
        id: fingerprint
        env:
          PROOF_REPOSITORY: ${{ matrix.image }}-build-proof
        run: |
          set -euo pipefail
          # Each agent variant builds a different image by branching on
          # TANK_AGENT from the shared Dockerfile, so the fingerprint must
          # include the agent name. --image is what the
          # script uses to namespace the alias tag, and we propagate that
          # through to ALIAS_TAG below.
          fingerprint="$(scripts/image-fingerprint.sh \
            --image ${{ matrix.agent }} \
            --dockerfile ${{ matrix.dockerfile }} \
            --context . \
            --paths '${{ matrix.fingerprint_paths }}' \
            | awk -F= '$1 == "fingerprint" { print $2 }')"
          echo "ALIAS_TAG=${{ matrix.agent }}-${fingerprint}" >> "$GITHUB_ENV"

      - name: Check existing image
        id: image
        run: |
          set -euo pipefail
          if az acr repository show-tags \
              --name romainecr \
              --repository ${{ matrix.image }} \
              --query "[?@=='${ALIAS_TAG}'] | [0]" \
              --output tsv | grep -qx "${ALIAS_TAG}"; then
            echo "exists=true" >>"${GITHUB_OUTPUT}"
            echo "Found reusable image romainecr.azurecr.io/${{ matrix.image }}:${ALIAS_TAG}"
          else
            echo "exists=false" >>"${GITHUB_OUTPUT}"
            echo "No reusable image found for ${{ matrix.agent }} fingerprint"
          fi

      - name: Build and push image
        if: steps.image.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: |
            ${{ matrix.build_args }}
          tags: romainecr.azurecr.io/${{ matrix.image }}:${{ env.ALIAS_TAG }}
          cache-from: type=registry,ref=romainecr.azurecr.io/${{ matrix.image }}-build-cache:${{ matrix.agent }}
          cache-to: type=registry,ref=romainecr.azurecr.io/${{ matrix.image }}-build-cache:${{ matrix.agent }},mode=max

      - name: Record image tag
        run: |
          mkdir -p session-image-tags
          printf '%s\n' "${ALIAS_TAG}" > "session-image-tags/${{ matrix.agent }}.tag"

      - name: Upload image tag
        uses: actions/upload-artifact@v4
        with:
          name: session-image-tag-${{ matrix.agent }}
          path: session-image-tags/${{ matrix.agent }}.tag
          if-no-files-found: error
          retention-days: 1

      - name: Summarize
        run: |
          {
            echo "### ${{ matrix.image }} :${ALIAS_TAG}"
            if [[ "${{ steps.image.outputs.exists }}" == "true" ]]; then
              echo "- fingerprint tag already existed; nothing to do"
            else
              echo "- built fresh and pushed"
            fi
          } >> $GITHUB_STEP_SUMMARY

  bump-tag:
    name: Bump session image tags in chart
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download image tags
        uses: actions/download-artifact@v4
        with:
          pattern: session-image-tag-*
          path: session-image-tags
          merge-multiple: true

      - name: Bump session image tags
        run: |
          set -euo pipefail
          claude_tag="$(cat session-image-tags/claude.tag)"
          codex_tag="$(cat session-image-tags/codex.tag)"
          built_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git_sha="$(git rev-parse HEAD)"
          git_ref="${GITHUB_REF_NAME:-main}"
          repository="${GITHUB_REPOSITORY}"
          commit_url="${GITHUB_SERVER_URL}/${repository}/commit/${git_sha}"
          workflow_run_url="${GITHUB_SERVER_URL}/${repository}/actions/runs/${GITHUB_RUN_ID}"
          subject="$(git log -1 --pretty=%s)"
          pr_number="$(printf '%s\n' "${subject}" | sed -nE 's/.*\(#([0-9]+)\).*/\1/p')"
          if [[ -z "${pr_number}" ]]; then
            pr_number="$(printf '%s\n' "${subject}" | sed -nE 's/.*[Pp]ull request #([0-9]+).*/\1/p')"
          fi
          pr_url=""
          if [[ -n "${pr_number}" ]]; then
            pr_url="${GITHUB_SERVER_URL}/${repository}/pull/${pr_number}"
          fi

          python3 scripts/update-values-yaml.py --file k8s/values.yaml \
            --set session.image="romainecr.azurecr.io/claude-container:${claude_tag}" \
            --set session.codexImage="romainecr.azurecr.io/codex-container:${codex_tag}" \
            --set session.imageMetadata.claude.built_at="${built_at}" \
            --set session.imageMetadata.claude.git_sha="${git_sha}" \
            --set session.imageMetadata.claude.git_ref="${git_ref}" \
            --set session.imageMetadata.claude.commit_url="${commit_url}" \
            --set session.imageMetadata.claude.pr_number="${pr_number}" \
            --set session.imageMetadata.claude.pr_url="${pr_url}" \
            --set session.imageMetadata.claude.workflow_run_url="${workflow_run_url}" \
            --set session.imageMetadata.claude.repository="${repository}" \
            --set session.imageMetadata.claude.actor="${GITHUB_ACTOR}" \
            --set session.imageMetadata.codex.built_at="${built_at}" \
            --set session.imageMetadata.codex.git_sha="${git_sha}" \
            --set session.imageMetadata.codex.git_ref="${git_ref}" \
            --set session.imageMetadata.codex.commit_url="${commit_url}" \
            --set session.imageMetadata.codex.pr_number="${pr_number}" \
            --set session.imageMetadata.codex.pr_url="${pr_url}" \
            --set session.imageMetadata.codex.workflow_run_url="${workflow_run_url}" \
            --set session.imageMetadata.codex.repository="${repository}" \
            --set session.imageMetadata.codex.actor="${GITHUB_ACTOR}"

          if git diff --quiet k8s/values.yaml; then
            echo "no session image tag or metadata change"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/values.yaml
          git commit -m "chart: bump session agent images to fingerprint tags [skip ci]"
          # Concurrent builds can leave us non-fast-forward. Rebase-retry a
          # few times before giving up.
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git pull --rebase origin main
          done
          git push
