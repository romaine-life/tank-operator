name: build

on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/**'
      - 'k8s-sessions/**'
      - 'claude-container/**'
      - 'api-proxy/**'
      - 'infra/**'
      - 'README.md'
      - '.github/workflows/tofu.yml'
      - '.github/workflows/claude-container-build.yml'
      - '.github/workflows/api-proxy-build.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    env:
      REGISTRY: romainecr.azurecr.io
      IMAGE: tank-operator
    steps:
      - uses: actions/checkout@v4
        with:
          # Default token is fine for the bump-and-push step below.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name romainecr

      - uses: docker/setup-buildx-action@v3

      - name: Compute image fingerprint
        id: fingerprint
        shell: bash
        run: |
          set -euo pipefail
          scripts/image-fingerprint.sh \
            --image app \
            --dockerfile Dockerfile \
            --context . \
            --paths 'Dockerfile .dockerignore frontend backend-go'

      - name: Check ACR proof image
        id: proof
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.fingerprint.outputs.proof_tag }}"
          if az acr repository show-tags \
              --name romainecr \
              --repository "${IMAGE}" \
              --query "[?@=='${tag}'] | [0]" \
              --output tsv | grep -qx "${tag}"; then
            echo "hit=true" >>"${GITHUB_OUTPUT}"
            echo "Found reusable proof image: ${REGISTRY}/${IMAGE}:${tag}"
          else
            echo "hit=false" >>"${GITHUB_OUTPUT}"
            echo "No proof image found for app fingerprint ${{ steps.fingerprint.outputs.fingerprint }}"
          fi

      - name: Build and push proof image
        if: steps.proof.outputs.hit != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.fingerprint.outputs.proof_tag }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE }}-build-cache:app
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE }}-build-cache:app,mode=max

      - name: Bump chart image tag
        if: github.ref == 'refs/heads/main'
        run: |
          tag="${{ steps.fingerprint.outputs.proof_tag }}"
          built_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git_sha="$(git rev-parse HEAD)"
          git_ref="${GITHUB_REF_NAME:-main}"
          repository="${GITHUB_REPOSITORY}"
          commit_url="${GITHUB_SERVER_URL}/${repository}/commit/${git_sha}"
          workflow_run_url="${GITHUB_SERVER_URL}/${repository}/actions/runs/${GITHUB_RUN_ID}"
          subject="$(git log -1 --pretty=%s)"
          pr_number="$(printf '%s\n' "${subject}" | sed -nE 's/.*\(#([0-9]+)\).*/\1/p')"
          if [[ -z "${pr_number}" ]]; then
            pr_number="$(printf '%s\n' "${subject}" | sed -nE 's/.*[Pp]ull request #([0-9]+).*/\1/p')"
          fi
          pr_url=""
          if [[ -n "${pr_number}" ]]; then
            pr_url="${GITHUB_SERVER_URL}/${repository}/pull/${pr_number}"
          fi

          python3 scripts/update-values-yaml.py --file k8s/values.yaml \
            --set image.tag="${tag}" \
            --set image.metadata.built_at="${built_at}" \
            --set image.metadata.git_sha="${git_sha}" \
            --set image.metadata.git_ref="${git_ref}" \
            --set image.metadata.commit_url="${commit_url}" \
            --set image.metadata.pr_number="${pr_number}" \
            --set image.metadata.pr_url="${pr_url}" \
            --set image.metadata.workflow_run_url="${workflow_run_url}" \
            --set image.metadata.repository="${repository}" \
            --set image.metadata.actor="${GITHUB_ACTOR}"

          if git diff --quiet k8s/values.yaml; then
            echo "no app image tag or metadata change"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/values.yaml
          git commit -m "chart: bump image tag to fingerprint ${tag} [skip ci]"
          # Concurrent builds can leave us non-fast-forward. Rebase-retry.
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git pull --rebase origin main
          done
          git push
