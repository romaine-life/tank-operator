name: build

on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/**'
      - 'k8s-sessions/**'
      - 'claude-container/**'
      - 'api-proxy/**'
      - 'infra/**'
      - 'README.md'
      - '.github/workflows/tofu.yml'
      - '.github/workflows/claude-container-build.yml'
      - '.github/workflows/api-proxy-build.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    env:
      REGISTRY: romainecr.azurecr.io
      IMAGE: tank-operator
    steps:
      - uses: actions/checkout@v4
        with:
          # Default token is fine for the bump-and-push step below.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name romainecr

      - uses: docker/setup-buildx-action@v3

      - name: Compute image fingerprint
        id: fingerprint
        shell: bash
        run: |
          set -euo pipefail
          scripts/image-fingerprint.sh \
            --image app \
            --dockerfile Dockerfile \
            --context . \
            --paths 'Dockerfile .dockerignore frontend backend-go'

      - name: Check ACR proof image
        id: proof
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.fingerprint.outputs.proof_tag }}"
          if az acr repository show-tags \
              --name romainecr \
              --repository "${IMAGE}" \
              --query "[?@=='${tag}'] | [0]" \
              --output tsv | grep -qx "${tag}"; then
            echo "hit=true" >>"${GITHUB_OUTPUT}"
            echo "Found reusable proof image: ${REGISTRY}/${IMAGE}:${tag}"
          else
            echo "hit=false" >>"${GITHUB_OUTPUT}"
            echo "No proof image found for app fingerprint ${{ steps.fingerprint.outputs.fingerprint }}"
          fi

      - name: Build and push proof image
        if: steps.proof.outputs.hit != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.fingerprint.outputs.proof_tag }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE }}-build-cache:app
            type=gha,scope=app
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE }}-build-cache:app,mode=max
            type=gha,mode=max,scope=app

      - name: Bump chart image tag
        if: github.ref == 'refs/heads/main'
        run: |
          tag="${{ steps.fingerprint.outputs.proof_tag }}"
          # Targeted sed: only the line beginning with two spaces + `tag:` under image.
          # Quote the value so YAML never reinterprets image tags. Sufficient
          # for our single-image values.yaml — revisit if the chart grows.
          sed -i -E "s|^(  tag: ).*$|\1\"${tag}\"|" k8s/values.yaml

          if git diff --quiet k8s/values.yaml; then
            echo "no tag change"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/values.yaml
          git commit -m "chart: bump image tag to fingerprint ${tag} [skip ci]"
          # Concurrent builds can leave us non-fast-forward. Rebase-retry.
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git pull --rebase origin main
          done
          git push
