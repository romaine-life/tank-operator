name: build

on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/**'
      - 'k8s-sessions/**'
      - 'claude-container/**'
      - 'api-proxy/**'
      - 'infra/**'
      - 'README.md'
      - '.github/workflows/tofu.yml'
      - '.github/workflows/claude-container-build.yml'
      - '.github/workflows/api-proxy-build.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    env:
      REGISTRY: romainecr.azurecr.io
      IMAGE: tank-operator
    steps:
      - uses: actions/checkout@v4
        with:
          # Default token is fine for the bump-and-push step below.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name romainecr

      - name: Compute tag
        id: tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Bump chart image tag
        if: github.ref == 'refs/heads/main'
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          # Targeted sed: only the line beginning with two spaces + `tag:` under image.
          # Quote the value so all-digit short-SHAs (e.g. 6432731) aren't parsed as
          # numbers by YAML and emitted as scientific notation. Sufficient for our
          # single-image values.yaml — revisit if the chart grows.
          sed -i -E "s|^(  tag: ).*$|\1\"${tag}\"|" k8s/values.yaml

          if git diff --quiet k8s/values.yaml; then
            echo "no tag change"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/values.yaml
          git commit -m "chart: bump image tag to ${tag} [skip ci]"
          # Concurrent builds can leave us non-fast-forward. Rebase-retry.
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git pull --rebase origin main
          done
          git push
