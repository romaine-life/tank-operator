name: Docker Build Check

on:
  pull_request:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref or commit SHA to build. Leave blank to build the dispatch revision."
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: docker-build-check-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}-${{ inputs.git_ref || '' }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.name }} image
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: app
            file: Dockerfile
            context: .
            build_args: ""
            cache-ref: romainecr.azurecr.io/tank-operator-build-cache:app
            image-repo: tank-operator
            fingerprint-image: app
            fingerprint-paths: Dockerfile .dockerignore frontend backend-go
          - name: agent-container
            file: agent-container/Dockerfile
            context: .
            build_args: ""
            cache-ref: romainecr.azurecr.io/agent-container-build-cache:agent-container
            image-repo: agent-container
            fingerprint-image: agent-container
            fingerprint-paths: agent-container/Dockerfile .dockerignore
          - name: api-proxy
            file: api-proxy/Dockerfile
            context: api-proxy
            build_args: ""
            cache-ref: romainecr.azurecr.io/api-proxy-build-cache:api-proxy
            image-repo: api-proxy
            fingerprint-image: api-proxy
            fingerprint-paths: api-proxy/Dockerfile api-proxy/pyproject.toml api-proxy/src
          - name: session-agent-claude
            file: claude-container/Dockerfile
            context: .
            build_args: TANK_AGENT=claude
            cache-ref: romainecr.azurecr.io/claude-container-build-cache:claude
            image-repo: claude-container
            fingerprint-image: claude
            fingerprint-paths: claude-container/Dockerfile .dockerignore claude-container/mcp-auth-proxy agent-runner codex-runner runner-shared
          - name: session-agent-codex
            file: claude-container/Dockerfile
            context: .
            build_args: TANK_AGENT=codex
            cache-ref: romainecr.azurecr.io/codex-container-build-cache:codex
            image-repo: codex-container
            fingerprint-image: codex
            fingerprint-paths: claude-container/Dockerfile .dockerignore claude-container/mcp-auth-proxy agent-runner codex-runner runner-shared
          # Antigravity session image — glibc (Debian) base baking the pinned
          # `agy` native binary + sandbox-agent terminal. Separate Dockerfile
          # because agy can't run on the Alpine/musl image the others share.
          - name: session-agent-antigravity
            file: antigravity-container/Dockerfile
            context: .
            build_args: ""
            cache-ref: romainecr.azurecr.io/antigravity-container-build-cache:antigravity
            image-repo: antigravity-container
            fingerprint-image: antigravity
            fingerprint-paths: antigravity-container/Dockerfile .dockerignore antigravity-runner runner-shared claude-container/mcp-auth-proxy
          # Standalone mcp-auth-proxy image for sibling consumers
          # (nelsong6/hermes today). Built from the same package source
          # Tank session pods bake inline, but published as its own
          # image so non-Tank pods can sidecar it without pulling a
          # full session container. See
          # .github/workflows/mcp-auth-proxy-build.yml for the
          # push-to-main publish path.
          - name: mcp-auth-proxy
            file: claude-container/mcp-auth-proxy/Dockerfile
            context: .
            build_args: ""
            cache-ref: romainecr.azurecr.io/mcp-auth-proxy-build-cache:mcp-auth-proxy
            image-repo: mcp-auth-proxy
            fingerprint-image: mcp-auth-proxy
            fingerprint-paths: claude-container/mcp-auth-proxy/Dockerfile claude-container/mcp-auth-proxy/pyproject.toml claude-container/mcp-auth-proxy/src
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve requested ref
        if: github.event_name == 'workflow_dispatch' && inputs.git_ref != ''
        env:
          INPUT_REF: ${{ inputs.git_ref }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin '+refs/heads/*:refs/remotes/origin/*'
          if full_sha="$(git rev-parse --verify "${INPUT_REF}^{commit}" 2>/dev/null)"; then
            :
          elif git show-ref --verify --quiet "refs/remotes/origin/${INPUT_REF}"; then
            full_sha="$(git rev-parse "refs/remotes/origin/${INPUT_REF}^{commit}")"
          elif git show-ref --verify --quiet "refs/tags/${INPUT_REF}"; then
            full_sha="$(git rev-parse "refs/tags/${INPUT_REF}^{commit}")"
          else
            echo "::error::Unable to resolve git_ref '${INPUT_REF}' to a commit."
            exit 1
          fi
          git checkout --detach "$full_sha"
          echo "Resolved ${INPUT_REF} -> ${full_sha}"

      - name: Check Glimmung native contract
        if: matrix.name == 'app'
        run: bash scripts/test-glimmung-native-contract.sh

      - name: Check test-slot provider credential isolation
        if: matrix.name == 'app'
        run: bash scripts/check-test-slot-provider-credentials.sh tank-operator-slot-2

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure login
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: ACR login
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: az acr login --name romainecr

      - name: Compute image fingerprint
        id: fingerprint
        shell: bash
        run: |
          set -euo pipefail
          scripts/image-fingerprint.sh \
            --image '${{ matrix.fingerprint-image }}' \
            --dockerfile '${{ matrix.file }}' \
            --context '${{ matrix.context }}' \
            --paths '${{ matrix.fingerprint-paths }}'

      - name: Check ACR proof image
        id: proof
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.fingerprint.outputs.proof_tag }}"
          if az acr repository show-tags \
              --name romainecr \
              --repository "${{ matrix.image-repo }}" \
              --query "[?@=='${tag}'] | [0]" \
              --output tsv | grep -qx "${tag}"; then
            echo "hit=true" >>"${GITHUB_OUTPUT}"
            echo "Found reusable proof image: romainecr.azurecr.io/${{ matrix.image-repo }}:${tag}"
          else
            echo "hit=false" >>"${GITHUB_OUTPUT}"
            echo "No proof image found for ${{ matrix.name }} fingerprint ${{ steps.fingerprint.outputs.fingerprint }}"
          fi

      - name: Build and push proof image
        if: (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && steps.proof.outputs.hit != 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: romainecr.azurecr.io/${{ matrix.image-repo }}:${{ steps.fingerprint.outputs.proof_tag }}
          build-args: ${{ matrix.build_args }}
          cache-from: |
            type=registry,ref=${{ matrix.cache-ref }}
            type=gha,scope=${{ matrix.name }}
          cache-to: |
            type=registry,ref=${{ matrix.cache-ref }},mode=max
            type=gha,mode=max,scope=${{ matrix.name }}

      - name: Build image without pushing
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          load: false
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
