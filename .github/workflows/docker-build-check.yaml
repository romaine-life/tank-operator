name: Docker Build Check

on:
  pull_request:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref or commit SHA to build. Leave blank to build the dispatch revision."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: docker-build-check-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}-${{ inputs.git_ref || '' }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.name }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: app
            file: Dockerfile
            context: .
            build_args: ""
          - name: agent-container
            file: agent-container/Dockerfile
            context: .
            build_args: ""
          - name: api-proxy
            file: Dockerfile
            context: api-proxy
            build_args: ""
          - name: session-agent-claude
            file: claude-container/Dockerfile
            context: .
            build_args: TANK_AGENT=claude
          - name: session-agent-codex
            file: claude-container/Dockerfile
            context: .
            build_args: TANK_AGENT=codex
          - name: session-agent-pi
            file: claude-container/Dockerfile
            context: .
            build_args: TANK_AGENT=pi
          - name: mcp-argocd
            file: Dockerfile
            context: mcp-servers/argocd
            build_args: ""
          - name: mcp-azure-admin
            file: Dockerfile
            context: mcp-servers/azure-admin
            build_args: ""
          - name: mcp-github
            file: Dockerfile
            context: mcp-servers/github
            build_args: ""
          - name: mcp-k8s
            file: Dockerfile
            context: mcp-servers/k8s
            build_args: ""
          - name: issue-agent-runner
            file: runner/Dockerfile
            context: .
            build_args: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve requested ref
        if: github.event_name == 'workflow_dispatch' && inputs.git_ref != ''
        env:
          INPUT_REF: ${{ inputs.git_ref }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin '+refs/heads/*:refs/remotes/origin/*'
          if full_sha="$(git rev-parse --verify "${INPUT_REF}^{commit}" 2>/dev/null)"; then
            :
          elif git show-ref --verify --quiet "refs/remotes/origin/${INPUT_REF}"; then
            full_sha="$(git rev-parse "refs/remotes/origin/${INPUT_REF}^{commit}")"
          elif git show-ref --verify --quiet "refs/tags/${INPUT_REF}"; then
            full_sha="$(git rev-parse "refs/tags/${INPUT_REF}^{commit}")"
          else
            echo "::error::Unable to resolve git_ref '${INPUT_REF}' to a commit."
            exit 1
          fi
          git checkout --detach "$full_sha"
          echo "Resolved ${INPUT_REF} -> ${full_sha}"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image without pushing
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          load: false
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
