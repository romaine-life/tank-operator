name: Removed Chat Runtime Guard

on:
  pull_request:
    branches: [main]
    paths:
      - 'agent-container/**'
      - 'claude-runner/**'
      - 'api-proxy/**'
      - 'backend-go/**'
      - 'codex-runner/**'
      - 'desktop/**'
      - 'docs/**'
      - 'frontend/**'
      - 'infra/**'
      - 'k8s/**'
      - 'runner-shared/**'
      - 'schemas/**'
      - 'scripts/**'
      - 'CLAUDE.md'
      - 'README.md'
      - '.github/workflows/removed-chat-runtime-guard.yml'
  push:
    branches: [main]
    paths:
      - 'agent-container/**'
      - 'claude-runner/**'
      - 'api-proxy/**'
      - 'backend-go/**'
      - 'codex-runner/**'
      - 'desktop/**'
      - 'docs/**'
      - 'frontend/**'
      - 'infra/**'
      - 'k8s/**'
      - 'runner-shared/**'
      - 'schemas/**'
      - 'scripts/**'
      - 'CLAUDE.md'
      - 'README.md'
      - '.github/workflows/removed-chat-runtime-guard.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Check removed runtime surfaces
        run: node scripts/check-removed-chat-runtime.mjs

      - name: Check context-window-table migration
        run: node scripts/check-context-window-table-migration.mjs
      # The retired in-turn AskUserQuestion model (the reply command, the
      # tool-approval events, the permission-callback answer injection, the
      # needs-input announcement row) is a removed chat-runtime surface: the
      # answer is now a brand-new turn (turn.awaiting_input terminal +
      # POST /turns/{id}/answer), and Claude uses Tank's SDK MCP question tool.
      # This guard fails if any of it returns.
      - name: Check AskUserQuestion in-turn surfaces stay removed
        run: node scripts/check-askuserquestion-migration.mjs

      - name: Check Claude agent authority surface
        run: node scripts/check-claude-agent-authority.mjs

      - name: Check Tank HTTP routes redirect to HTTPS
        run: |
          node scripts/check-tank-http-route-security.mjs --self-test
          node scripts/check-tank-http-route-security.mjs

      # The session ServiceAccount must stay read-only on the cluster. Binding
      # it to cluster-admin is the kubectl-cp/exec bypass of the CI-gated
      # hot-swap path; this guard renders the chart and fails if the session SA
      # is bound to cluster-admin instead of tank-session-readonly.
      - name: Check session SA stays read-only (no cluster-admin bypass)
        run: node scripts/check-session-readonly-rbac.mjs

      # Control-action ledger writes must authorize off the verified per-session
      # subject, never a caller-asserted header. Re-adding the header factor froze
      # the ledger system-wide on 2026-06-16 (#1207); this guard blocks the regression.
      - name: Check control-action authorization stays subject-based
        run: node scripts/check-control-action-authz.mjs
