name: Removed Chat Runtime Guard

on:
  pull_request:
    branches: [main]
    paths:
      - 'agent-container/**'
      - 'agent-runner/**'
      - 'api-proxy/**'
      - 'backend-go/**'
      - 'codex-runner/**'
      - 'desktop/**'
      - 'docs/**'
      - 'frontend/**'
      - 'infra/**'
      - 'k8s/**'
      - 'runner-shared/**'
      - 'schemas/**'
      - 'scripts/**'
      - 'CLAUDE.md'
      - 'README.md'
      - '.github/workflows/removed-chat-runtime-guard.yml'
  push:
    branches: [main]
    paths:
      - 'agent-container/**'
      - 'agent-runner/**'
      - 'api-proxy/**'
      - 'backend-go/**'
      - 'codex-runner/**'
      - 'desktop/**'
      - 'docs/**'
      - 'frontend/**'
      - 'infra/**'
      - 'k8s/**'
      - 'runner-shared/**'
      - 'schemas/**'
      - 'scripts/**'
      - 'CLAUDE.md'
      - 'README.md'
      - '.github/workflows/removed-chat-runtime-guard.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check removed runtime surfaces
        run: node scripts/check-removed-chat-runtime.mjs

      - name: Check context-window-table migration
        run: node scripts/check-context-window-table-migration.mjs
      # The retired in-turn AskUserQuestion model (the reply command, the
      # tool-approval events, the canUseTool answer injection, the needs-input
      # announcement row) is a removed chat-runtime surface: the answer is now
      # a brand-new turn (turn.awaiting_input terminal + POST /turns/{id}/answer).
      # This guard fails if any of it returns.
      - name: Check AskUserQuestion in-turn surfaces stay removed
        run: node scripts/check-askuserquestion-migration.mjs
