<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <title>Barbasol can</title>
  <!-- Frost puffs -->
  <circle cx="13" cy="50" r="3" fill="#cfe8f4" opacity="0.8"/>
  <circle cx="10" cy="54" r="2" fill="#cfe8f4" opacity="0.7"/>
  <circle cx="52" cy="18" r="2.5" fill="#cfe8f4" opacity="0.7"/>
  <circle cx="55" cy="22" r="1.5" fill="#cfe8f4" opacity="0.6"/>
  <!-- Cap -->
  <ellipse cx="32" cy="8" rx="11" ry="2.4" fill="#dde0e4"/>
  <rect x="21" y="8" width="22" height="6" fill="#bcbfc2"/>
  <ellipse cx="32" cy="14" rx="11" ry="1.8" fill="#7d8084"/>
  <!-- Body -->
  <rect x="19" y="14" width="26" height="42" rx="1.5" fill="#f5f1e8" stroke="#3d3a32" stroke-width="0.8"/>
  <ellipse cx="32" cy="56" rx="13" ry="2.4" fill="#3d3a32"/>
  <!-- Top red band -->
  <rect x="19" y="14" width="26" height="5" fill="#cf2127"/>
  <!-- Bottom red band -->
  <rect x="19" y="50" width="26" height="6" fill="#cf2127"/>
  <!-- Central red panel -->
  <rect x="19" y="27" width="26" height="12" fill="#cf2127"/>
  <!-- Faux "BARBASOL" lettering -->
  <rect x="22" y="30" width="20" height="2" fill="#f5f1e8"/>
  <rect x="22" y="34" width="14" height="2" fill="#f5f1e8"/>
  <!-- Subtle stripe accents -->
  <rect x="19" y="42" width="26" height="1.5" fill="#cf2127" opacity="0.55"/>
  <rect x="19" y="45" width="26" height="1.5" fill="#cf2127" opacity="0.35"/>
  <!-- Highlight -->
  <rect x="21" y="15" width="2" height="40" fill="#ffffff" opacity="0.45"/>
</svg>
