<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <title>Park gate</title>
  <!-- Ground shadow -->
  <ellipse cx="32" cy="60" rx="26" ry="1.6" fill="#000" opacity="0.25"/>
  <!-- Left torch post -->
  <rect x="4" y="14" width="4" height="44" fill="#3d2a14" stroke="#1d1408" stroke-width="0.5"/>
  <rect x="3" y="14" width="6" height="3" fill="#5a3415"/>
  <!-- Left flame -->
  <path d="M6 14 Q3 9, 6 4 Q9 9, 6 14 Z" fill="#ffb43c"/>
  <path d="M6 12 Q4 8, 6 5 Q8 8, 6 12 Z" fill="#ff5a1f"/>
  <path d="M6 10 Q5 8, 6 6 Q7 8, 6 10 Z" fill="#fff1c4"/>
  <!-- Right torch post -->
  <rect x="56" y="14" width="4" height="44" fill="#3d2a14" stroke="#1d1408" stroke-width="0.5"/>
  <rect x="55" y="14" width="6" height="3" fill="#5a3415"/>
  <!-- Right flame -->
  <path d="M58 14 Q55 9, 58 4 Q61 9, 58 14 Z" fill="#ffb43c"/>
  <path d="M58 12 Q56 8, 58 5 Q60 8, 58 12 Z" fill="#ff5a1f"/>
  <path d="M58 10 Q57 8, 58 6 Q59 8, 58 10 Z" fill="#fff1c4"/>
  <!-- Left gate door -->
  <rect x="10" y="20" width="22" height="38" fill="#a86c34" stroke="#5a3415" stroke-width="0.8"/>
  <line x1="14" y1="22" x2="14" y2="56" stroke="#5a3415" stroke-width="0.5" opacity="0.6"/>
  <line x1="20" y1="22" x2="20" y2="56" stroke="#5a3415" stroke-width="0.5" opacity="0.6"/>
  <line x1="26" y1="22" x2="26" y2="56" stroke="#5a3415" stroke-width="0.5" opacity="0.6"/>
  <!-- Right gate door -->
  <rect x="32" y="20" width="22" height="38" fill="#945a28" stroke="#5a3415" stroke-width="0.8"/>
  <line x1="38" y1="22" x2="38" y2="56" stroke="#5a3415" stroke-width="0.5" opacity="0.6"/>
  <line x1="44" y1="22" x2="44" y2="56" stroke="#5a3415" stroke-width="0.5" opacity="0.6"/>
  <line x1="50" y1="22" x2="50" y2="56" stroke="#5a3415" stroke-width="0.5" opacity="0.6"/>
  <!-- Horizontal cross-beams -->
  <rect x="10" y="24" width="44" height="2.5" fill="#5a3415"/>
  <rect x="10" y="50" width="44" height="2.5" fill="#5a3415"/>
  <!-- Center JP shield -->
  <circle cx="32" cy="38" r="9" fill="#e8b432" stroke="#5a3415" stroke-width="1.2"/>
  <circle cx="32" cy="38" r="9" fill="none" stroke="#cf2127" stroke-width="1.4" opacity="0.85"/>
  <!-- Stylized T-Rex skull silhouette in shield -->
  <path d="M26 40 L26 36 L28 33 L31 32 L34 32 L36 34 L38 34 L38 37 L37 38 L37 40 L34 41 L33 43 L29 43 Z"
        fill="#1d1408"/>
  <circle cx="36" cy="36" r="0.7" fill="#e8b432"/>
</svg>
