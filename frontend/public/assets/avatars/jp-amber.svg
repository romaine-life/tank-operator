<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <title>Amber with mosquito</title>
  <!-- Amber drop -->
  <path d="M32 4 C16 7, 8 22, 11 40 C13 54, 22 60, 32 60 C42 60, 51 54, 53 40 C56 22, 48 7, 32 4 Z"
        fill="#d99632" stroke="#7a4f12" stroke-width="1.4"/>
  <!-- Inner glow -->
  <path d="M32 8 C22 11, 16 22, 17 36 C18 47, 24 54, 32 55 C40 54, 46 47, 47 36 C48 22, 42 11, 32 8 Z"
        fill="#e9b25e" opacity="0.55"/>
  <!-- Highlights -->
  <path d="M20 12 C16 18, 15 28, 19 34 C17 24, 22 16, 27 12 Z" fill="#fbe2a8" opacity="0.75"/>
  <ellipse cx="42" cy="14" rx="3" ry="2" fill="#fff1c4" opacity="0.85"/>
  <!-- Mosquito wings -->
  <ellipse cx="36" cy="27" rx="6" ry="2.2" fill="#1a1208" opacity="0.4" transform="rotate(-15 36 27)"/>
  <ellipse cx="38" cy="33" rx="5" ry="1.8" fill="#1a1208" opacity="0.4" transform="rotate(12 38 33)"/>
  <!-- Mosquito body -->
  <ellipse cx="34" cy="32" rx="4.5" ry="2" fill="#1a1208"/>
  <circle cx="29" cy="31" r="1.8" fill="#1a1208"/>
  <!-- Proboscis -->
  <line x1="29" y1="31" x2="24" y2="30.5" stroke="#1a1208" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Legs -->
  <g stroke="#1a1208" stroke-width="0.8" stroke-linecap="round" fill="none">
    <path d="M31 33 L27 40"/>
    <path d="M33 33 L31 41"/>
    <path d="M35 33 L36 41"/>
    <path d="M36 31 L42 35"/>
    <path d="M37 30 L43 28"/>
    <path d="M30 30 L26 26"/>
  </g>
</svg>
