# Default native Glimmung workflow for tank-operator.
---
trigger_label: null
budget:
  total: 25.0
default_requirements: {}
phases:
- name: prepare
  kind: k8s_job
  outputs:
  - validation_url
  jobs:
  - id: prepare
    name: Prepare live validation target
    image: romainecr.azurecr.io/claude-container:latest
    command:
    - /bin/bash
    - -lc
    - |
      set -Eeuo pipefail
      token="$(curl -fsS -X POST -H "X-Glimmung-Attempt-Token: ${GLIMMUNG_ATTEMPT_TOKEN}" "${GLIMMUNG_GITHUB_TOKEN_URL}" | jq -r .token)"
      auth="$(printf 'x-access-token:%s' "$token" | base64 | tr -d '\n')"
      git init /workspace/tank-operator >/dev/null
      git -C /workspace/tank-operator remote add origin https://github.com/nelsong6/tank-operator.git 2>/dev/null || true
      git -C /workspace/tank-operator -c "http.extraHeader=Authorization: Basic ${auth}" fetch --force origin main
      git -C /workspace/tank-operator checkout --detach origin/main
      exec /bin/bash /workspace/tank-operator/scripts/glimmung-native/prepare.sh
    timeout_seconds: 300
    steps:
    - slug: check-styleguide
      title: Check live styleguide
    - slug: emit-env-outputs
      title: Emit phase outputs
- name: implement
  kind: k8s_job
  depends_on:
  - prepare
  inputs:
    validation_url: ${{ phases.prepare.outputs.validation_url }}
  outputs:
  - branch_name
  - implementation
  jobs:
  - id: implement
    name: Implement change
    image: romainecr.azurecr.io/claude-container:latest
    command:
    - /bin/bash
    - -lc
    - |
      set -Eeuo pipefail
      token="$(curl -fsS -X POST -H "X-Glimmung-Attempt-Token: ${GLIMMUNG_ATTEMPT_TOKEN}" "${GLIMMUNG_GITHUB_TOKEN_URL}" | jq -r .token)"
      auth="$(printf 'x-access-token:%s' "$token" | base64 | tr -d '\n')"
      git init /workspace/tank-operator >/dev/null
      git -C /workspace/tank-operator remote add origin https://github.com/nelsong6/tank-operator.git 2>/dev/null || true
      git -C /workspace/tank-operator -c "http.extraHeader=Authorization: Basic ${auth}" fetch --force origin main
      git -C /workspace/tank-operator checkout --detach origin/main
      exec /bin/bash /workspace/tank-operator/scripts/glimmung-native/implement.sh
    env:
      CLAUDE_CONTAINER_TAG: latest
    timeout_seconds: 2400
    steps:
    - slug: prepare
      title: Prepare native runner context
    - slug: run-agent
      title: Run Tank agent job
    - slug: emit
      title: Emit implementation outputs
- name: verify
  kind: k8s_job
  depends_on:
  - implement
  inputs:
    validation_url: ${{ phases.prepare.outputs.validation_url }}
    branch_name: ${{ phases.implement.outputs.branch_name }}
    implementation: ${{ phases.implement.outputs.implementation }}
  outputs:
  - verification
  verify: true
  jobs:
  - id: verify
    name: Verify live app floor
    image: romainecr.azurecr.io/claude-container:latest
    command:
    - /bin/bash
    - -lc
    - |
      set -Eeuo pipefail
      token="$(curl -fsS -X POST -H "X-Glimmung-Attempt-Token: ${GLIMMUNG_ATTEMPT_TOKEN}" "${GLIMMUNG_GITHUB_TOKEN_URL}" | jq -r .token)"
      auth="$(printf 'x-access-token:%s' "$token" | base64 | tr -d '\n')"
      git init /workspace/tank-operator >/dev/null
      git -C /workspace/tank-operator remote add origin https://github.com/nelsong6/tank-operator.git 2>/dev/null || true
      git -C /workspace/tank-operator -c "http.extraHeader=Authorization: Basic ${auth}" fetch --force origin main
      git -C /workspace/tank-operator checkout --detach origin/main
      exec /bin/bash /workspace/tank-operator/scripts/glimmung-native/verify.sh
    timeout_seconds: 300
    steps:
    - slug: check-styleguide
      title: Check live styleguide
    - slug: emit
      title: Emit verification
- name: evidence-gate
  kind: k8s_job
  evidence_verification_gate: true
  inputs:
    verification: ${{ phases.verify.outputs.verification }}
  recycle_policy:
    max_attempts: 0
    'on':
    - verify_fail
    - verify_malformed
    lands_at: implement
- name: cleanup
  kind: k8s_job
  always: true
  jobs:
  - id: cleanup
    name: Clean native runner leftovers
    image: romainecr.azurecr.io/claude-container:latest
    command:
    - /bin/bash
    - -lc
    - |
      set -Eeuo pipefail
      token="$(curl -fsS -X POST -H "X-Glimmung-Attempt-Token: ${GLIMMUNG_ATTEMPT_TOKEN}" "${GLIMMUNG_GITHUB_TOKEN_URL}" | jq -r .token)"
      auth="$(printf 'x-access-token:%s' "$token" | base64 | tr -d '\n')"
      git init /workspace/tank-operator >/dev/null
      git -C /workspace/tank-operator remote add origin https://github.com/nelsong6/tank-operator.git 2>/dev/null || true
      git -C /workspace/tank-operator -c "http.extraHeader=Authorization: Basic ${auth}" fetch --force origin main
      git -C /workspace/tank-operator checkout --detach origin/main
      exec /bin/bash /workspace/tank-operator/scripts/glimmung-native/cleanup.sh
    timeout_seconds: 300
    steps:
    - slug: cleanup
      title: Delete leftover resources
pr:
  enabled: true
  recycle_policy:
    max_attempts: 3
    'on':
    - pr_review_changes_requested
    lands_at: implement
