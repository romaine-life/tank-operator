# Wrapper-chart values for tank-operator's issue-agent ARC runner scale set.
# Configures the gha-runner-scale-set subchart declared in Chart.yaml.
# Deployed by ArgoCD via infra-bootstrap/k8s/apps/tank-operator-issue-agents.yaml.
#
# `runnerScaleSetName: tank-operator-issue-agents` becomes the `runs-on:`
# label that .github/workflows/issue-agent.yaml targets, AND the glimmung
# host name (must match exactly so glimmung's webhook → workflow_dispatch
# input.host maps to a real runner pool).
#
# `arc-github-app` is the existing org-wide GitHub App secret used by the
# ARC controller to mint runner registration tokens for nelsong6/* repos.

gha-runner-scale-set:
  githubConfigUrl: "https://github.com/nelsong6/tank-operator"
  githubConfigSecret: arc-github-app

  maxRunners: 5
  minRunners: 0

  runnerScaleSetName: "tank-operator-issue-agents"

  # Explicit controller SA — the chart otherwise does a live cluster lookup
  # for the controller's SA, which fails on offline `helm template`
  # rendering (and ArgoCD uses helm template under the hood). Name matches
  # the actual SA the controller pod runs as: chart `gha-rs-controller`,
  # release name `arc` → SA `arc-gha-rs-controller`. infra-bootstrap's
  # k8s/arc-runners/values.yaml has this as `arc-controller-gha-rs-controller`,
  # which was wrong — the right binding here lets the manager Role grant
  # secret-read to the actual SA so AutoscalingRunnerSet reconciliation
  # succeeds.
  controllerServiceAccount:
    namespace: arc-systems
    name: arc-gha-rs-controller

  template:
    spec:
      # Override the chart's auto-generated `*-gha-rs-no-permission` SA.
      # Our SA (created in templates/runner-rbac.yaml) carries the K8s
      # RBAC the workflow needs — the runner talks to the cluster as
      # itself rather than borrowing the tank-operator CI UAMI's perms
      # via az aks get-credentials.
      serviceAccountName: issue-agent-runner
      containers:
        - name: runner
          # Custom runner with kubectl baked in. Built by
          # .github/workflows/issue-agent-runner-build.yml from runner/Dockerfile;
          # that workflow rewrites the tag below on every push to main via a
          # `[skip ci]` follow-up commit. Quoted so all-digit short SHAs aren't
          # reformatted as scientific notation by YAML.
          image: romainecr.azurecr.io/tank-operator-issue-agent-runner:283d3ea
          command:
            - /home/runner/run.sh
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
              ephemeral-storage: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
              ephemeral-storage: "4Gi"
