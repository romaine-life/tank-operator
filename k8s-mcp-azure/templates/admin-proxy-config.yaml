apiVersion: v1
kind: ConfigMap
metadata:
  name: kube-rbac-proxy-admin
  namespace: mcp-azure
data:
  config.yaml: |
    authorization:
      resourceAttributes:
        apiGroup: mcp.tank-operator.io
        resource: servers
        name: azure-admin
        namespace: mcp-azure
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mcp-azure-admin-invoker
rules:
  - apiGroups: ["mcp.tank-operator.io"]
    resources: ["servers"]
    resourceNames: ["azure-admin"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mcp-azure-admin-invoker
  namespace: mcp-azure
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mcp-azure-admin-invoker
subjects:
  - kind: ServiceAccount
    name: claude-session
    namespace: tank-operator-sessions
