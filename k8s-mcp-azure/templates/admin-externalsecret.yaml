# Syncs the admin UAMI client ID and tenant ID from Key Vault into env vars.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mcp-azure-admin-config
  namespace: mcp-azure
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: romaine-kv
    kind: ClusterSecretStore
  target:
    name: mcp-azure-admin-config
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: AZURE_CLIENT_ID
      remoteRef:
        key: mcp-azure-admin-mi-client-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: AZURE_TENANT_ID
      remoteRef:
        key: mcp-tenant-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
