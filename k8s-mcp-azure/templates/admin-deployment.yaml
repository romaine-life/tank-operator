apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-azure-admin
  namespace: mcp-azure
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mcp-azure-admin
  template:
    metadata:
      labels:
        app: mcp-azure-admin
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: mcp-azure-admin
      containers:
        - name: mcp-azure-admin
          image: "{{ .Values.adminImage.repository }}:{{ .Values.adminImage.tag }}"
          imagePullPolicy: {{ .Values.adminImage.pullPolicy }}
          ports:
            - name: upstream
              containerPort: {{ .Values.upstreamPort }}
          envFrom:
            - secretRef:
                name: mcp-azure-admin-config
          env:
            - name: PORT
              value: "{{ .Values.upstreamPort }}"
            - name: AZURE_SUBSCRIPTION_ID
              value: "{{ .Values.subscriptionId }}"
            - name: AZURE_FEDERATED_TOKEN_FILE
              value: /var/run/secrets/azure/tokens/azure-identity-token
            - name: AZURE_AUTHORITY_HOST
              value: https://login.microsoftonline.com/
            - name: AZURE_TOKEN_CREDENTIALS
              value: WorkloadIdentityCredential
          readinessProbe:
            exec:
              command: ["python", "-c", "import socket,sys; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', {{ .Values.upstreamPort }})); s.close()"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.adminResources | nindent 12 }}
        - name: kube-rbac-proxy
          image: "{{ .Values.proxy.image.repository }}:{{ .Values.proxy.image.tag }}"
          imagePullPolicy: {{ .Values.proxy.image.pullPolicy }}
          args:
            - --insecure-listen-address=0.0.0.0:{{ .Values.proxy.port }}
            - --upstream=http://127.0.0.1:{{ .Values.upstreamPort }}/
            - --config-file=/etc/kube-rbac-proxy/config.yaml
            - --v=2
          ports:
            - name: proxy
              containerPort: {{ .Values.proxy.port }}
          volumeMounts:
            - name: proxy-config
              mountPath: /etc/kube-rbac-proxy
              readOnly: true
          resources:
            {{- toYaml .Values.proxyResources | nindent 12 }}
      volumes:
        - name: proxy-config
          configMap:
            name: kube-rbac-proxy-admin
