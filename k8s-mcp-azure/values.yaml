# ============================================================================
# mcp-azure values
# ============================================================================
# UAMI client ID and tenant ID are synced from Key Vault at runtime via the
# ExternalSecret in templates/externalsecret.yaml. See infra/mcp.tf and
# infra/mcp-server/ for the upstream definitions.

image:
  # Microsoft's image — no tag-bump CI on our side. Digest-pinned so :latest
  # drift is impossible; bump by hand when you want a newer version (find the
  # current digest with `kubectl -n mcp-azure get pod -o jsonpath=...`).
  repository: mcr.microsoft.com/azure-sdk/azure-mcp
  digest: sha256:ec43a27ccbd6f7333c010bbe0a3ea7afed4ee761c19e080c5090bc3e2fd6f40e
  pullPolicy: IfNotPresent

adminImage:
  repository: romainecr.azurecr.io/mcp-azure-admin
  # SHA-pinned. mcp-azure-admin-build.yml rewrites this tag on every push to main
  # via a `[skip ci]` follow-up commit. Quoted so all-digit short-SHAs don't
  # become floats.
  tag: "1103e7b"
  pullPolicy: IfNotPresent

# Loopback-only port azure-mcp listens on. Sidecar fronts it.
upstreamPort: 8080

subscriptionId: aee0cbd2-8074-4001-b610-0f8edb4eaa3c

# kube-rbac-proxy sidecar — terminates client connections, calls the K8s
# API's TokenReview to validate incoming bearer SA tokens, then forwards to
# azure-mcp on localhost. Plain HTTP (insecure-listen-address) — in-cluster
# traffic doesn't gain meaningfully from TLS without a service mesh, and
# avoiding cert plumbing keeps v1 simple.
proxy:
  image:
    repository: quay.io/brancz/kube-rbac-proxy
    tag: v0.18.2
    pullPolicy: IfNotPresent
  port: 8443

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 512Mi

adminResources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 256Mi

proxyResources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 64Mi
